<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>App de Francês A1</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        .hud { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .menu-btn { background-color: #3498db; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 1.1em; cursor: pointer; margin-bottom: 15px; }
        .menu-btn:disabled { background-color: #bdc3c7; }
        .mic-btn { background-color: #8e44ad; color: white; border: none; border-radius: 50%; width: 80px; height: 80px; font-size: 30px; cursor: pointer; }
        .mic-btn.recording { background-color: #e74c3c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); } 50% { transform: scale(1.05); } 100% { transform: scale(0.95); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="hud">
        <span>🔥 Streak: 18</span>
        <span>⭐ XP: <span id="xp-count">0</span></span>
    </div>

    <!-- Menu -->
    <div id="screen-menu" class="screen active">
        <h2>Missões Diárias</h2>
        <button class="menu-btn" onclick="startLevel(1)">Nível 1: La Chambre</button>
        <button class="menu-btn" id="btn-lvl2" onclick="startLevel(2)" disabled>Nível 2: La Boulangerie 🔒</button>
    </div>

    <!-- Nível 1 -->
    <div id="screen-lvl1" class="screen">
        <h2 id="title-lvl1">Nível 1</h2>
        <div id="visual-lvl1" style="font-size: 60px;">⏰</div>
        <p id="scenario-lvl1">Diga: <strong>Le réveil</strong></p>
        <button class="mic-btn" onclick="startListening()">🎤</button>
        <p id="feedback-lvl1">Clique para falar</p>
    </div>
</div>

<script>
    let xp = 0;
    let currentLevel = 0;
    let currentStep = 1;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'fr-FR';

    function startLevel(lvl) {
        currentLevel = lvl;
        currentStep = 1;
        document.getElementById('screen-menu').classList.remove('active');
        document.getElementById('screen-lvl1').classList.add('active');
    }

    function startListening() { recognition.start(); }

    recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript.toLowerCase();
        
        if (currentLevel === 1) {
            if (currentStep === 1 && transcript.includes('réveil')) {
                currentStep = 2; xp += 50;
                document.getElementById('xp-count').innerText = xp;
                document.getElementById('scenario-lvl1').innerHTML = "Diga: <strong>Le lit</strong>";
            } else if (currentStep === 2 && transcript.includes('lit')) {
                xp += 100;
                document.getElementById('xp-count').innerText = xp;
                document.getElementById('btn-lvl2').disabled = false;
                document.getElementById('btn-lvl2').innerText = "Nível 2: La Boulangerie";
                location.reload(); // Volta ao menu
            }
        }
    };
</script>
</body>
</html>
