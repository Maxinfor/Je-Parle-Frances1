<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaDu Imersivo Pro - Diálogos Profissionais A1</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen flex flex-col justify-between select-none">

    <!-- Container Principal do App -->
    <div id="app" class="w-full max-w-md mx-auto p-6 flex flex-col justify-between flex-grow">
        <!-- O conteúdo dinâmico será injetado aqui -->
    </div>

    <script>
        // Estado do Jogo de Diálogos Graduais
        let estado = {
            tela: 'menu', 
            vidas: 3,
            questaoAtualIndex: 0,
            xp: 0,
            nivelAtual: 1
        };

        // Função de Áudio Profissional Oficial (Français Natif)
        function tocarAudio(texto) {
            const textoCodificado = encodeURIComponent(texto);
            const urlAudio = `https://translate.google.com/translate_tts?ie=UTF-8&q=${textoCodificado}&tl=fr&client=tw-ob`;
            const audio = new Audio(urlAudio);
            audio.playbackRate = 0.85;
            audio.play().catch(erro => console.log("Áudio indisponível:", erro));
        }

        // Banco de 10 Questões Únicas baseadas estritamente em Diálogos Cotidianos e Profissionais
        const questoes = [
            {
                lugar: "A Padaria (La Boulangerie)",
                personagens: "Cliente & Padeiro",
                materia: {
                    titulo: "O Pedido na Padaria",
                    explicacao: "Você chega na padaria tradicional logo cedo. O padeiro te cumprimenta e você faz o seu pedido principal.",
                    imagem: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Bonjour monsieur! Je voudrais du pain frais s'il vous plaît."
                },
                exercicio: {
                    pergunta: "O padeiro pergunta o que você deseja. Como você responde pedindo pão?",
                    imagemExercicio: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je voudrais du pain",
                    audioTraducaoFR: "Eu gostaria de pão",
                    opcoes: ['Je voudrais du pain', 'Je suis un chat', 'Il fait beau', 'Au revoir'],
                    correta: 0
                }
            },
            {
                lugar: "A Escola (L'École)",
                personagens: "Professor & Aluno",
                materia: {
                    titulo: "Apresentação na Aula",
                    explicacao: "Na sala de aula, o professor pergunta quem é você na primeira chamada do curso de francês.",
                    imagem: "https://images.unsplash.com/photo-1580582932707-520aed937b7b?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Bonjour, je suis étudiant et je suis très heureux d'être ici."
                },
                exercicio: {
                    pergunta: "O professor pergunta sua ocupação. Como você diz que é estudante?",
                    imagemExercicio: "https://images.unsplash.com/photo-1580582932707-520aed937b7b?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je suis étudiant",
                    audioTraducaoFR: "Eu sou estudante",
                    opcoes: ['J\'ai un chat', 'Je suis étudiant', 'Où est la gare', 'De l\'eau'],
                    correta: 1
                }
            },
            {
                lugar: "O Supermercado (Le Supermarché)",
                personagens: "Cliente & Caixa",
                materia: {
                    titulo: "Pesagem de Frutas",
                    explicacao: "No caixa do supermercado, o operador confere as frutas que você pegou na seção fresca.",
                    imagem: "https://images.unsplash.com/photo-1578916171728-46686eac8d58?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Ce sont de belles pommes rouges pour la tarte."
                },
                exercicio: {
                    pergunta: "O caixa aponta para a balança. Como você diz que vai levar uma maçã?",
                    imagemExercicio: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Une pomme",
                    audioTraducaoFR: "Uma maçã",
                    opcoes: ['Du pain', 'Une pomme', 'Du lait', 'Du vin'],
                    correta: 1
                }
            },
            {
                lugar: "O Restaurante (Le Restaurant)",
                personagens: "Garçom & Cliente",
                materia: {
                    titulo: "O Pedido na Mesa",
                    explicacao: "Você senta à mesa do bistrô e o garçom traz o cardápio perguntando o que você quer beber.",
                    imagem: "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Que désirez-vous boire? De l'eau fraîche?"
                },
                exercicio: {
                    pergunta: "O garçom te oferece bebidas. Como você pede água?",
                    imagemExercicio: "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "De l'eau",
                    audioTraducaoFR: "Água",
                    opcoes: ['Du fromage', 'De l\'eau', 'Du pain', 'Un croissant'],
                    correta: 1
                }
            },
            {
                lugar: "O Trabalho (Le Bureau)",
                personagens: "Chefe & Funcionário",
                materia: {
                    titulo: "Início do Expediente",
                    explicacao: "Você chega pontualmente ao escritório e o gerente te cumprimenta pelo início do turno.",
                    imagem: "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Bonjour! Bon courage pour votre journée de travail."
                },
                exercicio: {
                    pergunta: "O chefe te cumprimenta de manhã. Como você responde que está começando o trabalho?",
                    imagemExercicio: "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je commence le travail",
                    audioTraducaoFR: "Eu começo o trabalho",
                    opcoes: ['Je mange une pomme', 'Je commence le travail', 'J\'ai un chat', 'Il pleut'],
                    correta: 1
                }
            },
            {
                lugar: "A Oficina Mecânica (L'Atelier)",
                personagens: "Mecânico & Motorista",
                materia: {
                    titulo: "Averiguação de Problema",
                    explicacao: "Seu carro parou na via e você chega à oficina pedindo suporte urgente ao mecânico.",
                    imagem: "https://images.unsplash.com/photo-1486006920555-c77dce18193b?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Bonjour monsieur, j'ai un problème technique."
                },
                exercicio: {
                    pergunta: "O mecânico te olha prestativo. Como você pede a ajuda dele?",
                    imagemExercicio: "https://images.unsplash.com/photo-1486006920555-c77dce18193b?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Pouvez-vous m'aider?",
                    audioTraducaoFR: "Você pode me ajudar?",
                    opcoes: ['Au revoir', 'Pouvez-vous m\'aider?', 'Bon appétit', 'Merci'],
                    correta: 1
                }
            },
            {
                lugar: "O Hospital (L'Hôpital)",
                personagens: "Médico & Paciente",
                materia: {
                    titulo: "Triagem Médica",
                    explicacao: "No balcão de atendimento do hospital, a recepcionista quer saber o motivo da sua visita.",
                    imagem: "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Quel est votre problème de santé aujourd'hui?"
                },
                exercicio: {
                    pergunta: "A atendente pergunta o que você precisa. Como você diz que precisa de um médico?",
                    imagemExercicio: "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'ai besoin d'un médecin",
                    audioTraducaoFR: "Eu preciso de um médico",
                    opcoes: ['J\'ai un chat', 'J\'ai besoin d\'un médecin', 'Je veux du pain', 'Où est le parc'],
                    correta: 1
                }
            },
            {
                lugar: "Em Casa com Visitas (À La Maison)",
                personagens: "Anfitrião & Amigo Convidado",
                materia: {
                    titulo: "Recepção na Porta",
                    explicacao: "Seu amigo campainha e entra na sua casa. Você mostra o seu gatinho de estimação.",
                    imagem: "https://images.unsplash.com/photo-1511632765486-a01980e01a18?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Bienvenue chez moi! Regarde comme il est mignon."
                },
                exercicio: {
                    pergunta: "Seu amigo te pergunta sobre animais. Como você diz que tem um gato?",
                    imagemExercicio: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'ai un chat",
                    audioTraducaoFR: "Eu tenho um gato",
                    opcoes: ['Je suis un chat', 'J\'ai un chat', 'Il a un chien', 'Nous avons une pomme'],
                    correta: 1
                }
            },
            {
                lugar: "Na Rua (Dans La Rue)",
                personagens: "Turista Perdido & Morador Local",
                materia: {
                    titulo: "Informação de Endereço",
                    explicacao: "Você está caminhando na calçada e precisa abordar um morador para pedir com licença.",
                    imagem: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Pardon monsieur, je cherche le métro."
                },
                exercicio: {
                    pergunta: "Você precisa chamar a atenção de alguém educadamente na rua. O que você diz?",
                    imagemExercicio: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Excusez-moi",
                    audioTraducaoFR: "Com licença / Desculpe-me",
                    opcoes: ['Bonjour', 'Excusez-moi', 'Merci', 'Au revoir'],
                    correta: 1
                }
            },
            {
                lugar: "O Velório / Homenagem (La Cérémonie)",
                personagens: "Enlutados / Profissionais",
                materia: {
                    titulo: "Expressando Condolências",
                    explicacao: "Em um momento solene de despedida, você se aproxima de um colega para prestar solidariedade.",
                    imagem: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Je suis désolé pour cette triste nouvelle."
                },
                exercicio: {
                    pergunta: "Como você expressa suas condolências respeitosamente em francês?",
                    imagemExercicio: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Mes condoléances",
                    audioTraducaoFR: "Meus pêsames",
                    opcoes: ['Bon anniversaire', 'Mes condoléances', 'Bon appétit', 'Salut'],
                    correta: 1
                }
            }
        ];

        function renderizar() {
            const app = document.getElementById('app');
            
            if (estado.tela === 'menu') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="w-28 h-28 bg-gradient-to-tr from-green-500 to-emerald-400 rounded-3xl flex items-center justify-center shadow-2xl shadow-green-500/20 mb-6 animate-pulse border border-green-400/30">
                            <span class="text-5xl">💬</span>
                        </div>
                        <h1 class="text-3xl font-extrabold mb-1 text-zinc-100">LinguaDu Diálogos</h1>
                        <p class="text-zinc-400 mb-6 text-sm">10 Cenários Práticos e Profissionais Graduais (Nível A1)</p>
                        
                        <div class="flex gap-3 mb-8 w-full justify-center">
                            <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <span class="text-yellow-400">⚡</span>
                                <div class="text-left"><div class="text-[10px] text-zinc-500 uppercase font-bold">XP</div><div class="text-sm font-bold text-zinc-200">${estado.xp}</div></div>
                            </div>
                            <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <span class="text-blue-400">📈</span>
                                <div class="text-left"><div class="text-[10px] text-zinc-500 uppercase font-bold">Progresso</div><div class="text-sm font-bold text-zinc-200">${estado.nivelAtual}/${questoes.length}</div></div>
                            </div>
                        </div>

                        <button onclick="iniciarLicao()" class="w-full py-4 bg-green-500 hover:bg-green-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-green-500/20 transition active:scale-95 text-base">
                            COMEÇAR DIÁLOGOS
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'teoria') {
                const item = questoes[estado.questaoAtualIndex];
                const porcentagem = (estado.questaoAtualIndex / questoes.length) * 100;

                setTimeout(() => tocarAudio(item.materia.audioExplicacao), 400);

                app.innerHTML = `
                    <div class="flex flex-col justify-between flex-grow">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <button onclick="voltarMenu()" class="text-zinc-500 hover:text-zinc-300 font-bold text-lg">✕</button>
                                <div class="w-2/3 bg-zinc-800 h-3 rounded-full overflow-hidden">
                                    <div class="bg-blue-500 h-full transition-all duration-300" style="width: ${porcentagem}%"></div>
                                </div>
                                <div class="flex items-center gap-1 text-red-500 font-bold">
                                    <span>❤️</span> <span class="text-sm">${estado.vidas}</span>
                                </div>
                            </div>

                            <div class="flex justify-between items-center mb-2 px-1">
                                <span class="text-blue-400 font-bold text-[11px] uppercase tracking-wider bg-blue-500/10 px-2.5 py-1 rounded-lg border border-blue-500/20">📍 ${item.lugar}</span>
                                <span class="text-zinc-400 text-[11px] font-semibold bg-zinc-900 px-2.5 py-1 rounded-lg border border-zinc-800">👤 ${item.personagens}</span>
                            </div>

                            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl mt-1">
                                <div class="relative h-40 w-full overflow-hidden">
                                    <img src="${item.materia.imagem}" class="w-full h-full object-cover brightness-90 hover:scale-105 transition duration-500">
                                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                </div>
                                <div class="p-4">
                                    <div class="flex justify-between items-center mb-1.5">
                                        <h2 class="text-base font-bold text-zinc-100">${item.materia.titulo}</h2>
                                        <button onclick="tocarAudio('${item.materia.audioExplicacao}')" class="w-8 h-8 bg-blue-500/20 text-blue-400 hover:bg-blue-500/30 rounded-full flex items-center justify-center transition shrink-0" title="Ouvir diálogo">
                                            🔊
                                        </button>
                                    </div>
                                    <p class="text-zinc-300 text-xs leading-relaxed">${item.materia.explicacao}</p>
                                </div>
                            </div>
                        </div>

                        <button onclick="irParaExercicio()" class="w-full py-3.5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/25 transition mt-3 active:scale-95 text-xs">
                            RESPONDER NO DIÁLOGO
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'licao') {
                const item = questoes[estado.questaoAtualIndex];
                const q = item.exercicio;
                const porcentagem = ((estado.questaoAtualIndex + 0.5) / questoes.length) * 100;

                app.innerHTML = `
                    <div class="flex flex-col justify-between flex-grow">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <button onclick="voltarMenu()" class="text-zinc-500 hover:text-zinc-300 font-bold text-lg">✕</button>
                                <div class="w-2/3 bg-zinc-800 h-3 rounded-full overflow-hidden">
                                    <div class="bg-green-500 h-full transition-all duration-300" style="width: ${porcentagem}%"></div>
                                </div>
                                <div class="flex items-center gap-1 text-red-500 font-bold">
                                    <span>❤️</span> <span class="text-sm">${estado.vidas}</span>
                                </div>
                            </div>

                            <div class="text-[11px] font-bold text-emerald-400 uppercase tracking-wider mb-1">Sua Vez de Falar:</div>
                            <h2 class="text-zinc-300 font-semibold text-xs mb-3 leading-relaxed">${q.pergunta}</h2>
                            
                            <div class="bg-zinc-900 rounded-3xl border border-zinc-800 overflow-hidden mb-3 shadow-xl">
                                <div class="h-28 w-full overflow-hidden relative">
                                    <img src="${q.imagemExercicio}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                </div>
                                <div class="p-3 flex items-center justify-between bg-zinc-900">
                                    <div>
                                        <div class="text-[9px] text-zinc-500 uppercase font-semibold">Sua Fala (Français)</div>
                                        <div class="text-sm font-bold text-zinc-100">${q.audioFrances}</div>
                                    </div>
                                    <button onclick="tocarAudio('${q.audioFrances}')" class="w-10 h-10 bg-green-500 hover:bg-green-400 text-zinc-950 rounded-2xl flex items-center justify-center text-base shadow-lg transition active:scale-95 shrink-0" title="Ouvir sua fala nativa">
                                        🔊
                                    </button>
                                </div>
                            </div>

                            <div class="flex flex-col gap-2" id="opcoes-container">
                                ${q.opcoes.map((opcao, index) => `
                                    <button onclick="verificarResposta(${index})" class="opcao-btn p-3 bg-zinc-900 border-2 border-zinc-800 hover:border-zinc-700 rounded-2xl text-left font-medium text-zinc-200 transition active:scale-[0.98] text-xs">
                                        ${opcao}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div></div>
                    </div>
                `;
            } else if (estado.tela === 'vitoria') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="text-6xl mb-4 animate-bounce">🏆</div>
                        <h1 class="text-3xl font-extrabold mb-2 text-green-400">Jornada Concluída!</h1>
                        <p class="text-zinc-400 mb-8 text-sm">Você completou todos os 10 diálogos profissionais e cotidianos com sucesso. Ganhou <strong>+100 XP</strong>.</p>
                        <button onclick="reiniciarJornada()" class="w-full py-4 bg-green-500 hover:bg-green-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-green-500/20 transition">
                            REINICIAR DIÁLOGOS
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'derrota') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="text-6xl mb-4 animate-bounce">💡</div>
                        <h1 class="text-3xl font-extrabold mb-2 text-red-500">As vidas acabaram!</h1>
                        <p class="text-zinc-400 mb-8 text-sm">Pratique a escuta dos diálogos e tente novamente para fixar as expressões.</p>
                        <button onclick="iniciarLicao()" class="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-extrabold rounded-2xl shadow-lg shadow-red-600/20 transition">
                            TENTAR NOVAMENTE
                        </button>
                    </div>
                `;
            }
        }

        function iniciarLicao() {
            estado.vidas = 3;
            estado.questaoAtualIndex = 0;
            estado.tela = 'teoria';
            renderizar();
        }

        function irParaExercicio() {
            estado.tela = 'licao';
            renderizar();
        }

        function reiniciarJornada() {
            estado.xp += 100;
            estado.nivelAtual = 1;
            estado.questaoAtualIndex = 0;
            estado.tela = 'menu';
            renderizar();
        }

        function verificarResposta(indexSelecionado) {
            const item = questoes[estado.questaoAtualIndex];
            const q = item.exercicio;
            const botoes = document.querySelectorAll('.opcao-btn');
            
            botoes.forEach(b => b.disabled = true);

            if (indexSelecionado === q.correta) {
                botoes[indexSelecionado].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[indexSelecionado].classList.add('bg-green-600/30', 'border-green-500', 'text-green-300');
                
                setTimeout(() => {
                    estado.questaoAtualIndex++;
                    estado.nivelAtual = estado.questaoAtualIndex + 1;
                    if (estado.questaoAtualIndex >= questoes.length) {
                        estado.tela = 'vitoria';
                    } else {
                        estado.tela = 'teoria';
                    }
                    renderizar();
                }, 900);
            } else {
                botoes[indexSelecionado].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[indexSelecionado].classList.add('bg-red-600/30', 'border-red-500', 'text-red-300');
                botoes[q.correta].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[q.correta].classList.add('bg-green-600/30', 'border-green-500', 'text-green-300');

                estado.vidas--;

                setTimeout(() => {
                    if (estado.vidas <= 0) {
                        estado.tela = 'derrota';
                    } else {
                        renderizar();
                    }
                }, 1200);
            }
        }

        function voltarMenu() {
            estado.tela = 'menu';
            renderizar();
        }

        renderizar();
    </script>
</body>
</html>
