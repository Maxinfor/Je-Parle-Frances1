<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Elite System | Jornada Francesa</title>
    <style>
        :root { --bg: #050b1a; --active: #00f2fe; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; padding: 40px; 
            font-size: 1.4rem; /* Letras maiores */
        }
        
        h2 { font-size: 2.5rem; color: var(--active); }
        .icon-box { font-size: 6rem; margin: 30px 0; }
        
        .btn { 
            display: block; width: 100%; max-width: 500px; 
            margin: 20px auto; padding: 25px; 
            background: #1a2235; border: 2px solid #444; 
            color: white; border-radius: 20px; 
            cursor: pointer; font-size: 1.5rem;
        }
        .btn:hover { background: #25304a; border-color: var(--active); }
        
        #reset-btn { font-size: 1rem; color: #666; margin-top: 50px; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status-container">
        <div id="icon-display" class="icon-box">🏅</div>
        <h2 id="fase-nome">Carregando...</h2>
        <p id="nivel-txt">Nível: Bronze</p>
    </div>

    <div id="game-area">
        <h3 id="pergunta" style="font-size: 2rem; margin: 30px 0;"></h3>
        <div id="opcoes"></div>
    </div>

    <button id="reset-btn" onclick="resetar()">Reiniciar todo o progresso</button>

<script>
    const trilha = [
        { nome: "Medalha", icon: "🏅", max: 5, cat: "gramatica" },
        { nome: "Xícara", icon: "☕", max: 5, cat: "conv" },
        { nome: "Café Francês", icon: "🥐☕", max: 10, cat: "cultura" }
    ];

    const banco = {
        gramatica: [
            {id: 1, q: "Passé Composé de 'manger' (Eu)", o: ["J'ai mangé", "Je mangeais"], c: 0},
            {id: 2, q: "Plural de 'Le journal'?", o: ["Les journaux", "Les journals"], c: 0}
        ],
        conv: [
            {id: 3, q: "Quel âge as-tu?", o: ["J'ai 20 ans", "Je suis 20 ans"], c: 0}
        ],
        cultura: [
            {id: 4, q: "Onde fica o Louvre?", o: ["Paris", "Lyon"], c: 0}
        ]
    };

    let user = JSON.parse(localStorage.getItem('es_user')) || { fase: 0, nivel: 0, pts: 0, respondidas: [] };

    function render() {
        const f = trilha[user.fase];
        document.getElementById('icon-display').innerText = f.icon;
        document.getElementById('fase-nome').innerText = f.nome;
        document.getElementById('nivel-txt').innerText = `Progresso: ${user.pts}/${f.max}`;

        let disponiveis = banco[f.cat].filter(q => !user.respondidas.includes(q.id));
        if (disponiveis.length === 0) { user.respondidas = []; disponiveis = banco[f.cat]; }

        const q = disponiveis[Math.floor(Math.random() * disponiveis.length)];
        document.getElementById('pergunta').innerText = q.q;
        document.getElementById('opcoes').innerHTML = q.o.map((txt, i) => 
            `<button class="btn" onclick="check(${i}, ${q.c}, ${q.id})">${txt}</button>`
        ).join('');
    }

    function check(sel, corr, id) {
        if(sel === corr) {
            user.pts++;
            user.respondidas.push(id);
            if(user.pts >= trilha[user.fase].max) {
                user.nivel++;
                user.pts = 0;
                alert("Parabéns! Nível alcançado!");
            }
            localStorage.setItem('es_user', JSON.stringify(user));
            render();
        } else {
            alert("Errou! Foco total.");
        }
    }

    function resetar() {
        if(confirm("Apagar todo o progresso?")) {
            localStorage.removeItem('es_user');
            location.reload();
        }
    }

    render();
</script>
</body>
</html>
