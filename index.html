<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jornada Francesa | Evolução Total</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap');
        :root { 
            --bg: #050b1a; --glass: rgba(255, 255, 255, 0.05);
            --bronze: #cd7f32; --prata: #c0c0c0; --ouro: #ffd700;
        }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 650px; }
        
        /* Painel Central de Medalhas */
        .badge-panel { display: flex; justify-content: center; gap: 20px; background: rgba(0,0,0,0.4); padding: 25px; border-radius: 25px; border: 1px solid #333; margin-bottom: 30px; }
        .badge-box { text-align: center; }
        .badge { font-size: 2.5em; filter: grayscale(1) opacity(0.2); transition: 0.5s; margin-bottom: 5px; }
        .label { font-size: 0.7em; letter-spacing: 1px; color: #888; }
        
        /* Estilos de Evolução */
        .badge.bronze { filter: grayscale(0) drop-shadow(0 0 8px var(--bronze)); color: var(--bronze); }
        .badge.prata { filter: grayscale(0) drop-shadow(0 0 8px var(--prata)); color: var(--prata); }
        .badge.ouro { filter: grayscale(0) drop-shadow(0 0 15px var(--ouro)); color: var(--ouro); transform: scale(1.2); }

        .card { background: var(--glass); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-opt { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #1a2235; border: 1px solid #444; border-radius: 12px; cursor: pointer; color: white; transition: 0.3s; }
        .btn-opt:hover { border-color: #00f2fe; }
    </style>
</head>
<body>

<div class="container">
    <!-- Painel de Insígnias Unificado -->
    <div class="badge-panel">
        <div class="badge-box"><div class="badge" id="b-gramatica">🏅</div><div class="label">GRAMÁTICA</div></div>
        <div class="badge-box"><div class="badge" id="b-conv">🏅</div><div class="label">CONVERSA</div></div>
        <div class="badge-box"><div class="badge" id="b-cultura">🏅</div><div class="label">CULTURA</div></div>
    </div>

    <div class="card">
        <h2 id="titulo">Iniciando Jornada...</h2>
        <p id="pergunta"></p>
        <div id="opcoes"></div>
    </div>
</div>

<script>
    // Estrutura de progresso: 0 = Zero, 1 = Bronze, 2 = Prata, 3 = Ouro
    const progresso = { gramatica: 0, conv: 0, cultura: 0 };
    const classes = ['', 'bronze', 'prata', 'ouro'];

    function atualizarMedalha(tipo, id) {
        progresso[tipo]++;
        const el = document.getElementById(id);
        el.className = 'badge ' + classes[progresso[tipo]];
        
        if (progresso[tipo] === 3) {
            console.log(tipo + " alcançou o Ouro!");
            // Aqui você pode adicionar um efeito especial ou liberar o próximo módulo
        }
    }

    // Exemplo de como chamar:
    // Ao acertar uma pergunta de Gramática:
    // atualizarMedalha('gramatica', 'b-gramatica');

    // Inicialização mock para demonstrar
    document.getElementById('titulo').innerText = "Simulador de Evolução";
    document.getElementById('pergunta').innerText = "Clique para evoluir sua medalha de Gramática:";
    
    const b = document.createElement('button');
    b.className = 'btn-opt'; b.innerText = "Simular Acerto em Gramática";
    b.onclick = () => atualizarMedalha('gramatica', 'b-gramatica');
    document.getElementById('opcoes').appendChild(b);
</script>
</body>
</html>
