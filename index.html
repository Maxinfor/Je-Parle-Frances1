// ==================================
// VERIFICAR RESPOSTA
// ==================================


function verificarResposta(escolha){



let lista =
exercicios[estado.nivel];



let pergunta =
lista[estado.questao];



let botoes =
document.querySelectorAll(".resposta");





// ACERTO


if(escolha===pergunta.correta){



botoes[escolha]
.classList
.remove("bg-blue-700");



botoes[escolha]
.classList
.add("bg-green-600");





estado.xp +=20;


estado.moedas +=5;



setTimeout(()=>{


estado.questao++;




if(
estado.questao>=lista.length
){



estado.questao=0;


estado.tela="vitoria";



}



renderizar();



},1000);



}




// ERRO


else{


botoes[escolha]
.classList
.remove("bg-blue-700");



botoes[escolha]
.classList
.add("bg-red-600");



estado.vidas--;




setTimeout(()=>{



if(
estado.vidas<=0
){


estado.tela="derrota";


estado.vidas=3;


}

else{


renderizar();


}



},1000);



}



salvar();



}

"LinguaDuPRO",

JSON.stringify({

estado:estado,

perfil:perfil,

inventario:inventario

})


);


}

function carregar(){



let dados=

localStorage.getItem(
"LinguaDuPRO"
);



if(dados){



let salvo=
JSON.parse(dados);



estado=salvo.estado;


perfil=salvo.perfil;


inventario=
salvo.inventario || [];



}



}






carregar();
