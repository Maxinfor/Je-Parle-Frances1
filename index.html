<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efeito de brilho neon contínuo */
        .neon-glow { box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        
        /* Animação de pulso para botões */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(6, 182, 212, 0.2); }
            50% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.6); }
            100% { box-shadow: 0 0 5px rgba(6, 182, 212, 0.2); }
        }
        .animate-pulse-glow { animation: pulse-glow 2s infinite; }
        
        body { background: radial-gradient(circle at center, #0f172a 0%, #000 100%); }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center font-mono">

    <div id="app" class="w-full max-w-sm p-8 bg-zinc-900/50 rounded-3xl border border-cyan-900/50 backdrop-blur-xl neon-glow">
        <!-- Conteúdo carregado aqui -->
    </div>

    <script>
        // Dados de exemplo
        const niveis = [{
            titulo: "SISTEMA A1: ACESSO",
            questoes: [
                { p: "Eu sou brasileiro?", op: ["Je suis brésilien", "Je es brésilien"], c: "Je suis brésilien" }
            ]
        }];

        let nivelIdx = 0, questaoIdx = 0;

        function carregar() {
            const q = niveis[nivelIdx].questoes[questaoIdx];
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] text-cyan-400 tracking-[0.2em]">STATUS: ONLINE</span>
                    <span class="text-[10px] text-zinc-500">Q ${questaoIdx + 1}/10</span>
                </div>
                <h1 class="text-xl font-bold mb-8 text-cyan-100 border-l-2 border-cyan-500 pl-4">
                    ${q.p}
                </h1>
                <div class="flex flex-col gap-4">
                    ${q.op.map(o => `
                        <button onclick="verificar('${o}')" class="w-full p-4 bg-zinc-950 border border-cyan-500/30 rounded-xl hover:border-cyan-400 transition-all duration-300 hover:scale-[1.02] active:scale-95 text-left text-sm animate-pulse-glow">
                            <span class="text-cyan-500 mr-2">></span> ${o}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function verificar(resp) {
            if (resp === niveis[nivelIdx].questoes[questaoIdx].c) {
                // Efeito visual de sucesso
                document.body.classList.add('bg-green-900/20');
                setTimeout(() => document.body.classList.remove('bg-green-900/20'), 300);
                
                questaoIdx++;
                carregar();
            } else {
                alert("ACCESS DENIED: Erro de processamento.");
            }
        }

        carregar();
    </script>
</body>
</html>
