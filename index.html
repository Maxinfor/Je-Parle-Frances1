<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JE Parle Français - Méthode CEFR</title>
    <style>
        :root {
            --primary: #002395; /* Azul da França */
            --white: #ffffff;
            --red: #ED2939; /* Vermelho da França */
            --background: #f4f7f6;
            --success: #2ecc71;
            --dark: #2c3e50;
            --gray-light: #eef2f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 5px solid var(--primary);
            padding-bottom: 10px;
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: var(--primary);
        }

        h1 span {
            color: var(--red);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Status & Gamificação */
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: var(--gray-light);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .streak { color: #e67e22; }
        .xp { color: #9b59b6; }
        .level-badge { color: var(--primary); }

        /* Navegação de Níveis */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: #ddd;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Descrição Pedagógica do Nível */
        .level-desc {
            font-size: 0.85rem;
            color: #555;
            background: #eef7ff;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 3px solid #3498db;
        }

        /* Barra de Progresso */
        .progress-container {
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--success);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Bloco de Exercício Único */
        .exercise-card {
            display: flex;
            flex-direction: column;
        }

        .question {
            font-size: 1.15rem;
            margin-bottom: 15px;
            font-weight: 600;
            line-height: 1.4;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: 0.2s;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #f0f4ff;
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: #eef2f5;
        }

        /* Integração de Áudio e Fala */
        .audio-practice-box {
            background: var(--gray-light);
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .phrase-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .target-phrase {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary);
        }

        .listen-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        /* Botão de Microfone Otimizado */
        .mic-interface {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px 0;
        }

        .mic-btn {
            background: var(--red);
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(237, 41, 57, 0.4);
            transition: all 0.3s ease;
        }

        .mic-btn.recording {
            background: #c01c28;
            animation: pulse 1.2s infinite;
            box-shadow: 0 0 0 15px rgba(237, 41, 57, 0.2);
        }

        .mic-status-text {
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: 600;
            color: var(--dark);
        }

        /* Feedback */
        .feedback {
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            display: none;
        }

        .feedback.correct {
            display: block;
            background: #d4edda;
            color: #155724;
        }

        .feedback.wrong {
            display: block;
            background: #f8d7da;
            color: #721c24;
        }

        /* Botões de Ação */
        .action-btn {
            width: 100%;
            background: var(--success);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .action-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Modal de Recompensa */
        .modal-reward {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .reward-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            animation: popUp 0.4s ease-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @keyframes popUp {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>JE Parle <span>Français</span></h1>
    </header>

    <div class="container">
        <!-- Barra de Status Gamificada -->
        <div class="status-bar">
            <span class="level-badge" id="current-level-display">Nível: A1</span>
            <span class="streak" id="streak-display">🔥 0 Dias</span>
            <span class="xp" id="xp-display">✨ 0 XP</span>
        </div>

        <!-- Abas de Nível baseadas no Quadro Europeu (CEFR) -->
        <div class="tabs" id="level-tabs">
            <button class="tab-btn active" onclick="changeLevel('A1')">A1</button>
            <button class="tab-btn" onclick="changeLevel('A2')">A2</button>
            <button class="tab-btn" onclick="changeLevel('B1')">B1</button>
            <button class="tab-btn" onclick="changeLevel('B2')">B2</button>
            <button class="tab-btn" onclick="changeLevel('C1')">C1</button>
            <button class="tab-btn" onclick="changeLevel('C2')">C2</button>
        </div>

        <!-- Descritivo Pedagógico Ativo -->
        <div class="level-desc" id="level-description-text">Carregando diretrizes...</div>

        <!-- Barra de Progresso da lição -->
        <div class="progress-container">
            <div class="progress-bar" id="lesson-progress"></div>
        </div>

        <!-- Seção Dinâmica Unificada de Exercícios -->
        <div id="exercise-container" class="exercise-card"></div>

        <!-- Feedbacks Globais -->
        <div id="global-feedback" class="feedback"></div>
        <button id="action-btn" class="action-btn" onclick="handleMainAction()" disabled>Verificar Resposta</button>
    </div>

    <!-- Modal de Recompensa -->
    <div class="modal-reward" id="reward-modal">
        <div class="reward-content">
            <div style="font-size: 4rem; margin-bottom: 15px;">🏆</div>
            <h2>Félicitations!</h2>
            <p>Você dominou as competências de uso real deste nível do CEFR!</p>
            <p style="color: var(--success); font-weight: bold; margin: 10px 0;">+50 XP conquistados!</p>
            <button class="action-btn" onclick="closeRewardModal()">Progredir na Escala Mundial</button>
        </div>
    </div>

    <script>
        // Metadados pedagógicos dos níveis mundiais (CEFR)
        const levelMeta = {
            A1: "A1 (Iniciante): Situações cotidianas simples, apresentações básicas e necessidades concretas imediatas.",
            A2: "A2 (Elementar): Sobrevivência social, rotina familiar, compras, direções e tarefas habituais.",
            B1: "B1 (Intermediário): Independência prática. Lidar com viagens, expor planos, sonhos e defender opiniões básicas.",
            B2: "B2 (Pós-Intermediário): Fluência ativa, argumentação técnica, interações sociais complexas sem esforço mútuo.",
            C1: "C1 (Avançado): Uso acadêmico e corporativo autônomo. Expressão fluida, estruturada e compreensão de subtextos.",
            C2: "C2 (Domínio Pleno): Fluência idêntica à nativa, distinção precisa de sutilezas e produção de alta complexidade."
        };

        // Banco de Dados estruturado estritamente nos critérios do CEFR para o cotidiano
        const database = {
            A1: [
                {
                    question: "[A1 - Interação Básica] Você chega à recepção de um hotel em Paris pela manhã. Como inicia o contato para solicitar o check-in?",
                    options: ["Au revoir, monsieur.", "Bonjour, s'il vous plaît.", "Enchanté, de rien.", "Bonsoir, ça va?"],
                    correct: 1,
                    phrase: "Bonjour, s'il vous plaît",
                    translation: "Bom dia, por favor."
                },
                {
                    question: "[A1 - Necessidade Concreta] Na feira, você precisa pagar as suas compras e quer saber o valor total. O que dizer?",
                    options: ["C'est gratuit?", "Ça fait combien, s'il vous plaît?", "Où habitez-vous?", "Je m'appelle Jean."],
                    correct: 1,
                    phrase: "Ça fait combien, s'il vous plaît",
                    translation: "Quanto fica tudo, por favor?"
                }
            ],
            A2: [
                {
                    question: "[A2 - Sobrevivência Urbana] Você está em uma estação e precisa descobrir onde pegar o trem para o aeroporto. Como formular a pergunta?",
                    options: ["Où est le train pour l'aéroport?", "Je voudrais un croissant.", "Le train est très beau.", "Je ne comprends pas."],
                    correct: 0,
                    phrase: "Où est le train pour l'aéroport",
                    translation: "Onde fica o trem para o aeroporto?"
                },
                {
                    question: "[A2 - Rotina e Compras] Você entra em um café parisiense e quer pedir a refeição matinal tradicional. O que diz ao atendente?",
                    options: ["Je n'aime pas le café.", "Je voudrais un café et un croissant, s'il vous plaît.", "Combien coûte votre voiture?", "Il fait froid aujourd'hui."],
                    correct: 1,
                    phrase: "Je voudrais un café et un croissant, s'il vous plaît",
                    translation: "Eu gostaria de um café e um croissant, por favor."
                }
            ],
            B1: [
                {
                    question: "[B1 - Gestão de Imprevistos] Durante uma viagem de trem, ocorreu um imprevisto na sua programação de viagem. Como você avisa o hotel que chegará mais tarde?",
                    options: ["Je ne viens plus.", "Désolé, j'ai manqué le train, je vais arriver en retard.", "Le train fonctionne bien.", "C'est une bonne idée."],
                    correct: 1,
                    phrase: "Désolé, j'ai manqué le train, je vais arriver en retard",
                    translation: "Desculpe, perdi o trem, vou chegar atrasado."
                },
                {
                    question: "[B1 - Expressar Opiniões] Um colega sugere um passeio e você concorda plenamente com os argumentos dele. Como responder de maneira independente?",
                    options: ["Je suis tout à fait d'accord avec toi.", "Je ne sais pas écrire.", "Où sont les clés?", "C'est inadmissible."],
                    correct: 0,
                    phrase: "Je suis tout à fait d'accord avec toi",
                    translation: "Eu estou totalmente de acordo com você."
                }
            ],
            B2: [
                {
                    question: "[B2 - Negociação e Argumentação] No trabalho ou em uma reunião social, você precisa discordar de uma proposta de forma polida, mas categórica e clara:",
                    options: ["Tu as tort, c'est bête.", "Je comprends votre point de vue, cependant je ne partage em pas votre avis.", "Je m'en fiche complètement.", "C'est parfait, allons-y."],
                    correct: 1,
                    phrase: "Je comprends votre point de vue, cependant je ne partage pas votre avis",
                    translation: "Compreendo seu ponto de vista, contudo não compartilho da sua opinião."
                }
            ],
            C1: [
                {
                    question: "[C1 - Fluência e Expressões Idiomáticas] Para expressar no cotidiano corporativo que você sem querer tocou em um assunto delicado ou cometeu uma gafe pública, qual estrutura avançada utiliza?",
                    options: ["J'ai mis les pieds dans le plat.", "J'ai mangé de la soupe.", "Je suis tombé par terre.", "Il fait un temps de chien."],
                    correct: 0,
                    phrase: "J'ai mis les pieds dans le plat",
                    translation: "Eu cometi uma gafe / toquei em um assunto delicado."
                }
            ],
            C2: [
                {
                    question: "[C2 - Domínio e Sutileza Linguística] Qual das opções apresenta uma estrutura sintática de alto nível e nuance absoluta aplicável para reafirmar o sucesso de um projeto complexo sob qualquer circunstância?",
                    options: ["On va gagner, c'est sûr.", "Quoi qu'il en soit, nous y parviendrons sans faille.", "C'est fini pour tout le monde.", "Après la pluie, le beau temps."],
                    correct: 1,
                    phrase: "Quoi qu'il en soit, nous y parviendrons sans faille",
                    translation: "Seja como for, nós conseguiremos sem falhas."
                }
            ]
        };

        // Estado da Aplicação
        let userState = {
            currentLevel: 'A1',
            xp: 0,
            streak: 0,
            lastActiveDate: null
        };

        let currentExerciseIndex = 0;
        let lessonStep = "QUIZ"; 
        let selectedOptionIdx = null;
        let recognition;
        let isListening = false;

        window.onload = function() {
            loadUserData();
            loadLevelData();
            setupSpeechRecognition();
        };

        function loadUserData() {
            const savedState = localStorage.getItem('jeParleFrancais_CEFR_Data');
            if (savedState) {
                userState = JSON.parse(savedState);
                updateUI();
            }
        }

        function saveUserData() {
            localStorage.setItem('jeParleFrancais_CEFR_Data', JSON.stringify(userState));
            updateUI();
        }

        function updateUI() {
            document.getElementById('xp-display').innerText = `✨ ${userState.xp} XP`;
            document.getElementById('streak-display').innerText = `🔥 ${userState.streak} Dias`;
            document.getElementById('current-level-display').innerText = `Nível: ${userState.currentLevel}`;
            document.getElementById('level-description-text').innerText = levelMeta[userState.currentLevel];
        }

        function changeLevel(level) {
            userState.currentLevel = level;
            currentExerciseIndex = 0;
            lessonStep = "QUIZ";
            selectedOptionIdx = null;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(btn.innerText === level) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            loadLevelData();
            saveUserData();
        }

        function loadLevelData() {
            const exercises = database[userState.currentLevel];
            const currentEx = exercises[currentExerciseIndex];
            const container = document.getElementById('exercise-container');
            const feedback = document.getElementById('global-feedback');
            const actionBtn = document.getElementById('action-btn');

            feedback.className = 'feedback';
            actionBtn.disabled = true;
            actionBtn.innerText = "Verificar Resposta";

            const progressPercent = (currentExerciseIndex / exercises.length) * 100;
            document.getElementById('lesson-progress').style.width = `${progressPercent}%`;

            if (lessonStep === "QUIZ") {
                let optionsHTML = currentEx.options.map((opt, idx) => `
                    <button class="option-btn" id="opt-${idx}" onclick="selectOption(${idx})">${opt}</button>
                `).join('');

                container.innerHTML = `
                    <div class="question">${currentEx.question}</div>
                    <div class="options-grid">${optionsHTML}</div>
                `;
            } else if (lessonStep === "SPEAK") {
                container.innerHTML = `
                    <div class="question">Ótimo! Ouça o áudio da expressão e faça a validação da sua pronúncia pelo microfone:</div>
                    <div class="audio-practice-box">
                        <div class="phrase-header">
                            <div>
                                <div class="target-phrase">${currentEx.phrase}</div>
                                <div style="font-size:0.85rem; color:#666;">Tradução: ${currentEx.translation}</div>
                            </div>
                            <button class="listen-btn" onclick="speakFrench('${currentEx.phrase}')">🔊 Ouvir Áudio</button>
                        </div>
                    </div>
                    
                    <div class="mic-interface">
                        <button class="mic-btn" id="mic-button" onclick="toggleListening()">🎙️</button>
                        <div class="mic-status-text" id="mic-status">Toque no microfone e fale em voz alta</div>
                    </div>
                `;
                actionBtn.innerText = "Pular e Continuar";
                actionBtn.disabled = false;
            }
        }

        function selectOption(index) {
            if (lessonStep !== "QUIZ") return;
            selectedOptionIdx = index;
            
            document.querySelectorAll('.options-grid .option-btn').forEach((btn, idx) => {
                if(idx === index) btn.classList.add('selected');
                else btn.classList.remove('selected');
            });

            document.getElementById('action-btn').disabled = false;
        }

        function handleMainAction() {
            const exercises = database[userState.currentLevel];
            const currentEx = exercises[currentExerciseIndex];
            const feedback = document.getElementById('global-feedback');
            const actionBtn = document.getElementById('action-btn');

            if (lessonStep === "QUIZ") {
                if (selectedOptionIdx === currentEx.correct) {
                    feedback.innerText = "Correct! Avançando para o módulo de expressão oral...";
                    feedback.className = "feedback correct";
                    
                    setTimeout(() => {
                        lessonStep = "SPEAK";
                        loadLevelData();
                    }, 1200);
                } else {
                    feedback.innerText = "Oups! Opção incorreta para os padrões do nível. Analise o contexto e tente novamente.";
                    feedback.className = "feedback wrong";
                }
            } else if (lessonStep === "SPEAK" || lessonStep === "NEXT") {
                currentExerciseIndex++;
                if (currentExerciseIndex < exercises.length) {
                    lessonStep = "QUIZ";
                    selectedOptionIdx = null;
                    loadLevelData();
                } else {
                    document.getElementById('lesson-progress').style.width = `100%`;
                    completeLesson();
                }
            }
        }

        function speakFrench(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                // Ajuste de cadência sutil para os níveis iniciais
                utterance.rate = ['A1', 'A2'].includes(userState.currentLevel) ? 0.82 : 0.95;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("A reprodução de áudio via síntese nativa não é suportada neste navegador.");
            }
        }

        function setupSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'fr-FR';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onresult = function(event) {
                    stopListening();
                    const speechToText = event.results[0][0].transcript.toLowerCase();
                    const currentEx = database[userState.currentLevel][currentExerciseIndex];
                    
                    const expectedText = currentEx.phrase.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
                    const sanitizedSpeech = speechToText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
                    
                    const feedback = document.getElementById('global-feedback');
                    const actionBtn = document.getElementById('action-btn');
                    
                    if(sanitizedSpeech.includes(expectedText) || expectedText.includes(sanitizedSpeech)) {
                        feedback.innerText = `Excellent! Pronúncia validada com sucesso: "${speechToText}"`;
                        feedback.className = "feedback correct";
                        actionBtn.innerText = "Avançar Próxima Etapa";
                        actionBtn.disabled = false;
                        lessonStep = "NEXT";
                    } else {
                        feedback.innerText = `Ouvimos: "${speechToText}". Tente aproximar a pronúncia do áudio de referência e fale novamente.`;
                        feedback.className = "feedback wrong";
                    }
                };

                recognition.onerror = function() { stopListening(); };
                recognition.onend = function() { stopListening(); };
            }
        }

        function toggleListening() {
            if(!recognition) {
                alert("Reconhecimento de voz indisponível no navegador atual. Use o Chrome ou Edge.");
                return;
            }
            const micBtn = document.getElementById('mic-button');
            const micStatus = document.getElementById('mic-status');

            if (isListening) {
                stopListening();
            } else {
                isListening = true;
                micBtn.classList.add('recording');
                micStatus.innerText = "🛑 Escutando captação nativa...";
                document.getElementById('global-feedback').className = 'feedback';
                try { recognition.start(); } catch(e){}
            }
        }

        function stopListening() {
            isListening = false;
            const micBtn = document.getElementById('mic-button');
            const micStatus = document.getElementById('mic-status');
            if(micBtn) micBtn.classList.remove('recording');
            if(micStatus) micStatus.innerText = "Toque no microfone e fale em voz alta";
            if(recognition) { try { recognition.stop(); } catch(e){} }
        }

        function completeLesson() {
            const today = new Date().toDateString();
            if (userState.lastActiveDate !== today) {
                userState.streak += 1;
                userState.lastActiveDate = today;
            }
            userState.xp += 50;
            saveUserData();
            document.getElementById('reward-modal').style.display = 'flex';
        }

        function closeRewardModal() {
            document.getElementById('reward-modal').style.display = 'none';
            const levels = Object.keys(database);
            let nextIdx = levels.indexOf(userState.currentLevel) + 1;
            if(nextIdx >= levels.length) nextIdx = 0; 
            changeLevel(levels[nextIdx]);
        }
    </script>
</body>
</html>
