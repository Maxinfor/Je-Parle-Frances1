<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cyber-panel { background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(6, 182, 212, 0.3); }
        .glow-gold { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.8)); color: #FFD700; }
        .glow-silver { filter: drop-shadow(0 0 15px rgba(192, 192, 192, 0.8)); color: #C0C0C0; }
        .glow-bronze { filter: drop-shadow(0 0 15px rgba(205, 127, 50, 0.8)); color: #CD7F32; }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen p-6 font-mono">

    <!-- Container da Vitrine -->
    <div id="app" class="max-w-md mx-auto">
        <h2 class="text-cyan-400 text-center mb-6 tracking-[0.3em] uppercase text-sm">Inventário Elite</h2>
        <div id="vitrine" class="grid grid-cols-3 gap-4">
            <!-- As recompensas serão geradas aqui -->
        </div>
    </div>

    <script>
        const recompensas = [
            { nome: "Croissant de Bronze", icon: "🥐", style: "glow-bronze" },
            { nome: "Carro de Bronze", icon: "🏎️", style: "glow-bronze" },
            { nome: "Torre Eiffel de Bronze", icon: "🗼", style: "glow-bronze" },
            { nome: "Croissant de Prata", icon: "🥐", style: "glow-silver" },
            { nome: "Carro de Prata", icon: "🏎️", style: "glow-silver" },
            { nome: "Torre Eiffel de Prata", icon: "🗼", style: "glow-silver" },
            { nome: "Croissant de Ouro", icon: "🥐", style: "glow-gold" },
            { nome: "Carro de Ouro", icon: "🏎️", style: "glow-gold" },
            { nome: "Torre Eiffel de Ouro", icon: "🗼", style: "glow-gold" }
        ];

        // Estado do jogador (quantas recompensas liberou)
        let nivelConcluidos = 3; // Exemplo: 3 recompensas ganhas

        function renderizarVitrine() {
            const container = document.getElementById('vitrine');
            container.innerHTML = recompensas.map((r, idx) => `
                <div class="cyber-panel p-4 rounded-xl flex flex-col items-center justify-center aspect-square ${idx < nivelConcluidos ? 'opacity-100' : 'opacity-20 grayscale'}">
                    <div class="text-3xl ${idx < nivelConcluidos ? r.style : ''}">
                        ${r.icon}
                    </div>
                    <span class="text-[8px] mt-2 text-center uppercase truncate w-full">${idx < nivelConcluidos ? r.nome : 'LOCKED'}</span>
                </div>
            `).join('');
        }

        renderizarVitrine();
    </script>
</body>
</html>
