<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRANCÊS GOURMET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-radius: 20px; }
        .correct { background-color: #059669 !important; }
        .wrong { background-color: #dc2626 !important; }
        .baguette-slot { height: 20px; width: 100%; border-radius: 10px; margin-bottom: 5px; transition: 0.5s; }
    </style>
</head>
<body class="p-4">
    <div id="app" class="max-w-md mx-auto"></div>

    <script>
        let progresso = parseInt(localStorage.getItem('progresso')) || 1;
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        
        // Ingredientes da baguete baseados no progresso
        const ingredientes = ["", "🧀 Queijo", "🥓 Presunto", "🍅 Tomate", "🥬 Alface", "🥖 BAGUETE GIGANTE!"];
        
        const db = {
            fases: {
                1: { titulo: "A1: Cumprimentos", questoes: [{q: "Como se diz 'Bom dia'?", r: "bonjour", tipo: "escrita"}] },
                2: { titulo: "A1: Restaurante", questoes: [{q: "Complete: '___ l'addition'", r: "l'addition", tipo: "escrita"}] },
                6: { titulo: "A2: Rotina", questoes: [{q: "Je ___ lève (Eu me levanto)", r: "me", opcoes: ["te", "me", "se"], tipo: "escolha"}] },
                7: { titulo: "A2: Família", questoes: [{q: "___ mère (Minha mãe)", r: "ma", opcoes: ["mon", "ma", "mes"], tipo: "escolha"}] }
            }
        };

        function renderMenu() {
            let nivelAtual = progresso <= 2 ? "Nível A1 (Iniciante)" : "Nível A2 (Sobrevivência)";
            let html = `<div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-cyan-400">FRANCÊS A1-A2</h1>
                <p class="text-sm opacity-70">${nivelAtual}</p>
                <div class="mt-4 p-4 glass">
                    <p class="text-xs font-bold uppercase tracking-widest text-yellow-500">Sua Baguete:</p>
                    <div id="baguette-display" class="mt-2 text-sm">${ingredientes.slice(1, progresso).join(" + ") || "Vazia..."}</div>
                </div>
            </div><div class="grid grid-cols-1 gap-4">`;

            for (let id in db.fases) {
                let bloqueado = parseInt(id) > progresso;
                html += `<div class="glass p-4 text-center cursor-pointer ${bloqueado ? 'opacity-30' : ''}" 
                        onclick="${bloqueado ? 'alert(\'Conclua a fase anterior!\')' : `startQuiz('${id}')`}">
                        ${db.fases[id].titulo} ${bloqueado ? '🔒' : '🔓'}</div>`;
            }
            document.getElementById('app').innerHTML = html + `</div>`;
        }

        function startQuiz(id) {
            const q = db.fases[id].questoes[0];
            let html = `<div class="glass p-8 text-center" id="quiz-box">
                <h2 class="text-xl mb-6">${q.q}</h2>`;
            
            if (q.tipo === "escolha") {
                q.opcoes.forEach(op => html += `<button class="btn-opt block w-full bg-slate-800 p-3 rounded-xl mb-2" onclick="verificar('${id}', '${q.r}', '${op}', this)">${op}</button>`);
            } else {
                html += `<input id="ans" class="w-full p-4 rounded-xl bg-slate-900 text-center mb-4 text-white" placeholder="Sua resposta...">
                         <button class="w-full bg-cyan-500 py-3 rounded-xl font-bold" onclick="verificar('${id}', '${q.r}', document.getElementById('ans').value, this)">RESPONDER</button>`;
            }
            document.getElementById('app').innerHTML = html + `</div>`;
        }

        function verificar(id, expected, input, element) {
            const isCorrect = input.toLowerCase().trim() === expected.toLowerCase();
            
            // Feedback visual: Pinta de verde ou vermelho
            element.classList.add(isCorrect ? 'correct' : 'wrong');
            
            if (isCorrect) {
                setTimeout(() => {
                    alert("Bravo! Você ganhou um novo ingrediente! ✨");
                    if (parseInt(id) === progresso) { 
                        progresso++; 
                        localStorage.setItem('progresso', progresso); 
                    }
                    renderMenu();
                }, 800);
            } else {
                // Se errou, mostra a certa em verde
                setTimeout(() => {
                    alert("Ops! A resposta certa era: " + expected);
                    renderMenu();
                }, 1000);
            }
        }

        renderMenu();
    </script>
</body>
</html>
