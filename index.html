<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cyber-panel { background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(6, 182, 212, 0.3); }
        .badge-slot { 
            width: 80px; height: 80px; 
            border: 2px dashed rgba(6, 182, 212, 0.5); 
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; font-size: 24px;
        }
        .badge-unlocked { 
            background: rgba(6, 182, 212, 0.2); 
            border: 2px solid #06b6d4; 
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen p-4 font-mono">

    <div class="max-w-2xl mx-auto">
        <h2 class="text-cyan-400 text-center mb-6 tracking-[0.2em] uppercase">Estante de Conquistas</h2>

        <div class="cyber-panel p-6 rounded-xl">
            <div class="flex justify-center gap-6">
                <!-- Badge 1: Nível 1 -->
                <div class="badge-slot badge-unlocked" title="Fundamentos A1">
                    🇫🇷
                </div>
                <!-- Badge 2: Pendente -->
                <div class="badge-slot opacity-50" title="Bloqueado">
                    🔒
                </div>
                <!-- Badge 3: Pendente -->
                <div class="badge-slot opacity-50" title="Bloqueado">
                    🔒
                </div>
            </div>
            <p class="text-center mt-4 text-xs text-gray-400 uppercase tracking-widest">
                Conquista: Fundamentos A1 (Desbloqueada)
            </p>
        </div>
    </div>
</body>
</html>
