<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jornada Francesa | Elite Medals</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@600&display=swap');
        
        :root { 
            --bg: #050b1a; 
            --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32;
        }

        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 40px 20px; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 800px; }
        
        /* Medalhas Visuais */
        .medal-case { display: flex; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; margin-bottom: 40px; border: 2px solid #333; }
        .medal { 
            width: 100px; height: 100px; border-radius: 50%; border: 6px solid #444; 
            display: flex; align-items: center; justify-content: center; font-size: 2em;
            background: #222; transition: 0.5s; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .medal.bronze { border-color: var(--bronze); background: var(--bronze); color: #fff; }
        .medal.prata { border-color: var(--silver); background: var(--silver); color: #000; }
        .medal.ouro { border-color: var(--gold); background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); }

        .card { background: rgba(255,255,255,0.08); padding: 60px; border-radius: 40px; backdrop-filter: blur(15px); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5em; text-align: center; color: #00f2fe; margin-bottom: 30px; }
        p { font-size: 1.8em; text-align: center; margin-bottom: 40px; font-weight: 600; }
        .btn { display: block; width: 100%; padding: 30px; margin: 20px 0; background: #1a2235; border: 3px solid #444; color: #fff; border-radius: 20px; cursor: pointer; font-size: 1.5em; font-weight: 700; transition: 0.3s; }
        .btn:hover { border-color: #00f2fe; background: rgba(0,242,254,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="medal-case">
        <div class="medal" id="m-gramatica">G</div>
        <div class="medal" id="m-conv">C</div>
        <div class="medal" id="m-cultura">A</div>
    </div>

    <div class="card">
        <h1 id="titulo">Selecione o Treino</h1>
        <div id="game-area">
            <button class="btn" onclick="iniciar('gramatica')">Gramática (A2)</button>
            <button class="btn" onclick="iniciar('conv')">Conversação (A2)</button>
            <button class="btn" onclick="iniciar('cultura')">Cultura (Quiz)</button>
        </div>
    </div>
</div>

<script>
    const db = {
        gramatica: [{q: "Como dizer 'eu comi'?", o: ["J'ai mangé", "Je mangeais"], c: 0}],
        conv: [{q: "Como responder a 'Tu veux un café'?", o: ["Oui, avec plaisir!", "Non, je déteste."], c: 0}],
        cultura: [{q: "Onde fica a Torre Eiffel?", o: ["Paris", "Lyon"], c: 0}]
    };

    let prog = { gramatica: {pts: 0, nivel: 0}, conv: {pts: 0, nivel: 0}, cultura: {pts: 0, nivel: 0} };
    const tiers = ['', 'bronze', 'prata', 'ouro'];

    function iniciar(tipo) {
        let q = db[tipo][0]; // Exemplo simplificado
        document.getElementById('titulo').innerText = tipo.toUpperCase();
        document.getElementById('game-area').innerHTML = `<p>${q.q}</p>` + 
            q.o.map((txt, i) => `<button class='btn' onclick='verificar("${tipo}", ${i}, ${q.c})'>${txt}</button>`).join('');
    }

    function verificar(tipo, sel, corr) {
        if(sel === corr) {
            prog[tipo].pts++;
            if(prog[tipo].pts >= 5 && prog[tipo].nivel < 3) {
                prog[tipo].nivel++;
                prog[tipo].pts = 0;
                document.getElementById('m-' + tipo).className = 'medal ' + tiers[prog[tipo].nivel];
            }
            alert("Correto! Progresso: " + prog[tipo].pts + "/5 para a próxima medalha.");
            window.location.reload();
        }
    }
</script>
</body>
</html>
