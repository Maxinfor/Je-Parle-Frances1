<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite System | Jornada Francesa</title>
    <style>
        /* CSS focado em performance e legibilidade */
        :root { --bg: #050b1a; --primary: #00f2fe; --bronze: #CD7F32; --silver: #C0C0C0; --gold: #FFD700; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; min-height: 100vh; margin: 0; }
        
        .container { width: 100%; max-width: 500px; }
        
        /* Estilo das Medalhas */
        .medal-case { display: flex; justify-content: space-around; padding: 20px 0; }
        .medal { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #333; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .active-bronze { border-color: var(--bronze); box-shadow: 0 0 10px var(--bronze); }
        .active-silver { border-color: var(--silver); box-shadow: 0 0 10px var(--silver); }
        .active-gold { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

        /* Card de Jogo */
        .card { background: #0a1128; padding: 30px; border-radius: 20px; border: 1px solid #1a2235; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 2px solid #333; color: white; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn:hover { border-color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="medal-case" id="medal-board">
        <div class="medal" id="medal-gramatica">G</div>
        <div class="medal" id="medal-conv">C</div>
        <div class="medal" id="medal-cultura">A</div>
    </div>

    <div class="card" id="app">
        <h2 id="titulo">Bem-vindo ao Elite System</h2>
        <div id="content">
            <button class="btn" onclick="render('gramatica')">Gramática</button>
            <button class="btn" onclick="render('conv')">Conversação</button>
            <button class="btn" onclick="render('cultura')">Cultura</button>
        </div>
    </div>
</div>

<script>
    // Banco de dados centralizado
    const db = {
        gramatica: [{q: "Passé Composé de 'manger' (Eu)", o: ["J'ai mangé", "Je mangeais"], c: 0}],
        conv: [{q: "Como se diz 'quantos anos você tem'?", o: ["Quel âge as-tu?", "Comment tu as?"], c: 0}],
        cultura: [{q: "Capital da França?", o: ["Paris", "Lyon"], c: 0}]
    };

    let progresso = JSON.parse(localStorage.getItem('es_prog')) || { gramatica: 0, conv: 0, cultura: 0 };

    function render(modulo) {
        const content = document.getElementById('content');
        const q = db[modulo][0]; // Exemplo simples
        
        document.getElementById('titulo').innerText = modulo.toUpperCase();
        content.innerHTML = `<p>${q.q}</p>` + 
            q.o.map((txt, i) => `<button class="btn" onclick="check('${modulo}', ${i}, ${q.c})">${txt}</button>`).join('');
    }

    function check(modulo, sel, corr) {
        if(sel === corr) {
            progresso[modulo]++;
            localStorage.setItem('es_prog', JSON.stringify(progresso));
            alert("Correto!");
            render(modulo);
        } else {
            alert("Errado! Tente de novo.");
        }
    }
</script>
</body>
</html>
