<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>A Magia dos Cumprimentos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .bubble { background: #e1f5fe; padding: 15px; border-radius: 15px; margin-bottom: 20px; font-size: 1.1em; border-left: 5px solid #039be5; }
        .btn { display: block; width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 10px; background: #fff; border: 2px solid #ddd; cursor: pointer; text-align: left; transition: 0.2s; }
        .btn:hover:not(:disabled) { background: #f5f5f5; }
        .correct { background: #c8e6c9 !important; border-color: #4caf50 !important; }
        .wrong { background: #ffcdd2 !important; border-color: #f44336 !important; }
        #next { display: none; width: 100%; padding: 15px; background: #ffa000; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="game">
        <div class="bubble" id="pergunta">Carregando...</div>
        <div id="opcoes"></div>
        <p id="exp" style="font-size: 0.9em; color: #555;"></p>
        <button id="next" onclick="irParaProxima()">CONTINUAR A JORNADA ➔</button>
    </div>
</div>

<script>
    const missao = [
        { q: "Na França, cumprimentar não é apenas ser gentil, é uma senha. Qual é a 'senha' que abre todas as portas antes de qualquer pedido?", o: ["Pardon", "Bonjour", "S'il vous plaît"], c: 1, e: "O 'Bonjour' reconhece que o outro é um ser humano antes de ser um atendente." },
        { q: "Você chegou na padaria às 19h. O 'Bonjour' soa estranho agora. Como você ajusta seu radar noturno?", o: ["Bonne nuit", "Bonsoir", "Salut"], c: 1, e: "Bonsoir é usado a partir do fim da tarde para mostrar que você respeita o ciclo do dia." },
        { q: "Você conheceu um estudante na fila da faculdade. Ele tem sua idade. Qual o nível de senha ideal?", o: ["Bonjour, Monsieur", "Salut !", "Pardon"], c: 1, e: "Salut! é perfeito para pares, amigos e pessoas informais. O 'Bonjour' seria formal demais aqui." }
    ];

    let i = 0;

    function carregarMissao() {
        const m = missao[i];
        document.getElementById('pergunta').innerText = m.q;
        document.getElementById('opcoes').innerHTML = '';
        document.getElementById('exp').innerText = '';
        document.getElementById('next').style.display = 'none';

        m.o.forEach((txt, idx) => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = txt;
            b.onclick = () => checar(idx, b);
            document.getElementById('opcoes').appendChild(b);
        });
    }

    function checar(idx, btn) {
        const btns = document.querySelectorAll('.btn');
        btns.forEach(b => b.disabled = true);
        if(idx === missao[i].c) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            btns[missao[i].c].classList.add('correct');
        }
        document.getElementById('exp').innerText = "💡 " + missao[i].e;
        document.getElementById('next').style.display = 'block';
    }

    function irParaProxima() {
        i++;
        if(i < missao.length) {
            carregarMissao();
        } else {
            document.getElementById('game').innerHTML = "<h2>🎉 Você destravou os cumprimentos!</h2><p>Agora você sabe quando ser formal ou informal.</p>";
        }
    }

    // Inicialização segura
    document.addEventListener('DOMContentLoaded', carregarMissao);
</script>
</body>
</html>
