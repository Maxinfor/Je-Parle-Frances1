<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Francês A1 - Passaporte de Prêmios</title>
    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --success: #27ae60;
            --error: #e74c3c;
            --warning: #f39c12;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            box-sizing: border-box;
        }

        .app-container { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 480px; 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .hearts { font-size: 1.3em; letter-spacing: 2px; }

        /* Estante de Prêmios Famosos */
        .trophy-section {
            background: #f8fafc;
            padding: 15px;
            border-radius: 18px;
            border: 2px solid #e2e8f0;
            margin-bottom: 20px;
        }
        .trophy-title {
            font-size: 0.8em;
            font-weight: bold;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .trophy-container {
            display: flex;
            justify-content: space-around;
        }
        .trophy-slot {
            width: 70px;
            height: 70px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2em;
            filter: grayscale(100%);
            opacity: 0.25;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            border: 2px dashed #b5c2d1;
        }
        .trophy-slot.unlocked {
            filter: grayscale(0%);
            opacity: 1;
            background: #fff;
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3);
            transform: scale(1.12) rotate(4deg);
            border: 2px solid var(--warning);
        }

        /* Alerta de Última Pergunta (Mecânica de Antecipação) */
        .boss-alert {
            display: none;
            background: linear-gradient(135deg, #e74c3c, #f39c12);
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.2);
            animation: pulse 1s infinite alternate;
        }

        .progress-container {
            background: #eee;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            background: var(--success);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }
        
        .character-zone { 
            display: flex; 
            align-items: center; 
            margin: 20px 0; 
            background: #f8fafc; 
            padding: 18px; 
            border-radius: 16px; 
            border-left: 6px solid var(--primary); 
            text-align: left; 
        }
        .char-avatar { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            border: 3px solid #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin-right: 15px; 
            background-size: cover; 
            background-position: center; 
            flex-shrink: 0; 
        }
        .dialogue-box { flex-grow: 1; }
        .char-name { font-weight: bold; color: #2c3e50; font-size: 0.85em; margin-bottom: 3px; text-transform: uppercase; }
        .char-bubble { font-size: 1.05em; color: #34495e; margin: 0; line-height: 1.4; }
        .location-badge { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 3px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; margin-bottom: 6px; }
        
        .explanation-box {
            display: none;
            background: #fdf6e2;
            border: 1px solid #f39c12;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: left;
            font-size: 0.9em;
            color: #7e5109;
        }

        .choices { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        button { 
            padding: 15px; 
            border-radius: 14px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1em; 
            transition: all 0.2s;
        }
        button:hover { background: var(--primary-dark); }
        
        .choice-btn.correct { background: var(--success) !important; }
        .choice-btn.wrong { background: var(--error) !important; }
        
        #next-btn { background: var(--warning); width: 100%; margin-top: 15px; display: none; }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Tela Inicial -->
    <div id="start-screen">
        <h1>🇫🇷 Sua Viagem Começa Aqui!</h1>
        <p>Passe pelos níveis do currículo mundial de francês e conquiste os maiores monumentos da França para o seu armário de prêmios!</p>
        <button style="background: var(--success); width:100%" onclick="iniciarApp()">Entrar no Jogo ✈️</button>
    </div>

    <!-- Interface do Jogo -->
    <div id="game-ui" style="display:none;">
        <div class="status-bar">
            <span id="hearts-display" class="hearts">❤️❤️❤️</span>
            <span id="score-display" style="font-weight: bold; color: #7f8c8d;">Nível 1 - 1/3</span>
        </div>

        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <!-- Estante com os Grandes Prêmios Desejados -->
        <div class="trophy-section">
            <div class="trophy-title">Seus Prêmios Históricos:</div>
            <div class="trophy-container">
                <div id="trophy-0" class="trophy-slot">🏛️</div>
                <div id="trophy-1" class="trophy-slot">🗼</div>
                <div id="trophy-2" class="trophy-slot">👑</div>
            </div>
        </div>

        <!-- Alerta Dinâmico de Antecipação de Prêmio -->
        <div id="boss-alert" class="boss-alert"></div>
        
        <h3 id="titulo-fase">Carregando...</h3>
        
        <div class="character-zone">
            <div class="char-avatar" id="char-avatar"></div>
            <div class="dialogue-box">
                <span class="location-badge" id="location-badge">LOCAL</span>
                <div class="char-name" id="char-name">Nome</div>
                <p class="char-bubble" id="pergunta">Pergunta...</p>
            </div>
        </div>

        <div id="choices" class="choices"></div>
        <div id="explanation-box" class="explanation-box"></div>
        <button id="next-btn" onclick="avancarMissao()">Avançar ➔</button>
    </div>
</div>

<script>
    const avatar = {
        boulanger: "https://images.unsplash.com/photo-1579038773843-c5a5ae27546c?w=150", 
        policial: "https://images.unsplash.com/photo-1600180758890-6b945f9a2ba6?w=150",  
        viajante: "https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=150",
        amigo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150",
        passante: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150"
    };

    // Banco de Dados estruturado pelo Sistema Mundial de Ensino CECRL A1
    const niveis = [
        {
            nome: "Nível 1: Cumprimentos & Polidez",
            premioNome: "🏛️ O Museu do Louvre",
            missoes: [
                { local: "Boulangerie", npc: "Jean (Padeiro)", foto: avatar.boulanger, pergunta: "Você entra na padaria pela manhã. Qual é o cumprimento obrigatório do padrão A1?", opcoes: [{t: "Salut!", c: false}, {t: "Bonjour!", c: true}], exp: "No padrão CECRL A1, 'Bonjour' é a base da polidez francesa ao entrar em comércios. 'Salut' é estritamente informal." },
                { local: "Rua de Paris", npc: "Desconhecido", foto: avatar.passante, pergunta: "Como pedir informação a alguém mais velho na rua respeitando a gramática formal?", opcoes: [{t: "Pardon, vous Pouvez m'aider?", c: true}, {t: "Pardon, tu peux m'aider?", c: false}], exp: "A regra de ouro internacional do francês: use sempre o 'Vous' (formal) para falar com estranhos e autoridades locais." }
            ]
        },
        {
            nome: "Nível 2: Identidade & Nacionalidade",
            premioNome: "🗼 A Torre Eiffel",
            missoes: [
                { local: "Alfândega", npc: "Agente Pierre", foto: avatar.policial, pergunta: "O guarda pede seu nome: 'Quel est votre nom?'. Responda corretamente:", opcoes: [{t: "Je m'appelle Idney.", c: true}, {t: "Je suis chamado Idney.", c: false}], exp: "Estrutura oficial do francês para se apresentar exige o verbo pronominal reflexivo 'S'appeler' (Chamar-se)." },
                { local: "Hostel", npc: "Thomas (Turista)", foto: avatar.amigo, pergunta: "Ele te pergunta sua idade. No sistema europeu, qual verbo usamos para falar a idade?", opcoes: [{t: "Je suis 25 ans.", c: false}, {t: "J'ai 25 ans.", c: true}], exp: "Erro de tradução clássico! Em francês, nós TEMOS anos (Verbo Avoir - J'ai), nunca dizemos que 'somos' a idade." }
            ]
        },
        {
            nome: "Nível 3: Números & Compras",
            premioNome: "👑 O Palácio de Versalhes",
            missoes: [
                { local: "Feira de Rua", npc: "Vendedor", foto: avatar.boulanger, pergunta: "Você quer saber o valor de uma recordação da viagem. Como perguntar o preço?", opcoes: [{t: "C'est combien?", c: true}, {t: "Combien est?", c: false}], exp: "Para transações comerciais simples do nível A1, a expressão consagrada e correta é 'C'est combien?' (Custa quanto?)." },
                { local: "Boutique de Paris", npc: "Atendente", foto: avatar.viajante, pergunta: "Você vai comprar presentes e precisa pedir exatamente TRÊS itens. Como se diz o número 3?", opcoes: [{t: "Trois itens.", c: true}, {t: "Deux itens.", c: false}], exp: "O vocabulário básico de contagem exige a fixação clara dos numerais cardinais: Un (1), Deux (2), Trois (3)." }
            ]
        }
    ];

    let nivelAtual = 0;
    let indiceMissao = 0;
    let vidas = 3;
    let premiosDesbloqueados = [];

    function iniciarApp() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        renderizar();
    }

    function renderizar() {
        document.getElementById('hearts-display').innerText = "❤️".repeat(vidas) + "🖤".repeat(3 - vidas);
        
        // Atualiza visualmente a estante de prêmios no topo da tela
        premiosDesbloqueados.forEach(idx => {
            document.getElementById('trophy-' + idx).classList.add('unlocked');
        });

        // Fim do Jogo completo
        if (nivelAtual >= niveis.length) {
            document.getElementById('titulo-fase').innerText = "🏆 JORNADA COMPLETA!";
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('boss-alert').style.display = 'none';
            document.getElementById('character-zone').style.display = 'none';
            document.getElementById('choices').innerHTML = `<p style='color:var(--success); font-weight:bold; font-size:1.15em;'>Incroyable! Você passou pelos 3 níveis fundamentais da gramática mundial e conquistou o Louvre, a Torre Eiffel e o Palácio de Versalhes! 🏛️🗼👑</p>`;
            return;
        }

        const nivel = niveis[nivelAtual];
        const m = nivel.missoes[indiceMissao];
        const totalMissoes = nivel.missoes.length;

        // Atualização dos indicadores de texto e barras de progresso
        document.getElementById('titulo-fase').innerText = nivel.nome;
        document.getElementById('score-display').innerText = `Nível ${nivelAtual + 1} — Etapa ${indiceMissao + 1}/${totalMissoes}`;
        document.getElementById('progress-bar').style.width = ((indiceMissao / totalMissoes) * 100) + "%";

        document.getElementById('location-badge').innerText = m.local.toUpperCase();
        document.getElementById('char-name').innerText = m.npc;
        document.getElementById('char-avatar').style.backgroundImage = `url('${m.foto}')`;
        document.getElementById('pergunta').innerText = m.pergunta;

        // Limpeza de estados de tela antigos
        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        const alertBox = document.getElementById('boss-alert');
        
        // MECÂNICA DE ANTECIPAÇÃO: Se for a última pergunta do nível, avisa o prêmio!
        if (indiceMissao === totalMissoes - 1) {
            alertBox.innerHTML = `🔥 VALENDO PRÊMIO! Se você acertar esta última pergunta, desbloqueará: <strong>${nivel.premioNome}</strong>!`;
            alertBox.style.style.display = 'block'; // Fallback em caso de erro na string de estilo
            alertBox.style.display = 'block';
        } else {
            alertBox.style.display = 'none';
        }

        // Renderização dos botões de opções
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';
        m.opcoes.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = opt.t;
            btn.onclick = (e) => verificar(opt.c, e.target, m.exp);
            choicesDiv.appendChild(btn);
        });
    }

    function verificar(correta, elemento, explicacao) {
        // Bloqueia cliques adicionais nos botões da rodada
        const botões = document.querySelectorAll('.choice-btn');
        botões.forEach(b => b.disabled = true);

        const expBox = document.getElementById('explanation-box');
        expBox.innerHTML = explicacao;
        expBox.style.display = 'block';

        if (correta) {
            elemento.classList.add('correct');
            
            const nivel = niveis[nivelAtual];
            // Verifica se acabou de acertar a última pergunta para liberar o prêmio
            if (indiceMissao === nivel.missoes.length - 1) {
                if (!premiosDesbloqueados.includes(nivelAtual)) {
                    premiosDesbloqueados.push(nivelAtual);
                }
                // Ilumina o prêmio correspondente na estante imediatamente
                document.getElementById('trophy-' + nivelAtual).classList.add('unlocked');
                expBox.innerHTML += `<br><br><span style='color:var(--success); font-weight:bold;'>🎉 RECOMPENSA CONQUISTADA: Você ganhou o prêmio ${nivel.premioNome}!</span>`;
            }
            
            document.getElementById('next-btn').style.display = 'block';
        } else {
            elemento.classList.add('wrong');
            vidas--;
            
            if (vidas <= 0) {
                alert("Energia esgotada! Vamos reestudar este nível desde o começo.");
                vidas = 3;
                indiceMissao = 0;
                renderizar();
            } else {
                document.getElementById('next-btn').style.display = 'block';
            }
        }
    }

    function avancarMissao() {
        indiceMissao++;
        // Se concluiu todas as missões do nível atual, passa para o próximo nível de ensino
        if (indiceMissao >= niveis[nivelAtual].missoes.length) {
            nivelAtual++;
            indiceMissao = 0;
        }
        renderizar();
    }
</script>
</body>
</html>
