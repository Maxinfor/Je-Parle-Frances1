<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaDu Pro - Currículo Oficial A1 (CIL)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen flex flex-col justify-between select-none">

    <!-- Container Principal do App -->
    <div id="app" class="w-full max-w-md mx-auto p-6 flex flex-col justify-between flex-grow">
        <!-- O conteúdo dinâmico será injetado aqui -->
    </div>

    <script>
        // Estado do Jogo - Currículo CIL A1
        let estado = {
            tela: 'menu', 
            vidas: 3,
            questaoAtualIndex: 0,
            xp: 0,
            nivelAtual: 1
        };

        // Função de Áudio Profissional Oficial (Français Natif)
        function tocarAudio(texto) {
            const textoCodificado = encodeURIComponent(texto);
            const urlAudio = `https://translate.google.com/translate_tts?ie=UTF-8&q=${textoCodificado}&tl=fr&client=tw-ob`;
            const audio = new Audio(urlAudio);
            audio.playbackRate = 0.85;
            audio.play().catch(erro => console.log("Áudio indisponível:", erro));
        }

        // Banco de Questões baseado estritamente nas diretrizes e eixos temáticos do Currículo A1 do CIL (Centros de Línguas)
        const questoes = [
            {
                eixo: "Eixo 1: Identidade e Apresentações",
                materia: {
                    titulo: "Se présenter (Apresentação Pessoal)",
                    explicacao: "Segundo o currículo do CIL, no nível A1 o aluno deve saber se apresentar, dizer o nome, idade e nacionalidade básica em interações simples.",
                    imagem: "https://images.unsplash.com/photo-1543269865-cbf427effbad?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Bonjour, je m'appelle Pierre et je suis brésilien."
                },
                exercicio: {
                    pergunta: "Em um diálogo de apresentação, como você diz o seu nome em francês?",
                    imagemExercicio: "https://images.unsplash.com/photo-1543269865-cbf427effbad?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je m'appelle...",
                    audioTraducaoFR: "Eu me chamo...",
                    opcoes: ['Je m\'appelle...', 'Au revoir', 'Merci beaucoup', 'Il fait froid'],
                    correta: 0
                }
            },
            {
                eixo: "Eixo 2: A Família e Relações Próximas",
                materia: {
                    titulo: "La Famille (Membros da Família)",
                    explicacao: "O programa aborda o vocabulário essencial para descrever os membros da família e lares.",
                    imagem: "https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Voici ma mère, mon père et mon frère."
                },
                exercicio: {
                    pergunta: "Como se diz \"mãe\" em francês no contexto familiar?",
                    imagemExercicio: "https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Ma mère",
                    audioTraducaoFR: "Minha mãe",
                    opcoes: ['Mon père', 'Ma mère', 'Mon frère', 'Ma sœur'],
                    correta: 1
                }
            },
            {
                eixo: "Eixo 3: Habitação e Moradia",
                    materia: {
                    titulo: "La Maison (A Casa e Cômodos)",
                    explicacao: "Descrever onde se mora, cômodos da casa e objetos do cotidiano doméstico.",
                    imagem: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "J'habite dans un grand appartement à Paris."
                },
                exercicio: {
                    pergunta: "Como você diz que mora em uma casa ou apartamento?",
                    imagemExercicio: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'habite à...",
                    audioTraducaoFR: "Eu moro em...",
                    opcoes: ['Je mange du pain', 'J\'habite à...', 'Je suis fatigué', 'Au revoir'],
                    correta: 1
                }
            },
            {
                eixo: "Eixo 4: Atividades Cotidianas e Lazer",
                materia: {
                    titulo: "Les Loisirs (Hobbies e Esportes)",
                    explicacao: "Falar sobre o que gosta de fazer no tempo livre, esportes e gostos pessoais.",
                    imagem: "https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "J'aime jouer au football et écouter de la musique."
                },
                exercicio: {
                    pergunta: "Como você expressa que gosta de algo no seu lazer?",
                    imagemExercicio: "https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'aime...",
                    audioTraducaoFR: "Eu gosto de...",
                    opcoes: ['Je déteste', 'J\'aime...', 'Je ne sais pas', 'Où est'],
                    correta: 1
                }
            },
            {
                eixo: "Eixo 5: Alimentação e Hábitos",
                materia: {
                    titulo: "L'Alimentation (Comidas e Bebidas)",
                    explicacao: "Expressar preferências alimentares, fazer compras em feiras e mercados locais.",
                    imagem: "https://images.unsplash.com/photo-1550989460-0adf9ea622e2?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Je voudrais acheter des fruits frais et du pain."
                },
                exercicio: {
                    pergunta: "Como você pede educadamente algo na padaria ou mercado?",
                    imagemExercicio: "https://images.unsplash.com/photo-1550989460-0adf9ea622e2?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je voudrais...",
                    audioTraducaoFR: "Eu gostaria de...",
                    opcoes: ['Je suis', 'Je voudrais...', 'Il y a', 'C\'est combien'],
                    correta: 1
                }
            },
            {
                eixo: "Eixo 6: A Cidade e Direções",
                materia: {
                    titulo: "La Ville (Locais e Ruas)",
                    explicacao: "Saber se orientar na cidade, perguntar por lugares públicos e direções básicas.",
                    imagem: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Pardon, où se trouve la pharmacie la plus proche?"
                },
                exercicio: {
                    pergunta: "Como perguntar onde fica um lugar específico na cidade?",
                    imagemExercicio: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Où se trouve...?",
                    audioTraducaoFR: "Onde se encontra...?",
                    opcoes: ['Comment ça va', 'Où se trouve...?', 'Bonne nuit', 'Merci bien'],
                    correta: 1
                }
            },
            {
                eixo: "Eixo 7: Profissões e Trabalho",
                materia: {
                    titulo: "Les Professions (O Trabalho)",
                    explicacao: "Identificar ocupações profissionais comuns e falar sobre o próprio trabalho.",
                    imagem: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Je travaille dans un bureau au centre-ville."
                },
                exercicio: {
                    pergunta: "Como dizer onde você trabalha?",
                    imagemExercicio: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je travaille...",
                    audioTraducaoFR: "Eu trabalho...",
                    opcoes: ['Je suis étudiant', 'Je travaille...', 'J\'ai un chat', 'Il fait beau'],
                    correta: 1
                }
            },
            {
                eixo: "Eixo 8: Saúde e Bem-Estar",
                materia: {
                    titulo: "La Santé (Sintomas e Corpo)",
                    explicacao: "Comunicar dores básicas, mal-estar e procurar ajuda médica com vocabulário simples.",
                    imagem: "https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "J'ai mal à la tête et besoin d'un médecin."
                },
                exercicio: {
                    pergunta: "Como relatar que está sentindo dor em alguma parte do corpo?",
                    imagemExercicio: "https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'ai mal à...",
                    audioTraducaoFR: "Eu estou com dor em...",
                    opcoes: ['J\'ai faim', 'J\'ai mal à...', 'Je suis heureux', 'J\'ai un livre'],
                    correta: 1
                }
            },
            {
                eixo: "Eixo 9: Viagens e Meios de Transporte",
                materia: {
                    titulo: "Les Voyages (Transportes)",
                    explicacao: "Comprar passagens, entender horários e interagir em estações de trem e aeroportos.",
                    imagem: "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Je prends le train pour aller à Lyon."
                },
                exercicio: {
                    pergunta: "Como dizer que você pega um meio de transporte?",
                    imagemExercicio: "https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je prends...",
                    audioTraducaoFR: "Eu pego...",
                    opcoes: ['Je vends', 'Je prends...', 'Je regarde', 'Je marche'],
                    correta: 1
                }
            },
            {
                eixo: "Eixo 10: Clima e Estações do Ano",
                materia: {
                    titulo: "La Météo (O Clima)",
                    explicacao: "Descrever o tempo meteorológico atual, se está ensolarado, chovendo ou frio.",
                    imagem: "https://images.unsplash.com/photo-1519692933481-e162a57d6721?auto=format&fit=crop&w=600&q=80",
                    audioExplicacao: "Aujourd'hui, il fait beau et du soleil à Nice."
                },
                exercicio: {
                    pergunta: "Como descrever que está fazendo bom tempo lá fora?",
                    imagemExercicio: "https://images.unsplash.com/photo-1519692933481-e162a57d6721?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Il fait beau",
                    audioTraducaoFR: "Está bom tempo",
                    opcoes: ['Il pleut', 'Il fait beau', 'Il fait froid', 'Il neige'],
                    correta: 1
                }
            }
        ];

        function renderizar() {
            const app = document.getElementById('app');
            
            if (estado.tela === 'menu') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="w-28 h-28 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-3xl flex items-center justify-center shadow-2xl shadow-blue-500/20 mb-6 animate-pulse border border-blue-400/30">
                            <span class="text-5xl">🏛️</span>
                        </div>
                        <h1 class="text-3xl font-extrabold mb-1 text-zinc-100">Currículo Oficial CIL</h1>
                        <p class="text-zinc-400 mb-6 text-sm">Os 10 Eixos Temáticos Oficiais do Francês A1</p>
                        
                        <div class="flex gap-3 mb-8 w-full justify-center">
                            <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <span class="text-yellow-400">⚡</span>
                                <div class="text-left"><div class="text-[10px] text-zinc-500 uppercase font-bold">XP</div><div class="text-sm font-bold text-zinc-200">${estado.xp}</div></div>
                            </div>
                            <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <span class="text-blue-400">📈</span>
                                <div class="text-left"><div class="text-[10px] text-zinc-500 uppercase font-bold">Progresso</div><div class="text-sm font-bold text-zinc-200">${estado.nivelAtual}/${questoes.length}</div></div>
                            </div>
                        </div>

                        <button onclick="iniciarLicao()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-extrabold rounded-2xl shadow-lg shadow-blue-600/20 transition active:scale-95 text-base">
                            INICIAR MATRIZ CIL
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'teoria') {
                const item = questoes[estado.questaoAtualIndex];
                const porcentagem = (estado.questaoAtualIndex / questoes.length) * 100;

                setTimeout(() => tocarAudio(item.materia.audioExplicacao), 400);

                app.innerHTML = `
                    <div class="flex flex-col justify-between flex-grow">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <button onclick="voltarMenu()" class="text-zinc-500 hover:text-zinc-300 font-bold text-lg">✕</button>
                                <div class="w-2/3 bg-zinc-800 h-3 rounded-full overflow-hidden">
                                    <div class="bg-blue-500 h-full transition-all duration-300" style="width: ${porcentagem}%"></div>
                                </div>
                                <div class="flex items-center gap-1 text-red-500 font-bold">
                                    <span>❤️</span> <span class="text-sm">${estado.vidas}</span>
                                </div>
                            </div>

                            <div class="text-blue-400 font-bold text-[11px] uppercase tracking-wider mb-2 text-center bg-blue-500/10 py-1.5 rounded-xl border border-blue-500/20">📘 ${item.eixo}</div>

                            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl mt-1">
                                <div class="relative h-40 w-full overflow-hidden">
                                    <img src="${item.materia.imagem}" class="w-full h-full object-cover brightness-90 hover:scale-105 transition duration-500">
                                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                </div>
                                <div class="p-4">
                                    <div class="flex justify-between items-center mb-1.5">
                                        <h2 class="text-base font-bold text-zinc-100">${item.materia.titulo}</h2>
                                        <button onclick="tocarAudio('${item.materia.audioExplicacao}')" class="w-8 h-8 bg-blue-500/20 text-blue-400 hover:bg-blue-500/30 rounded-full flex items-center justify-center transition shrink-0" title="Ouvir conteúdo">
                                            🔊
                                        </button>
                                    </div>
                                    <p class="text-zinc-300 text-xs leading-relaxed">${item.materia.explicacao}</p>
                                </div>
                            </div>
                        </div>

                        <button onclick="irParaExercicio()" class="w-full py-3.5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/25 transition mt-3 active:scale-95 text-xs">
                            PRATICAR EXERCÍCIO DO EIXO
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'licao') {
                const item = questoes[estado.questaoAtualIndex];
                const q = item.exercicio;
                const porcentagem = ((estado.questaoAtualIndex + 0.5) / questoes.length) * 100;

                app.innerHTML = `
                    <div class="flex flex-col justify-between flex-grow">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <button onclick="voltarMenu()" class="text-zinc-500 hover:text-zinc-300 font-bold text-lg">✕</button>
                                <div class="w-2/3 bg-zinc-800 h-3 rounded-full overflow-hidden">
                                    <div class="bg-green-500 h-full transition-all duration-300" style="width: ${porcentagem}%"></div>
                                </div>
                                <div class="flex items-center gap-1 text-red-500 font-bold">
                                    <span>❤️</span> <span class="text-sm">${estado.vidas}</span>
                                </div>
                            </div>

                            <div class="text-[11px] font-bold text-emerald-400 uppercase tracking-wider mb-1">Aplicação Prática:</div>
                            <h2 class="text-zinc-300 font-semibold text-xs mb-3 leading-relaxed">${q.pergunta}</h2>
                            
                            <div class="bg-zinc-900 rounded-3xl border border-zinc-800 overflow-hidden mb-3 shadow-xl">
                                <div class="h-28 w-full overflow-hidden relative">
                                    <img src="${q.imagemExercicio}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                </div>
                                <div class="p-3 flex items-center justify-between bg-zinc-900">
                                    <div>
                                        <div class="text-[9px] text-zinc-500 uppercase font-semibold">Estrutura em Francês</div>
                                        <div class="text-sm font-bold text-zinc-100">${q.audioFrances}</div>
                                    </div>
                                    <button onclick="tocarAudio('${q.audioFrances}')" class="w-10 h-10 bg-green-500 hover:bg-green-400 text-zinc-950 rounded-2xl flex items-center justify-center text-base shadow-lg transition active:scale-95 shrink-0" title="Ouvir áudio nativo">
                                        🔊
                                    </button>
                                </div>
                            </div>

                            <div class="flex flex-col gap-2" id="opcoes-container">
                                ${q.opcoes.map((opcao, index) => `
                                    <button onclick="verificarResposta(${index})" class="opcao-btn p-3 bg-zinc-900 border-2 border-zinc-800 hover:border-zinc-700 rounded-2xl text-left font-medium text-zinc-200 transition active:scale-[0.98] text-xs">
                                        ${opcao}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div></div>
                    </div>
                `;
            } else if (estado.tela === 'vitoria') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="text-6xl mb-4 animate-bounce">🏆</div>
                        <h1 class="text-3xl font-extrabold mb-2 text-green-400">Matriz A1 Concluída!</h1>
                        <p class="text-zinc-400 mb-8 text-sm">Você concluiu todos os eixos temáticos oficiais do currículo com excelência. Ganhou <strong>+120 XP</strong>.</p>
                        <button onclick="reiniciarJornada()" class="w-full py-4 bg-green-500 hover:bg-green-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-green-500/20 transition">
                            REINICIAR CURRÍCULO
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'derrota') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="text-6xl mb-4 animate-bounce">💡</div>
                        <h1 class="text-3xl font-extrabold mb-2 text-red-500">Vidas esgotadas!</h1>
                        <p class="text-zinc-400 mb-8 text-sm">Revise os eixos temáticos com calma e tente novamente.</p>
                        <button onclick="iniciarLicao()" class="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-extrabold rounded-2xl shadow-lg shadow-red-600/20 transition">
                            TENTAR NOVAMENTE
                        </button>
                    </div>
                `;
            }
        }

        function iniciarLicao() {
            estado.vidas = 3;
            estado.questaoAtualIndex = 0;
            estado.tela = 'teoria';
            renderizar();
        }

        function irParaExercicio() {
            estado.tela = 'licao';
            renderizar();
        }

        function reiniciarJornada() {
            estado.xp += 120;
            estado.nivelAtual = 1;
            estado.questaoAtualIndex = 0;
            estado.tela = 'menu';
            renderizar();
        }

        function verificarResposta(indexSelecionado) {
            const item = questoes[estado.questaoAtualIndex];
            const q = item.exercicio;
            const botoes = document.querySelectorAll('.opcao-btn');
            
            botoes.forEach(b => b.disabled = true);

            if (indexSelecionado === q.correta) {
                botoes[indexSelecionado].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[indexSelecionado].classList.add('bg-green-600/30', 'border-green-500', 'text-green-300');
                
                setTimeout(() => {
                    estado.questaoAtualIndex++;
                    estado.nivelAtual = estado.questaoAtualIndex + 1;
                    if (estado.questaoAtualIndex >= questoes.length) {
                        estado.tela = 'vitoria';
                    } else {
                        estado.tela = 'teoria';
                    }
                    renderizar();
                }, 900);
            } else {
                botoes[indexSelecionado].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[indexSelecionado].classList.add('bg-red-600/30', 'border-red-500', 'text-red-300');
                botoes[q.correta].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[q.correta].classList.add('bg-green-600/30', 'border-green-500', 'text-green-300');

                estado.vidas--;

                setTimeout(() => {
                    if (estado.vidas <= 0) {
                        estado.tela = 'derrota';
                    } else {
                        renderizar();
                    }
                }, 1200);
            }
        }

        function voltarMenu() {
            estado.tela = 'menu';
            renderizar();
        }

        renderizar();
    </script>
</body>
</html>
