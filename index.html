<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .duo-btn { 
            background: #1cb0f6; 
            border-bottom: 4px solid #1899d6; 
            border-radius: 12px; 
            color: white; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: all 0.1s;
        }
        .duo-btn:active { border-bottom: none; transform: translateY(4px); }
        .input-duo { 
            border-bottom: 3px solid #e5e5e5; 
            background: #f7f7f7; 
            padding: 8px; 
            border-radius: 8px; 
            outline: none; 
            color: #3c3c3c;
            width: 120px;
        }
        .input-duo:focus { border-bottom-color: #1cb0f6; }
    </style>
</head>
<body class="bg-[#f7f7f7] text-gray-700 min-h-screen p-4 font-sans">

    <div class="max-w-xl mx-auto">
        <h2 class="text-gray-500 text-center mb-6 font-bold uppercase tracking-widest">Nível 2: Cotidiano e Locais</h2>

        <!-- Card de Exercício -->
        <div class="bg-white p-8 rounded-2xl border-2 border-gray-200 shadow-sm space-y-6">
            <h3 class="text-lg font-bold">Complete com a preposição de lugar:</h3>
            
            <div class="leading-[3rem] text-lg">
                J'habite 
                <input type="text" id="c1" class="input-duo" placeholder="?"> 
                Paris et je travaille 
                <input type="text" id="c2" class="input-duo" placeholder="?"> 
                la bibliothèque.
            </div>

            <button onclick="verificarNivel2()" class="duo-btn w-full py-4 text-sm">Verificar</button>
            <p id="feedback-duo" class="text-center font-bold"></p>
        </div>
    </div>

    <script>
        function verificarNivel2() {
            const c1 = document.getElementById('c1').value.toLowerCase();
            const c2 = document.getElementById('c2').value.toLowerCase();
            const feedback = document.getElementById('feedback-duo');

            if(c1 === "à" && c2 === "à") {
                feedback.innerText = "Excelente! Você dominou o uso de 'à'.";
                feedback.className = "text-green-500 text-center font-bold";
            } else {
                feedback.innerText = "Tente novamente! (Dica: usamos 'à' para cidades e lugares específicos).";
                feedback.className = "text-red-500 text-center font-bold";
            }
        }
    </script>
</body>
</html>
