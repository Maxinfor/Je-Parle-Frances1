<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaDu Lógico A1 - Construção de Conhecimento</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen flex flex-col justify-between select-none">

    <!-- Container Principal do App -->
    <div id="app" class="w-full max-w-md mx-auto p-6 flex flex-col justify-between flex-grow">
        <!-- O conteúdo dinâmico será injetado aqui -->
    </div>

    <script>
        // Estado do Sistema de Construção Lógica A1
        let estado = {
            tela: 'menu', 
            vidas: 3,
            questaoAtualIndex: 0,
            xp: 0,
            nivelAtual: 1
        };

        // Função de Áudio Profissional Oficial (Français Natif)
        function tocarAudio(texto) {
            const textoCodificado = encodeURIComponent(texto);
            const urlAudio = `https://translate.google.com/translate_tts?ie=UTF-8&q=${textoCodificado}&tl=fr&client=tw-ob`;
            const audio = new Audio(urlAudio);
            audio.playbackRate = 0.85;
            audio.play().catch(erro => console.log("Áudio indisponível:", erro));
        }

        // Banco de Questões Baseado na Lógica de Construção de Peças e Imagens Fixadoras
        const questoes = [
            {
                passo: "Bloco 1: Moradia e Lar",
                vocabulario: [
                    { palavra: "Je", significado: "Eu" },
                    { palavra: "habite", significado: "moro" },
                    { palavra: "une maison", significado: "uma casa" }
                ],
                explicacaoLogica: "Em francês, para construir a frase \"eu moro em uma casa\", juntamos as peças lógicas: <strong>Je</strong> (eu) + <strong>habite</strong> (moro) + <strong>une maison</strong> (uma casa). Veja as imagens e memorize a lógica.",
                imagem: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80",
                audioFrase: "J'habite une maison",
                exercicio: {
                    pergunta: "Seguindo a lógica estrutural, como se diz \"Eu moro em uma casa\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'habite une maison",
                    audioTraducaoFR: "Eu moro em uma casa",
                    opcoes: ['J\'habite une maison', 'Tu as un chat', 'Je mange du pain', 'Il fait beau'],
                    correta: 0
                }
            },
            {
                passo: "Bloco 2: Alimentação e Padaria",
                vocabulario: [
                    { palavra: "Je", significado: "Eu" },
                    { palavra: "voudrais", significado: "gostaria de" },
                    { palavra: "du pain", significado: "pão" }
                ],
                explicacaoLogica: "Na padaria, a lógica de pedidos funciona unindo o desejo pessoal: <strong>Je</strong> (eu) + <strong>voudrais</strong> (gostaria de) + <strong>du pain</strong> (pão). Monte a frase mentalmente.",
                imagem: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Je voudrais du pain",
                exercicio: {
                    pergunta: "Seguindo a lógica do bloco, como se diz \"Eu gostaria de pão\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je voudrais du pain",
                    audioTraducaoFR: "Eu gostaria de pão",
                    opcoes: ['Il pleut fort', 'Je voudrais du pain', 'Où est le métro', 'J\'ai un chien'],
                    correta: 1
                }
            },
            {
                passo: "Bloco 3: Identidade Escolar",
                vocabulario: [
                    { palavra: "Je", significado: "Eu" },
                    { palavra: "suis", significado: "sou / estou" },
                    { palavra: "étudiant", significado: "estudante" }
                ],
                explicacaoLogica: "Para se apresentar na escola ou faculdade: <strong>Je</strong> (eu) + <strong>suis</strong> (sou) + <strong>étudiant</strong> (estudante). A construção é direta e lógica.",
                imagem: "https://images.unsplash.com/photo-1580582932707-520aed937b7b?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Je suis étudiant",
                exercicio: {
                    pergunta: "Como se diz \"Eu sou estudante\" unindo as peças lógicas?",
                    imagemExercicio: "https://images.unsplash.com/photo-1580582932707-520aed937b7b?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je suis étudiant",
                    audioTraducaoFR: "Eu sou estudante",
                    opcoes: ['Je travaille ici', 'Je suis étudiant', 'J\'ai une voiture', 'Tu es fatigué'],
                    correta: 1
                }
            },
            {
                passo: "Bloco 4: Animais e Casa",
                vocabulario: [
                    { palavra: "J'ai", significado: "Eu tenho" },
                    { palavra: "un chat", significado: "um gato" }
                ],
                explicacaoLogica: "Quando visitas chegam ou conversamos em casa: <strong>J'ai</strong> (eu tenho - contração de je + ai) + <strong>un chat</strong> (um gato).",
                imagem: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&w=600&q=80",
                audioFrase: "J'ai un chat",
                exercicio: {
                    pergunta: "Seguindo a lógica de posse, como se diz \"Eu tenho um gato\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'ai un chat",
                    audioTraducaoFR: "Eu tenho um gato",
                    opcoes: ['Il a un chien', 'Je suis un chat', 'J\'ai un chat', 'Nous avons du pain'],
                    correta: 2
                }
            },
            {
                passo: "Bloco 5: Trabalho e Rotina",
                vocabulario: [
                    { palavra: "Je", significado: "Eu" },
                    { palavra: "commence", significado: "começo" },
                    { palavra: "le travail", significado: "o trabalho" }
                ],
                explicacaoLogica: "No escritório ou ambiente profissional: <strong>Je</strong> (eu) + <strong>commence</strong> (começo) + <strong>le travail</strong> (o trabalho).",
                imagem: "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Je commence le travail",
                exercicio: {
                    pergunta: "Como se constrói a frase \"Eu começo o trabalho\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je commence le travail",
                    audioTraducaoFR: "Eu começo o trabalho",
                    opcoes: ['Je mange une pomme', 'Je commence le travail', 'J\'ai un chat', 'Il pleut'],
                    correta: 1
                }
            },
            {
                passo: "Bloco 6: Clima e Parque",
                vocabulario: [
                    { palavra: "Il", significado: "Ele / Faz" },
                    { palavra: "fait", significado: "faz" },
                    { palavra: "beau", significado: "bonito / bom tempo" }
                ],
                explicacaoLogica: "Para descrever o tempo no parque ou na rua, a expressão fixa de clima é: <strong>Il</strong> (ele) + <strong>fait</strong> (faz) + <strong>beau</strong> (bom tempo).",
                imagem: "https://images.unsplash.com/photo-1519331379826-f10be5486c6f?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Il fait beau",
                exercicio: {
                    pergunta: "Seguindo a lógica do clima, como se diz \"Faz bom tempo / Está bonito\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1519331379826-f10be5486c6f?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Il fait beau",
                    audioTraducaoFR: "Está bom tempo",
                    opcoes: ['Il fait froid', 'Il fait beau', 'Il pleut fort', 'Je suis fatigué'],
                    correta: 1
                }
            },
            {
                passo: "Bloco 7: Direções na Rua",
                vocabulario: [
                    { palavra: "Où", significado: "Onde" },
                    { palavra: "est", significado: "é / fica" },
                    { palavra: "la station", significado: "a estação" }
                ],
                explicacaoLogica: "Para perguntar localização na rua: <strong>Où</strong> (onde) + <strong>est</strong> (fica) + <strong>la station</strong> (a estação).",
                imagem: "https://images.unsplash.com/photo-1514565131-fce0801e5785?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Où est la station",
                exercicio: {
                    pergunta: "Como se constrói a pergunta \"Onde fica a estação?\"",
                    imagemExercicio: "https://images.unsplash.com/photo-1514565131-fce0801e5785?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Où est la station",
                    audioTraducaoFR: "Onde fica a estação",
                    opcoes: ['Je veux du pain', 'Où est la station', 'J\'ai un chat', 'Au revoir'],
                    correta: 1
                }
            },
            {
                passo: "Bloco 8: Restaurante e Água",
                vocabulario: [
                    { palavra: "De", significado: "De" },
                    { palavra: "l'eau", significado: "a água" },
                    { palavra: "s'il vous plaît", significado: "por favor" }
                ],
                explicacaoLogica: "No restaurante, pedimos itens educadamente unindo: <strong>De l'eau</strong> (água) + <strong>s'il vous plaît</strong> (por favor).",
                imagem: "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?auto=format&fit=crop&w=600&q=80",
                audioFrase: "De l'eau s'il vous plaît",
                exercicio: {
                    pergunta: "Como pedir água educadamente no restaurante?",
                    imagemExercicio: "https://images.unsplash.com/photo-1548839140-29a749e1cf4d?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "De l'eau s'il vous plaît",
                    audioTraducaoFR: "Água, por favor",
                    opcoes: ['Du vin rouge', 'De l\'eau s\'il vous plaît', 'Du fromage', 'Merci beaucoup'],
                    correta: 1
                }
            },
            {
                passo: "Bloco 9: Saúde e Hospital",
                vocabulario: [
                    { palavra: "J'ai", significado: "Eu tenho" },
                    { palavra: "besoin", significado: "necessidade / preciso" },
                    { palavra: "d'un médecin", significado: "de um médico" }
                ],
                explicacaoLogica: "No hospital, a estrutura lógica de necessidade é: <strong>J'ai besoin</strong> (eu preciso) + <strong>d'un médecin</strong> (de um médico).",
                imagem: "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=600&q=80",
                audioFrase: "J'ai besoin d'un médecin",
                exercicio: {
                    pergunta: "Seguindo a lógica estrutural, como se diz \"Eu preciso de um médico\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'ai besoin d'un médecin",
                    audioTraducaoFR: "Eu preciso de um médico",
                    opcoes: ['J\'ai un chat', 'J\'ai besoin d\'un médecin', 'Je veux du pain', 'Où est le parc'],
                    correta: 1
                }
            },
            {
                passo: "Bloco 10: Supermercado e Frutas",
                vocabulario: [
                    { palavra: "Une", significado: "Uma" },
                    { palavra: "pomme", significado: "maçã" }
                ],
                explicacaoLogica: "No mercado, para escolher itens unitários de forma direta: <strong>Une</strong> (uma) + <strong>pomme</strong> (maçã).",
                imagem: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Une pomme",
                exercicio: {
                    pergunta: "Como se diz \"Uma maçã\" no mercado?",
                    imagemExercicio: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Une pomme",
                    audioTraducaoFR: "Uma maçã",
                    opcoes: ['Du pain', 'Une pomme', 'De l\'eau', 'Du fromage'],
                    correta: 1
                }
            }
        ];

        function renderizar() {
            const app = document.getElementById('app');
            
            if (estado.tela === 'menu') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="w-28 h-28 bg-gradient-to-tr from-amber-500 to-orange-500 rounded-3xl flex items-center justify-center shadow-2xl shadow-orange-500/20 mb-6 animate-pulse border border-orange-400/30">
                            <span class="text-5xl">🧩</span>
                        </div>
                        <h1 class="text-3xl font-extrabold mb-1 text-zinc-100">LinguaDu Lógico</h1>
                        <p class="text-zinc-400 mb-6 text-sm">Construção de Frases por Peças e Blocos de Memória (A1)</p>
                        
                        <div class="flex gap-3 mb-8 w-full justify-center">
                            <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <span class="text-yellow-400">⚡</span>
                                <div class="text-left"><div class="text-[10px] text-zinc-500 uppercase font-bold">XP</div><div class="text-sm font-bold text-zinc-200">${estado.xp}</div></div>
                            </div>
                            <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <span class="text-blue-400">📈</span>
                                <div class="text-left"><div class="text-[10px] text-zinc-500 uppercase font-bold">Blocos</div><div class="text-sm font-bold text-zinc-200">${estado.nivelAtual}/${questoes.length}</div></div>
                            </div>
                        </div>

                        <button onclick="iniciarLicao()" class="w-full py-4 bg-orange-500 hover:bg-orange-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-orange-500/20 transition active:scale-95 text-base">
                            INICIAR CONSTRUÇÃO LÓGICA
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'teoria') {
                const item = questoes[estado.questaoAtualIndex];
                const porcentagem = (estado.questaoAtualIndex / questoes.length) * 100;

                setTimeout(() => tocarAudio(item.audioFrase), 400);

                app.innerHTML = `
                    <div class="flex flex-col justify-between flex-grow">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <button onclick="voltarMenu()" class="text-zinc-500 hover:text-zinc-300 font-bold text-lg">✕</button>
                                <div class="w-2/3 bg-zinc-800 h-3 rounded-full overflow-hidden">
                                    <div class="bg-orange-500 h-full transition-all duration-300" style="width: ${porcentagem}%"></div>
                                </div>
                                <div class="flex items-center gap-1 text-red-500 font-bold">
                                    <span>❤️</span> <span class="text-sm">${estado.vidas}</span>
                                </div>
                            </div>

                            <div class="text-orange-400 font-bold text-[11px] uppercase tracking-wider mb-2 text-center bg-orange-500/10 py-1.5 rounded-xl border border-orange-500/20">🧩 ${item.passo}</div>

                            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl mt-1">
                                <div class="relative h-36 w-full overflow-hidden">
                                    <img src="${item.imagem}" class="w-full h-full object-cover brightness-90 hover:scale-105 transition duration-500">
                                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                </div>
                                <div class="p-4">
                                    <!-- Peças do Vocabulário (Lógica Desmontada) -->
                                    <div class="grid grid-cols-3 gap-1.5 mb-3 bg-zinc-950/60 p-2.5 rounded-2xl border border-zinc-800">
                                        ${item.vocabulario.map(v => `
                                            <div class="text-center bg-zinc-900 p-1.5 rounded-xl border border-zinc-800">
                                                <div class="text-orange-400 font-bold text-xs">${v.palavra}</div>
                                                <div class="text-[10px] text-zinc-400">${v.significado}</div>
                                            </div>
                                        `).join('')}
                                    </div>

                                    <div class="flex justify-between items-center mb-1">
                                        <h2 class="text-sm font-bold text-zinc-100">Lógica da Frase:</h2>
                                        <button onclick="tocarAudio('${item.audioFrase}')" class="w-7 h-7 bg-orange-500/20 text-orange-400 hover:bg-orange-500/30 rounded-full flex items-center justify-center transition shrink-0 text-xs" title="Ouvir frase completa">
                                            🔊
                                        </button>
                                    </div>
                                    <p class="text-zinc-300 text-xs leading-relaxed">${item.explicacaoLogica}</p>
                                </div>
                            </div>
                        </div>

                        <button onclick="irParaExercicio()" class="w-full py-3.5 bg-orange-500 hover:bg-orange-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-orange-500/25 transition mt-3 active:scale-95 text-xs">
                            MONTAR A FRASE (EXERCÍCIO)
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'licao') {
                const item = questoes[estado.questaoAtualIndex];
                const q = item.exercicio;
                const porcentagem = ((estado.questaoAtualIndex + 0.5) / questoes.length) * 100;

                app.innerHTML = `
                    <div class="flex flex-col justify-between flex-grow">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <button onclick="voltarMenu()" class="text-zinc-500 hover:text-zinc-300 font-bold text-lg">✕</button>
                                <div class="w-2/3 bg-zinc-800 h-3 rounded-full overflow-hidden">
                                    <div class="bg-green-500 h-full transition-all duration-300" style="width: ${porcentagem}%"></div>
                                </div>
                                <div class="flex items-center gap-1 text-red-500 font-bold">
                                    <span>❤️</span> <span class="text-sm">${estado.vidas}</span>
                                </div>
                            </div>

                            <div class="text-[11px] font-bold text-emerald-400 uppercase tracking-wider mb-1">Aplicação Lógica:</div>
                            <h2 class="text-zinc-300 font-semibold text-xs mb-3 leading-relaxed">${q.pergunta}</h2>
                            
                            <div class="bg-zinc-900 rounded-3xl border border-zinc-800 overflow-hidden mb-3 shadow-xl">
                                <div class="h-28 w-full overflow-hidden relative">
                                    <img src="${q.imagemExercicio}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                </div>
                                <div class="p-3 flex items-center justify-between bg-zinc-900">
                                    <div>
                                        <div class="text-[9px] text-zinc-500 uppercase font-semibold">Peças em Francês</div>
                                        <div class="text-sm font-bold text-zinc-100">${q.audioFrances}</div>
                                    </div>
                                    <button onclick="tocarAudio('${q.audioFrances}')" class="w-10 h-10 bg-green-500 hover:bg-green-400 text-zinc-950 rounded-2xl flex items-center justify-center text-base shadow-lg transition active:scale-95 shrink-0" title="Ouvir montagem nativa">
                                        🔊
                                    </button>
                                </div>
                            </div>

                            <div class="flex flex-col gap-2" id="opcoes-container">
                                ${q.opcoes.map((opcao, index) => `
                                    <button onclick="verificarResposta(${index})" class="opcao-btn p-3 bg-zinc-900 border-2 border-zinc-800 hover:border-zinc-700 rounded-2xl text-left font-medium text-zinc-200 transition active:scale-[0.98] text-xs">
                                        ${opcao}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div></div>
                    </div>
                `;
            } else if (estado.tela === 'vitoria') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="text-6xl mb-4 animate-bounce">🏆</div>
                        <h1 class="text-3xl font-extrabold mb-2 text-green-400">Construção Concluída!</h1>
                        <p class="text-zinc-400 mb-8 text-sm">Você entendeu a lógica de todas as peças e blocos do francês A1 com sucesso. Ganhou <strong>+150 XP</strong>.</p>
                        <button onclick="reiniciarJornada()" class="w-full py-4 bg-green-500 hover:bg-green-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-green-500/20 transition">
                            REINICIAR CONSTRUÇÃO
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'derrota') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="text-6xl mb-4 animate-bounce">💡</div>
                        <h1 class="text-3xl font-extrabold mb-2 text-red-500">Vidas esgotadas!</h1>
                        <p class="text-zinc-400 mb-8 text-sm">A lógica precisa de encaixe visual. Revise as peças e tente novamente.</p>
                        <button onclick="iniciarLicao()" class="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-extrabold rounded-2xl shadow-lg shadow-red-600/20 transition">
                            TENTAR NOVAMENTE
                        </button>
                    </div>
                `;
            }
        }

        function iniciarLicao() {
            estado.vidas = 3;
            estado.questaoAtualIndex = 0;
            estado.tela = 'teoria';
            renderizar();
        }

        function irParaExercicio() {
            estado.tela = 'licao';
            renderizar();
        }

        function reiniciarJornada() {
            estado.xp += 150;
            estado.nivelAtual = 1;
            estado.questaoAtualIndex = 0;
            estado.tela = 'menu';
            renderizar();
        }

        function verificarResposta(indexSelecionado) {
            const item = questoes[estado.questaoAtualIndex];
            const q = item.exercicio;
            const botoes = document.querySelectorAll('.opcao-btn');
            
            botoes.forEach(b => b.disabled = true);

            if (indexSelecionado === q.correta) {
                botoes[indexSelecionado].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[indexSelecionado].classList.add('bg-green-600/30', 'border-green-500', 'text-green-300');
                
                setTimeout(() => {
                    estado.questaoAtualIndex++;
                    estado.nivelAtual = estado.questaoAtualIndex + 1;
                    if (estado.questaoAtualIndex >= questoes.length) {
                        estado.tela = 'vitoria';
                    } else {
                        estado.tela = 'teoria';
                    }
                    renderizar();
                }, 900);
            } else {
                botoes[indexSelecionado].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[indexSelecionado].classList.add('bg-red-600/30', 'border-red-500', 'text-red-300');
                botoes[q.correta].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[q.correta].classList.add('bg-green-600/30', 'border-green-500', 'text-green-300');

                estado.vidas--;

                setTimeout(() => {
                    if (estado.vidas <= 0) {
                        estado.tela = 'derrota';
                    } else {
                        renderizar();
                    }
                }, 1200);
            }
        }

        function voltarMenu() {
            estado.tela = 'menu';
            renderizar();
        }

        renderizar();
    </script>
</body>
</html>
