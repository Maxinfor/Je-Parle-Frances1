<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Francesa: Sistema de Conquistas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-deep: #0a1021; --primary-neon: #00f2fe; --secondary-neon: #ff0055; }
        body { font-family: 'Orbitron', sans-serif; background: var(--bg-deep); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .reward-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; font-size: 1.2em; min-height: 40px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .btn:hover:not(:disabled) { border-color: var(--primary-neon); box-shadow: 0 0 10px var(--primary-neon); }
        .correct { border-color: #0f0 !important; background: rgba(0,255,0,0.1) !important; }
        .wrong { border-color: #f00 !important; background: rgba(255,0,0,0.1) !important; }
        #next { display: none; width: 100%; padding: 15px; background: linear-gradient(45deg, #00c6ff, #0072ff); border: none; border-radius: 10px; color: white; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="reward-bar" id="inventario"></div>
    <h2 id="titulo">Carregando Sistema...</h2>
    <div id="corpo"></div>
    <button id="next" onclick="proximo()">PRÓXIMA FASE ➔</button>
</div>

<script>
    const jornada = [
        { titulo: "Nível 1: Bonjour", perg: "Como iniciar?", opc: ["Ir direto", "Bonjour", "Acenar"], correta: 1, premio: "🍴 Bronze" },
        { titulo: "Nível 2: Bonsoir", perg: "Café às 20h?", opc: ["Bonjour", "Bonsoir", "Salut"], correta: 1, premio: "🍴 Prata" },
        { titulo: "Nível 3: S'il vous plaît", perg: "Pedir água?", opc: ["Quero", "De l'eau, s'il vous plaît", "Dá aí"], correta: 1, premio: "🍴 Ouro + 🥐 Bronze" },
        { titulo: "Nível 4: O Vous", perg: "Por que usar o Vous?", opc: ["Velocidade", "Respeito", "Não sei"], correta: 1, premio: "🥐 Prata" },
        { titulo: "Nível 5: Verbo Pouvoir", perg: "Pedir ajuda?", opc: ["Tu...", "Pouvez-vous... ?", "Me dê"], correta: 1, premio: "🥐 Ouro + ☕ Xícara Francesa" },
        { titulo: "Nível 6: Expert", perg: "Etiqueta geral?", opc: ["Ser humilde", "Ser ruidoso", "Ignorar"], correta: 0, premio: "🍰 Morango" },
        { titulo: "Nível 7: Master", perg: "Cultura?", opc: ["Apenas falar", "Entender o gesto", "Nada"], correta: 1, premio: "🍰 Baunilha + 🗼 Bronze" },
        { titulo: "Nível 8: Grand Master", perg: "Social?", opc: ["Formal", "Casual demais", "Gritar"], correta: 0, premio: "🍰 Chocolate + 🗼 Prata" },
        { titulo: "Nível 9: Elite", perg: "História?", opc: ["Versalhes", "Louvre", "Nada"], correta: 1, premio: "🗼 Ouro + 🏛️ Bronze" },
        { titulo: "Nível 10: Legenda", perg: "Auge?", opc: ["Cultura", "Comida", "Ambos"], correta: 2, premio: "🏛️ Prata + 🏛️ Ouro" }
    ];

    let i = 0;
    let inventario = [];

    function carregar() {
        const m = jornada[i];
        document.getElementById('titulo').innerText = m.titulo;
        document.getElementById('corpo').innerHTML = `<p>${m.perg}</p><div id="opcoes"></div>`;
        document.getElementById('next').style.display = 'none';

        m.opc.forEach((txt, idx) => {
            const b = document.createElement('button');
            b.className = 'btn'; b.innerText = txt;
            b.onclick = () => verificar(idx, b);
            document.getElementById('opcoes').appendChild(b);
        });
    }

    function verificar(idx, btn) {
        document.querySelectorAll('.btn').forEach(b => b.disabled = true);
        if(idx === jornada[i].correta) {
            btn.classList.add('correct');
            inventario.push(jornada[i].premio);
            document.getElementById('inventario').innerText = "🏆 " + inventario.join(" | ");
            document.getElementById('next').style.display = 'block';
        } else {
            btn.classList.add('wrong');
        }
    }

    function proximo() {
        i++;
        if(i < jornada.length) carregar();
        else document.getElementById('corpo').innerHTML = "<h2>🎉 Missão Completa! Você é um mestre da cultura francesa.</h2>";
    }

    carregar();
</script>
</body>
</html>
