<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jornada Francês A1 - Nível 1</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .app-container { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .passport-container { background: #fdf6e3; border: 2px solid #8b4513; padding: 15px; border-radius: 10px; display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .stamp { width: 50px; height: 50px; background: #e0d8c3; border: 2px dashed #8b4513; display: flex; align-items: center; justify-content: center; font-size: 1.5em; filter: grayscale(100%); opacity: 0.5; }
        .stamp.earned { background: #fff; filter: grayscale(0%); border-style: solid; opacity: 1; }
        .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { padding: 12px; border-radius: 8px; border: none; background: #3498db; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🇫🇷 Passaporte</h2>
    <div id="passport-grid" class="passport-container">
        <div id="croissant-stamp" class="stamp">🥐</div>
    </div>
    
    <div id="game-ui">
        <h3 id="local">Padaria</h3>
        <p id="pergunta"></p>
        <div id="choices" class="choices"></div>
        <p id="feedback" style="font-weight:bold; margin-top:10px;"></p>
    </div>
</div>

<script>
    const missoes = [
        { local: "Padaria", pergunta: "Você entra na padaria. O que diz para a atendente?", opcoes: [{t: "Un croissant!", c: false}, {t: "Bonjour, madame!", c: true}] },
        { local: "Rua", pergunta: "Você encontra seu professor às 10h. O que diz?", opcoes: [{t: "Salut!", c: false}, {t: "Bonjour, monsieur!", c: true}] },
        { local: "Restaurante", pergunta: "São 19h. Você entra no restaurante. O que diz?", opcoes: [{t: "Bonjour!", c: false}, {t: "Bonsoir!", c: true}] },
        { local: "Loja", pergunta: "Você está saindo de uma loja. Como se despede?", opcoes: [{t: "Salut!", c: false}, {t: "Au revoir!", c: true}] }
    ];

    let indiceMissao = 0;
    let conquistados = JSON.parse(localStorage.getItem('conquistados')) || [];

    function renderizar() {
        if (indiceMissao >= missoes.length) {
            document.getElementById('game-ui').innerHTML = "<h3>Bravo! Você domina a etiqueta francesa.</h3>";
            if (!conquistados.includes('🥐')) {
                conquistados.push('🥐');
                localStorage.setItem('conquistados', JSON.stringify(conquistados));
            }
            document.getElementById('croissant-stamp').classList.add('earned');
            return;
        }

        const m = missoes[indiceMissao];
        document.getElementById('local').innerText = "Missão: " + m.local;
        document.getElementById('pergunta').innerText = m.pergunta;
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';
        
        m.opcoes.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt.t;
            btn.onclick = () => verificar(opt.c);
            choicesDiv.appendChild(btn);
        });
    }

    function verificar(correta) {
        if (correta) {
            document.getElementById('feedback').innerText = "✅ Perfeito!";
            indiceMissao++;
            setTimeout(() => { document.getElementById('feedback').innerText = ""; renderizar(); }, 1500);
        } else {
            document.getElementById('feedback').innerText = "❌ O francês valoriza a educação. Tente outra forma.";
        }
    }

    renderizar();
</script>
</body>
</html>
