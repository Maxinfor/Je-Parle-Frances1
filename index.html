<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jornada Francesa: Coleção de Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
        
        body { background: #0a1021; color: white; font-family: 'Orbitron', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .app-container { width: 100%; max-width: 600px; }
        
        /* Painel de Recompensas */
        .recompensas-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px;
            margin-bottom: 20px; border: 1px solid rgba(0,242,254,0.3);
        }
        .item { font-size: 1.5em; opacity: 0.2; filter: grayscale(1); transition: 0.5s; text-align: center; }
        .item.active { opacity: 1; filter: grayscale(0) drop-shadow(0 0 10px var(--color)); transform: scale(1.2); }

        .card { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid #444; color: white; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .btn:hover:not(:disabled) { border-color: #00f2fe; }
        .correct { border-color: #0f0 !important; background: rgba(0,255,0,0.1) !important; }
        .wrong { border-color: #f00 !important; background: rgba(255,0,0,0.1) !important; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Painel Visual de Recompensas -->
    <div class="recompensas-grid" id="grid">
        <div class="item" id="garfo" data-color="#cd7f32">🍴</div>
        <div class="item" id="croissant" data-color="#ffd700">🥐</div>
        <div class="item" id="xicara" data-color="#ff0055">☕</div>
        <div class="item" id="petgato" data-color="#ff9800">🍰</div>
        <div class="item" id="torre" data-color="#00f2fe">🗼</div>
        <div class="item" id="louvre" data-color="#fff">🏛️</div>
    </div>

    <div class="card">
        <h2 id="titulo">Carregando...</h2>
        <div id="corpo"></div>
        <button id="next" style="display:none; width:100%; padding:15px; margin-top:20px; border:none; border-radius:10px; cursor:pointer; background:#00f2fe;" onclick="proximo()">PRÓXIMA FASE ➔</button>
    </div>
</div>

<script>
    const fases = [
        { t: "Nível 1-3: O Gourmet", p: "O básico da etiqueta.", id: "garfo" },
        { t: "Nível 4-5: O Boulanger", p: "A arte do pão francês.", id: "croissant" },
        { t: "Nível 6: O Café", p: "A elegância de um café.", id: "xicara" },
        { t: "Nível 7-8: O Patissier", p: "Doces refinados.", id: "petgato" },
        { t: "Nível 9: O Arquiteto", p: "O ícone de Paris.", id: "torre" },
        { t: "Nível 10: O Imortal", p: "A arte francesa.", id: "louvre" }
    ];

    let i = 0;
    function carregar() {
        const m = fases[i];
        document.getElementById('titulo').innerText = m.t;
        document.getElementById('corpo').innerHTML = `<p>${m.p}</p><button class="btn" onclick="vencer('${m.id}')">Simular Acerto</button>`;
    }

    function vencer(id) {
        const el = document.getElementById(id);
        el.classList.add('active');
        el.style.setProperty('--color', el.dataset.color);
        document.getElementById('next').style.display = 'block';
    }

    function proximo() {
        i++;
        if(i < fases.length) carregar();
        else document.getElementById('titulo').innerText = "🎉 JORNADA COMPLETA!";
    }
    carregar();
</script>
</body>
</html>
