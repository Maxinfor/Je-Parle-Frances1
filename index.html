<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cyber-card { background: rgba(20, 20, 25, 0.8); border: 1px solid rgba(6, 182, 212, 0.2); backdrop-filter: blur(10px); }
        .glow-gold { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.6)); color: #FFD700; }
        .glow-silver { filter: drop-shadow(0 0 10px rgba(192, 192, 192, 0.6)); color: #C0C0C0; }
        .glow-bronze { filter: drop-shadow(0 0 10px rgba(205, 127, 50, 0.6)); color: #CD7F32; }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen flex items-center justify-center font-mono p-4">

    <div id="app" class="w-full max-w-sm p-8 rounded-3xl border border-cyan-900/50 shadow-[0_0_50px_rgba(6,182,212,0.1)] cyber-card">
        <!-- Conteúdo dinâmico -->
    </div>

    <script>
        // Banco de dados com seus itens de recompensa
        const recompensas = [
            { nome: "CROISSANT DE OURO", icon: "🥐", style: "glow-gold" },
            { nome: "CARRO DE OURO", icon: "🏎️", style: "glow-gold" },
            { nome: "TORRE EIFFEL DE OURO", icon: "🗼", style: "glow-gold" },
            { nome: "CROISSANT DE PRATA", icon: "🥐", style: "glow-silver" },
            { nome: "CARRO DE PRATA", icon: "🏎️", style: "glow-silver" },
            { nome: "TORRE EIFFEL DE PRATA", icon: "🗼", style: "glow-silver" },
            { nome: "CROISSANT DE BRONZE", icon: "🥐", style: "glow-bronze" },
            { nome: "CARRO DE BRONZE", icon: "🏎️", style: "glow-bronze" },
            { nome: "TORRE EIFFEL DE OURO", icon: "🗼", style: "glow-gold" }
        ];

        let nivelIdx = 0;

        function mostrarRecompensa() {
            const item = recompensas[nivelIdx];
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="text-center">
                    <h2 class="text-cyan-400 text-xs tracking-widest mb-4">RECOMPENSA DECODIFICADA</h2>
                    <div class="text-8xl my-8 ${item.style} animate-pulse">
                        ${item.icon}
                    </div>
                    <h1 class="text-xl font-bold mb-8">${item.nome}</h1>
                    <button onclick="proximoNivel()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 rounded-xl font-bold transition-all shadow-[0_0_20px_rgba(8,145,178,0.4)]">
                        COLETAR DADOS
                    </button>
                </div>
            `;
        }

        function proximoNivel() {
            nivelIdx++;
            if (nivelIdx < recompensas.length) {
                // Aqui você chamaria sua função carregar() da fase
                document.getElementById('app').innerHTML = `<p class="text-center">Iniciando Nível ${nivelIdx + 1}...</p>`;
                setTimeout(() => location.reload(), 1000); // Exemplo de reinício
            }
        }

        // Chamada de teste para ver a recompensa
        mostrarRecompensa();
    </script>
</body>
</html>
