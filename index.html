// =====================================
// RESPONDER
// =====================================


function responder(valor){



let lista=
exercicios[estado.nivel];



let pergunta=
lista[estado.questao];



let botoes=
document.querySelectorAll(".resposta");





botoes.forEach(btn=>{

btn.disabled=true;

});






if(valor===pergunta.correta){



botoes[valor]
.classList
.remove("bg-blue-700");



botoes[valor]
.classList
.add("bg-green-600");





estado.xp +=20;


estado.moedas +=5;







setTimeout(()=>{


estado.questao++;





if(
estado.questao>=lista.length
){


estado.questao=0;


ganharMedalha("🏅");


estado.tela="vitoria";


}

else{


estado.tela="aula";


}



salvar();


renderizar();



},1000);



}

else{



botoes[valor]
.classList
.remove("bg-blue-700");



botoes[valor]
.classList
.add("bg-red-600");




botoes[pergunta.correta]
.classList
.remove("bg-blue-700");



botoes[pergunta.correta]
.classList
.add("bg-green-600");






estado.vidas--;






setTimeout(()=>{


if(estado.vidas<=0){



estado.tela="derrota";


}

else{


renderizar();


}



},1200);




}



}

// =====================================
// COMPRAR PRÊMIO
// =====================================


function comprarPremio(index){



let premio =
premios[index];




if(estado.moedas >= premio.preco){



estado.moedas -= premio.preco;



inventario.push(premio.nome);



alert(

"🎉 Você conquistou: "

+ premio.nome

);



salvar();



renderizar();



}

else{



alert(

"🪙 Você precisa de mais moedas!"

);



}



}









// =====================================
// SALVAR PROGRESSO
// =====================================


function salvar(){


localStorage.setItem(

"LinguaDuPRO",

JSON.stringify({

estado,

perfil,

inventario

})

);



}









// =====================================
// CARREGAR PROGRESSO
// =====================================


function carregar(){



let dados =

localStorage.getItem(

"LinguaDuPRO"

);




if(dados){



let salvo =
JSON.parse(dados);



estado =
salvo.estado;



perfil =
salvo.perfil;



inventario =
salvo.inventario || [];



}



}



carregar();








// SALVAMENTO AUTOMÁTICO

salvar();

}



else if(estado.tela==="aula"){

}

telaPerfil();


}



else if(estado.tela==="loja"){


telaLoja();


}



}
