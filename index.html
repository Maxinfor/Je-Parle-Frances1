<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cyber-panel { background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(6, 182, 212, 0.3); }
        .input-cyber { background: rgba(0, 0, 0, 0.5); border: 1px solid #06b6d4; color: white; padding: 5px; width: 100px; border-radius: 4px; }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen p-4 font-mono">

    <div class="max-w-2xl mx-auto">
        <h2 class="text-cyan-400 text-center mb-6 tracking-[0.2em] uppercase">Desafios A1: Exercícios</h2>

        <!-- Área de Questões -->
        <div class="cyber-panel p-6 rounded-lg space-y-6">
            
            <!-- Questão 1 -->
            <div>
                <p class="text-sm mb-2">1. "Je ________ brésilien." (Verbo Être)</p>
                <input type="text" id="q1" class="input-cyber" placeholder="Resposta">
            </div>

            <!-- Questão 2 -->
            <div>
                <p class="text-sm mb-2">2. "J'________ 30 ans." (Verbo Avoir)</p>
                <input type="text" id="q2" class="input-cyber" placeholder="Resposta">
            </div>

            <!-- Questão 3 -->
            <div>
                <p class="text-sm mb-2">3. Pronome para "Eles":</p>
                <input type="text" id="q3" class="input-cyber" placeholder="Resposta">
            </div>

            <button onclick="verificar()" class="bg-cyan-700 w-full py-2 hover:bg-cyan-500 uppercase transition">Verificar Respostas</button>
            <p id="resultado" class="text-center font-bold mt-4"></p>
        </div>
    </div>

    <script>
        function verificar() {
            const r1 = document.getElementById('q1').value.toLowerCase();
            const r2 = document.getElementById('q2').value.toLowerCase();
            const r3 = document.getElementById('q3').value.toLowerCase();

            let acertos = 0;
            if (r1 === 'suis') acertos++;
            if (r2 === 'ai') acertos++;
            if (r3 === 'ils') acertos++;

            const res = document.getElementById('resultado');
            res.innerText = `Você acertou ${acertos} de 3 questões!`;
            res.className = acertos === 3 ? "text-green-400" : "text-red-400";
        }
    </script>
</body>
</html>
