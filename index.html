<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-border { border: 1px solid #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }
        .cyber-btn { background: linear-gradient(90deg, #0f172a, #1e293b); border: 1px solid #334155; }
        .cyber-btn:hover { border-color: #06b6d4; box-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen flex items-center justify-center font-mono">
    
    <div id="app" class="w-full max-w-sm p-8 bg-zinc-950/80 rounded-2xl border border-zinc-800 backdrop-blur-md shadow-[0_0_50px_rgba(6,182,212,0.1)]">
        </div>

    <script>
        const niveis = [
            {
                titulo: "NÍVEL 1 - SYNC ÊTRE",
                questoes: [
                    { p: "Eu sou brasileiro?", op: ["Je suis brésilien", "Je es brésilien"], c: "Je suis brésilien" }
                ]
            }
        ];

        let nivelIdx = 0, questaoIdx = 0;

        function carregar() {
            const q = niveis[nivelIdx].questoes[questaoIdx];
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="text-[10px] tracking-widest text-cyan-400 mb-4 uppercase">System Status: Active</div>
                <div class="text-cyan-500 font-bold mb-4 text-sm">${niveis[nivelIdx].titulo} - Q ${questaoIdx + 1}/10</div>
                <h1 class="text-xl font-bold mb-8 border-l-4 border-cyan-500 pl-4">${q.p}</h1>
                <div class="flex flex-col gap-4">
                    ${q.op.map(o => `
                        <button onclick="verificar('${o}')" class="cyber-btn p-4 rounded-lg transition-all text-left flex items-center gap-3">
                            <span class="w-6 h-6 border border-cyan-500 rounded flex items-center justify-center text-[10px]">✔</span>
                            ${o}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function verificar(resp) {
            if (resp === niveis[nivelIdx].questoes[questaoIdx].c) {
                alert("SYSTÉME: Corret");
                questaoIdx++;
                carregar();
            } else {
                alert("ERROR: Access Denied");
            }
        }

        carregar();
    </script>
</body>
</html>
