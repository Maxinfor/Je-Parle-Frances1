<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaDu Lógico A1 - Oficina de Verbos e Adjetivos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen flex flex-col justify-between select-none">

    <!-- Container Principal do App -->
    <div id="app" class="w-full max-w-md mx-auto p-6 flex flex-col justify-between flex-grow">
        <!-- O conteúdo dinâmico será injetado aqui -->
    </div>

    <script>
        // Estado do Sistema Focado em Verbos, Adjetivos e Fixação Progressiva (A1)
        let estado = {
            tela: 'menu', 
            vidas: 3,
            questaoAtualIndex: 0,
            xp: 0,
            nivelAtual: 1
        };

        // Função de Áudio Profissional Oficial (Français Natif)
        function tocarAudio(texto) {
            const textoCodificado = encodeURIComponent(texto);
            const urlAudio = `https://translate.google.com/translate_tts?ie=UTF-8&q=${textoCodificado}&tl=fr&client=tw-ob`;
            const audio = new Audio(urlAudio);
            audio.playbackRate = 0.85;
            audio.play().catch(erro => console.log("Áudio indisponível:", erro));
        }

        // Banco de Questões com Foco Estrutural em Verbos e Adjetivos (Construção do Saber)
        const questoes = [
            {
                tipo: "verbo-adjetivo",
                passo: "Foco Gramatical 1: Verbo HABITER + Adjetivo GRAND",
                conceitoVerbo: "Habiter (Morar) - Verbo essencial para indicar residência.",
                conceitoAdjetivo: "Grand / Grande (Grande) - Adjetivo que caracteriza o tamanho do espaço.",
                vocabulario: [
                    { palavra: "J'habite", significado: "Eu moro (Verbo habiter)" },
                    { palavra: "une grande", significado: "uma grande (Adjetivo feminino)" },
                    { palavra: "maison", significado: "casa" }
                ],
                explicacaoLogica: "Aprenda a regra: O adjetivo descritivo (grand) geralmente acompanha o substantivo. Juntando as peças lógicas: <strong>J'habite</strong> (eu moro) + <strong>une grande</strong> (uma grande) + <strong>maison</strong> (casa).",
                imagem: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80",
                audioFrase: "J'habite une grande maison",
                exercicio: {
                    pergunta: "Aplicando a regra do verbo morar e do adjetivo grande, como se diz \"Eu moro em uma casa grande\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'habite une grande maison",
                    audioTraducaoFR: "Eu moro em uma casa grande",
                    opcoes: ['J\'habite une grande maison', 'Tu as un petit chat', 'Je mange du pain', 'Il fait beau'],
                    correta: 0
                }
            },
            {
                tipo: "verbo-adjetivo",
                passo: "Foco Gramatical 2: Verbo ÊTRE + Adjetivo FATIGUÉ",
                conceitoVerbo: "Être (Ser / Estar) - O verbo mais importante do francês para estados e identidades.",
                conceitoAdjetivo: "Fatigué / Fatiguée (Cansado / Cansada) - Adjetivo que descreve estado físico.",
                vocabulario: [
                    { palavra: "Je suis", significado: "Eu sou / estou (Verbo être conjugado)" },
                    { palavra: "fatigué", significado: "cansado (Adjetivo masculino)" },
                    { palavra: "aujourd'hui", significado: "hoje" }
                ],
                explicacaoLogica: "Aprenda a regra: Usamos o verbo <strong>être</strong> (je suis) combinado com o adjetivo de condição física <strong>fatigué</strong> para relatar como nos sentimos no cotidiano.",
                imagem: "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Je suis fatigué aujourd'hui",
                exercicio: {
                    pergunta: "Aplicando o verbo ser/estar e o adjetivo de cansaço, como se diz \"Eu estou cansado hoje\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je suis fatigué",
                    audioTraducaoFR: "Eu estou cansado",
                    opcoes: ['J\'ai un chat', 'Je suis fatigué', 'Il fait beau', 'Nous allons au parc'],
                    correta: 1
                }
            },
            {
                tipo: "verbo-adjetivo",
                passo: "Foco Gramatical 3: Verbo AIMER + Adjetivo BEAU",
                conceitoVerbo: "Aimer (Gostar / Amar) - Verbo regular para expressar preferências e afetos.",
                conceitoAdjetivo: "Beau / Belle (Belho / Bonito) - Adjetivo qualificativo para estética e clima.",
                vocabulario: [
                    { palavra: "J'aime", significado: "Eu gosto / amo (Verbo aimer)" },
                    { palavra: "ce beau", significado: "este belo (Adjetivo masculino)" },
                    { palavra: "matin", significado: "manhã" }
                ],
                explicacaoLogica: "Aprenda a regra: O verbo <strong>aimer</strong> expressa o que você aprecia, acompanhado pelo adjetivo qualificativo <strong>beau</strong> (belo/bonito).",
                imagem: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=600&q=80",
                audioFrase: "J'aime ce beau matin",
                exercicio: {
                    pergunta: "Seguindo a lógica do verbo aimer e do adjetivo beau, como se diz \"Eu gosto desta bela manhã\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'aime ce beau matin",
                    audioTraducaoFR: "Eu gosto desta bela manhã",
                    opcoes: ['Je déteste la nuit', 'J\'aime ce beau matin', 'Il pleut fort', 'Tu as une voiture'],
                    correta: 1
                }
            },
            {
                tipo: "verbo-adjetivo",
                passo: "Foco Gramatical 4: Verbo AVOIR + Adjetivo PETIT",
                conceitoVerbo: "Avoir (Ter) - Verbo fundamental para posses e características.",
                conceitoAdjetivo: "Petit / Petite (Pequeno / Pequena) - Adjetivo de dimensão.",
                vocabulario: [
                    { palavra: "J'ai", significado: "Eu tenho (Verbo avoir conjugado)" },
                    { palavra: "un petit", significado: "um pequeno (Adjetivo masculino)" },
                    { palavra: "chat", significado: "gato" }
                ],
                explicacaoLogica: "Aprenda a regra: Juntamos a posse com o tamanho. <strong>J'ai</strong> (eu tenho) + <strong>un petit</strong> (um pequeno) + <strong>chat</strong> (gato).",
                imagem: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&w=600&q=80",
                audioFrase: "J'ai un petit chat",
                exercicio: {
                    pergunta: "Como se diz \"Eu tenho um gato pequeno\" utilizando o verbo avoir e o adjetivo petit?",
                    imagemExercicio: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'ai un petit chat",
                    audioTraducaoFR: "Eu tenho um gato pequeno",
                    opcoes: ['Il a un grand chien', 'J\'ai un petit chat', 'Je suis grand', 'Nous avons du pain'],
                    correta: 1
                }
            },
            {
                tipo: "verbo-adjetivo",
                passo: "Foco Gramatical 5: Verbo FAIRE + Adjetivo FROID",
                conceitoVerbo: "Faire (Fazer) - Verbo essencial para clima, ações e atividades.",
                conceitoAdjetivo: "Froid / Froide (Frio) - Adjetivo térmico ambiental.",
                vocabulario: [
                    { palavra: "Il fait", significado: "Ele faz / Está (Verbo faire impessoal)" },
                    { palavra: "très", significado: "muito (Advérbio de intensidade)" },
                    { palavra: "froid", significado: "frio (Adjetivo térmico)" }
                ],
                explicacaoLogica: "Aprenda a regra: Expressões climáticas usam o verbo <strong>faire</strong> (il fait) ligado ao adjetivo de temperatura <strong>froid</strong> (frio).",
                imagem: "https://images.unsplash.com/photo-1519692933481-e162a57d6721?auto=format&fit=crop&w=600&q=80",
                    audioFrase: "Il fait très froid",
                exercicio: {
                    pergunta: "Como se diz \"Está muito frio\" usando o verbo faire e o adjetivo froid?",
                    imagemExercicio: "https://images.unsplash.com/photo-1519692933481-e162a57d6721?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Il fait très froid",
                    audioTraducaoFR: "Está muito frio",
                    opcoes: ['Il fait beau', 'Il fait très froid', 'Il pleut fort', 'Je suis chaud'],
                    correta: 1
                }
            },
            {
                tipo: "revisao-pratica",
                passo: "Revisão e Prática Intensiva",
                titulo: "Oficina de Fixação de Verbos e Adjetivos",
                explicacao: "<strong>Hora do treino intensivo!</strong> Vamos testar sua memória sobre os verbos <em>habiter</em>, <em>être</em>, <em>aimer</em>, <em>avoir</em>, <em>faire</em> e seus respectivos adjetivos qualificativos.",
                imagem: "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Je pratique les verbes et les adjectifs pour apprendre",
                exercicio: {
                    pergunta: "Qual das alternativas abaixo utiliza corretamente o verbo estar (être) com o adjetivo cansado (fatigué)?",
                    imagemExercicio: "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je suis fatigué",
                    audioTraducaoFR: "Eu estou cansado",
                    opcoes: ['J\'habite une grande maison', 'Je suis fatigué', 'Il fait très froid', 'J\'ai un petit chat'],
                    correta: 1
                }
            },
            {
                tipo: "dialogo-final",
                passo: "Diálogo Prático Final: Encontro Cotidiano",
                titulo: "Conversa entre Vizinhos",
                personagens: "Pierre & Você",
                explicacao: "<strong>Cenário Real:</strong> Seu vizinho Pierre te encontra na rua e pergunta como você está e onde mora. Você precisa demonstrar o domínio dos verbos e adjetivos aprendidos para responder perfeitamente.",
                imagem: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Bonjour! J'habite une grande maison et je suis heureux.",
                exercicio: {
                    pergunta: "Pierre pergunta: \"Onde você mora?\" Como você responde que mora em uma casa grande?",
                    imagemExercicio: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'habite une grande maison",
                    audioTraducaoFR: "Eu moro em uma casa grande",
                    opcoes: ['Je suis fatigué', 'J\'habite une grande maison', 'Il fait très froid', 'J\'ai un chat'],
                    correta: 1
                }
            }
        ];

        function renderizar() {
            const app = document.getElementById('app');
            
            if (estado.tela === 'menu') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="w-28 h-28 bg-gradient-to-tr from-amber-500 to-orange-500 rounded-3xl flex items-center justify-center shadow-2xl shadow-orange-500/20 mb-6 animate-pulse border border-orange-400/30">
                            <span class="text-5xl">📖</span>
                        </div>
                        <h1 class="text-3xl font-extrabold mb-1 text-zinc-100">LinguaDu Lógico</h1>
                        <p class="text-zinc-400 mb-6 text-sm">Oficina de Verbos, Adjetivos e Construção do Saber (A1)</p>
                        
                        <div class="flex gap-3 mb-8 w-full justify-center">
                            <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <span class="text-yellow-400">⚡</span>
                                <div class="text-left"><div class="text-[10px] text-zinc-500 uppercase font-bold">XP</div><div class="text-sm font-bold text-zinc-200">${estado.xp}</div></div>
                            </div>
                            <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <span class="text-blue-400">📈</span>
                                <div class="text-left"><div class="text-[10px] text-zinc-500 uppercase font-bold">Módulos</div><div class="text-sm font-bold text-zinc-200">${estado.nivelAtual}/${questoes.length}</div></div>
                            </div>
                        </div>

                        <button onclick="iniciarLicao()" class="w-full py-4 bg-orange-500 hover:bg-orange-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-orange-500/20 transition active:scale-95 text-base">
                            INICIAR OFICINA GRAMATICAL
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'teoria') {
                const item = questoes[estado.questaoAtualIndex];
                const porcentagem = (estado.questaoAtualIndex / questoes.length) * 100;

                setTimeout(() => tocarAudio(item.audioFrase), 400);

                let badgeCor = 'bg-orange-500/10 text-orange-400 border-orange-500/20';
                if (item.tipo === 'revisao-pratica') badgeCor = 'bg-blue-500/10 text-blue-400 border-blue-500/20';
                if (item.tipo === 'dialogo-final') badgeCor = 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';

                app.innerHTML = `
                    <div class="flex flex-col justify-between flex-grow">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <button onclick="voltarMenu()" class="text-zinc-500 hover:text-zinc-300 font-bold text-lg">✕</button>
                                <div class="w-2/3 bg-zinc-800 h-3 rounded-full overflow-hidden">
                                    <div class="bg-orange-500 h-full transition-all duration-300" style="width: ${porcentagem}%"></div>
                                </div>
                                <div class="flex items-center gap-1 text-red-500 font-bold">
                                    <span>❤️</span> <span class="text-sm">${estado.vidas}</span>
                                </div>
                            </div>

                            <div class="font-bold text-[11px] uppercase tracking-wider mb-2 text-center py-1.5 rounded-xl border ${badgeCor}">📍 ${item.passo}</div>

                            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl mt-1">
                                <div class="relative h-32 w-full overflow-hidden">
                                    <img src="${item.imagem}" class="w-full h-full object-cover brightness-90 hover:scale-105 transition duration-500">
                                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                </div>
                                <div class="p-3.5">
                                    ${item.conceitoVerbo ? `
                                        <div class="mb-2 bg-zinc-950/70 p-2.5 rounded-2xl border border-zinc-800 space-y-1">
                                            <div class="text-[11px] text-orange-400 font-bold">⚙️ ${item.conceitoVerbo}</div>
                                            <div class="text-[11px] text-amber-300 font-bold">✨ ${item.conceitoAdjetivo}</div>
                                        </div>
                                    ` : ''}

                                    ${item.vocabulario ? `
                                        <div class="grid grid-cols-3 gap-1 mb-2.5 bg-zinc-950/60 p-2 rounded-xl border border-zinc-800">
                                            ${item.vocabulario.map(v => `
                                                <div class="text-center bg-zinc-900 p-1 rounded-lg border border-zinc-800">
                                                    <div class="text-orange-400 font-bold text-[11px]">${v.palavra}</div>
                                                    <div class="text-[9px] text-zinc-400">${v.significado}</div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    ` : ''}

                                    <div class="flex justify-between items-center mb-1">
                                        <h2 class="text-xs font-bold text-zinc-100">${item.titulo || 'Construção Lógica:'}</h2>
                                        <button onclick="tocarAudio('${item.audioFrase}')" class="w-6 h-6 bg-orange-500/20 text-orange-400 hover:bg-orange-500/30 rounded-full flex items-center justify-center transition shrink-0 text-xs" title="Ouvir áudio">
                                            🔊
                                        </button>
                                    </div>
                                    <p class="text-zinc-300 text-[11px] leading-relaxed">${item.explicacaoLogica || item.explicacao}</p>
                                </div>
                            </div>
                        </div>

                        <button onclick="irParaExercicio()" class="w-full py-3.5 bg-orange-500 hover:bg-orange-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-orange-500/25 transition mt-3 active:scale-95 text-xs">
                            ${item.tipo === 'dialogo-final' ? 'PARTICIPAR DO DIÁLOGO' : 'EXERCITAR AGORA'}
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'licao') {
                const item = questoes[estado.questaoAtualIndex];
                const q = item.exercicio;
                const porcentagem = ((estado.questaoAtualIndex + 0.5) / questoes.length) * 100;

                app.innerHTML = `
                    <div class="flex flex-col justify-between flex-grow">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <button onclick="voltarMenu()" class="text-zinc-500 hover:text-zinc-300 font-bold text-lg">✕</button>
                                <div class="w-2/3 bg-zinc-800 h-3 rounded-full overflow-hidden">
                                    <div class="bg-green-500 h-full transition-all duration-300" style="width: ${porcentagem}%"></div>
                                </div>
                                <div class="flex items-center gap-1 text-red-500 font-bold">
                                    <span>❤️</span> <span class="text-sm">${estado.vidas}</span>
                                </div>
                            </div>

                            <div class="text-[11px] font-bold text-emerald-400 uppercase tracking-wider mb-1">Fixação de Verbo e Adjetivo:</div>
                            <h2 class="text-zinc-300 font-semibold text-xs mb-3 leading-relaxed">${q.pergunta}</h2>
                            
                            <div class="bg-zinc-900 rounded-3xl border border-zinc-800 overflow-hidden mb-3 shadow-xl">
                                <div class="h-28 w-full overflow-hidden relative">
                                    <img src="${q.imagemExercicio}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                </div>
                                <div class="p-3 flex items-center justify-between bg-zinc-900">
                                    <div>
                                        <div class="text-[9px] text-zinc-500 uppercase font-semibold">Estrutura Correta</div>
                                        <div class="text-sm font-bold text-zinc-100">${q.audioFrances}</div>
                                    </div>
                                    <button onclick="tocarAudio('${q.audioFrances}')" class="w-10 h-10 bg-green-500 hover:bg-green-400 text-zinc-950 rounded-2xl flex items-center justify-center text-base shadow-lg transition active:scale-95 shrink-0" title="Ouvir áudio nativo">
                                        🔊
                                    </button>
                                </div>
                            </div>

                            <div class="flex flex-col gap-2" id="opcoes-container">
                                ${q.opcoes.map((opcao, index) => `
                                    <button onclick="verificarResposta(${index})" class="opcao-btn p-3 bg-zinc-900 border-2 border-zinc-800 hover:border-zinc-700 rounded-2xl text-left font-medium text-zinc-200 transition active:scale-[0.98] text-xs">
                                        ${opcao}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div></div>
                    </div>
                `;
            } else if (estado.tela === 'vitoria') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="text-6xl mb-4 animate-bounce">🏆</div>
                        <h1 class="text-3xl font-extrabold mb-2 text-green-400">Oficina Concluída com Sucesso!</h1>
                        <p class="text-zinc-400 mb-8 text-sm">Você construiu seu saber conectando verbos, adjetivos e diálogos práticos no nível A1. Ganhou <strong>+300 XP</strong>.</p>
                        <button onclick="reiniciarJornada()" class="w-full py-4 bg-green-500 hover:bg-green-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-green-500/20 transition">
                            REINICIAR OFICINA
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'derrota') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="text-6xl mb-4 animate-bounce">💡</div>
                        <h1 class="text-3xl font-extrabold mb-2 text-red-500">Vidas esgotadas!</h1>
                        <p class="text-zinc-400 mb-8 text-sm">A repetição e a lógica dos verbos fixam o saber. Tente novamente.</p>
                        <button onclick="iniciarLicao()" class="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-extrabold rounded-2xl shadow-lg shadow-red-600/20 transition">
                            TENTAR NOVAMENTE
                        </button>
                    </div>
                `;
            }
        }

        function iniciarLicao() {
            estado.vidas = 3;
            estado.questaoAtualIndex = 0;
            estado.tela = 'teoria';
            renderizar();
        }

        function irParaExercicio() {
            estado.tela = 'licao';
            renderizar();
        }

        function reiniciarJornada() {
            estado.xp += 300;
            estado.nivelAtual = 1;
            estado.questaoAtualIndex = 0;
            estado.tela = 'menu';
            renderizar();
        }

        function verificarResposta(indexSelecionado) {
            const item = questoes[estado.questaoAtualIndex];
            const q = item.exercicio;
            const botoes = document.querySelectorAll('.opcao-btn');
            
            botoes.forEach(b => b.disabled = true);

            if (indexSelecionado === q.correta) {
                botoes[indexSelecionado].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[indexSelecionado].classList.add('bg-green-600/30', 'border-green-500', 'text-green-300');
                
                setTimeout(() => {
                    estado.questaoAtualIndex++;
                    estado.nivelAtual = estado.questaoAtualIndex + 1;
                    if (estado.questaoAtualIndex >= questoes.length) {
                        estado.tela = 'vitoria';
                    } else {
                        estado.tela = 'teoria';
                    }
                    renderizar();
                }, 900);
            } else {
                botoes[indexSelecionado].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[indexSelecionado].classList.add('bg-red-600/30', 'border-red-500', 'text-red-300');
                botoes[q.correta].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[q.correta].classList.add('bg-green-600/30', 'border-green-500', 'text-green-300');

                estado.vidas--;

                setTimeout(() => {
                    if (estado.vidas <= 0) {
                        estado.tela = 'derrota';
                    } else {
                        renderizar();
                    }
                }, 1200);
            }
        }

        function voltarMenu() {
            estado.tela = 'menu';
            renderizar();
        }

        renderizar();
    </script>
</body>
</html>
