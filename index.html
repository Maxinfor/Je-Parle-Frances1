<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaDu Lógico A1 - Foco em Verbos e Adjetivos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white font-sans min-h-screen flex flex-col justify-between select-none">

    <!-- Container Principal do App -->
    <div id="app" class="w-full max-w-md mx-auto p-6 flex flex-col justify-between flex-grow">
        <!-- O conteúdo dinâmico será injetado aqui -->
    </div>

    <script>
        // Estado do Sistema de Aprendizagem Progressiva A1
        let estado = {
            tela: 'menu', 
            vidas: 3,
            questaoAtualIndex: 0,
            xp: 0,
            nivelAtual: 1
        };

        // Função de Áudio Profissional Oficial (Français Natif)
        function tocarAudio(texto) {
            const textoCodificado = encodeURIComponent(texto);
            const urlAudio = `https://translate.google.com/translate_tts?ie=UTF-8&q=${textoCodificado}&tl=fr&client=tw-ob`;
            const audio = new Audio(urlAudio);
            audio.playbackRate = 0.85;
            audio.play().catch(erro => console.log("Áudio indisponível:", erro));
        }

        // Banco de Questões com Ensino Explícito de Verbos, Adjetivos e Prática Intensa
        const questoes = [
            {
                passo: "Módulo 1: Verbo & Adjetivo Essencial",
                ensinoTexto: "Vamos aprender o verbo: <strong>être</strong> (ser/estar - ex: <em>suis</em>) e o adjetivo: <strong>fatigué</strong> (cansado).",
                vocabulario: [
                    { palavra: "Je suis", significado: "Eu sou / estou (Verbo être)" },
                    { palavra: "fatigué", significado: "Cansado (Adjetivo masculino)" }
                ],
                explicacaoLogica: "A lógica de construção básica: Colocamos o pronome e o verbo conjugado <strong>je suis</strong> seguido do adjetivo de estado <strong>fatigué</strong>.",
                imagem: "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Je suis fatigué",
                exercicio: {
                    pergunta: "Aplicando o verbo e o adjetivo aprendidos, como se diz \"Eu estou cansado\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je suis fatigué",
                    audioTraducaoFR: "Eu estou cansado",
                    opcoes: ['J\'ai un chat', 'Je suis fatigué', 'Il fait beau', 'Nous allons au parc'],
                    correta: 1
                }
            },
            {
                passo: "Módulo 2: Verbo de Desejo & Adjetivo de Tamanho",
                ensinoTexto: "Vamos aprender o verbo: <strong>voudrais</strong> (quero / gostaria) e o adjetivo: <strong>grand</strong> (grande).",
                vocabulario: [
                    { palavra: "Je voudrais", significado: "Eu gostaria / quero (Verbo vouloir)" },
                    { palavra: "un grand", significado: "Um grande (Adjetivo masculino)" }
                ],
                explicacaoLogica: "A lógica de construção comercial: O verbo de polidez <strong>je voudrais</strong> expressa um pedido, acompanhado do adjetivo qualificativo <strong>grand</strong>.",
                imagem: "https://images.unsplash.com/photo-1550989460-0adf9ea622e2?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Je voudrais un grand café",
                exercicio: {
                    pergunta: "Utilizando o verbo voudrais e o adjetivo grand, como se diz \"Eu gostaria de um café grande\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1550989460-0adf9ea622e2?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je voudrais un grand café",
                    audioTraducaoFR: "Eu gostaria de um café grande",
                    opcoes: ['Je mange du pain', 'Je voudrais un grand café', 'Il pleut fort', 'Tu as une voiture'],
                    correta: 1
                }
            },
            {
                passo: "Módulo 3: Verbo de Posse & Adjetivo de Dimensão",
                ensinoTexto: "Vamos aprender o verbo: <strong>avoir</strong> (ter - ex: <em>ai</em>) e o adjetivo: <strong>petit</strong> (pequeno).",
                vocabulario: [
                    { palavra: "J'ai", significado: "Eu tenho (Verbo avoir)" },
                    { palavra: "un petit", significado: "Um pequeno (Adjetivo masculino)" }
                ],
                explicacaoLogica: "A lógica de posse: <strong>J'ai</strong> indica o que você possui, somado ao adjetivo descritivo de tamanho <strong>petit</strong> antes do substantivo.",
                imagem: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&w=600&q=80",
                audioFrase: "J'ai un petit chat",
                exercicio: {
                    pergunta: "Como se diz \"Eu tenho um gato pequeno\" seguindo a estrutura do verbo avoir e adjetivo petit?",
                    imagemExercicio: "https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'ai un petit chat",
                    audioTraducaoFR: "Eu tenho um gato pequeno",
                    opcoes: ['Il fait beau', 'J\'ai un petit chat', 'Je suis grand', 'Nous allons au cinéma'],
                    correta: 1
                }
            },
            {
                passo: "Módulo 4: Verbo de Moradia & Adjetivo Descritivo",
                ensinoTexto: "Vamos aprender o verbo: <strong>habiter</strong> (morar - ex: <em>habite</em>) e o adjetivo: <strong>belle</strong> (bonita / bela).",
                vocabulario: [
                    { palavra: "J'habite", significado: "Eu moro (Verbo habiter)" },
                    { palavra: "une belle", significado: "Uma bela (Adjetivo feminino)" }
                ],
                explicacaoLogica: "A lógica residencial: O verbo de endereço <strong>j'habite</strong> combinado com o adjetivo qualificativo feminino <strong>belle</strong>.",
                imagem: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80",
                audioFrase: "J'habite une belle maison",
                exercicio: {
                    pergunta: "Aplicando o verbo habiter e o adjetivo belle, como se diz \"Eu moro em uma casa bonita\"?",
                    imagemExercicio: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "J'habite une belle maison",
                    audioTraducaoFR: "Eu moro em uma casa bonita",
                    opcoes: ['Je suis fatigué', 'J\'habite une belle maison', 'Il fait très froid', 'J\'ai un chat'],
                    correta: 1
                }
            },
            {
                passo: "Módulo 5: Verbo Climático & Adjetivo Térmico",
                ensinoTexto: "Vamos aprender o verbo impessoal: <strong>faire</strong> (fazer - ex: <em>fait</em>) e o adjetivo: <strong>froid</strong> (frio).",
                vocabulario: [
                    { palavra: "Il fait", significado: "Ele faz / Está (Verbo faire)" },
                    { palavra: "très froid", significado: "Muito frio (Adjetivo térmico)" }
                ],
                explicacaoLogica: "A lógica do clima: Usamos a estrutura impessoal <strong>il fait</strong> acompanhada do adjetivo de temperatura <strong>froid</strong>.",
                imagem: "https://images.unsplash.com/photo-1519692933481-e162a57d6721?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Il fait très froid",
                exercicio: {
                    pergunta: "Como se diz \"Está muito frio\" usando o verbo faire e o adjetivo froid?",
                    imagemExercicio: "https://images.unsplash.com/photo-1519692933481-e162a57d6721?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Il fait très froid",
                    audioTraducaoFR: "Está muito frio",
                    opcoes: ['Il fait beau', 'Il fait très froid', 'Je suis fatigué', 'J\'ai un café'],
                    correta: 1
                }
            },
            {
                passo: "Revisão e Prática Interativa",
                ensinoTexto: "Vamos consolidar todos os verbos e adjetivos estudados em um exercício de fixação intensiva.",
                vocabulario: [
                    { palavra: "Révision", significado: "Revisão geral de estruturas" }
                ],
                explicacaoLogica: "A fixação ocorre repetindo a lógica: Verbos que expressam estados, desejos, posses, moradia e clima combinados com seus adjetivos.",
                imagem: "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Je pratique les verbes et les adjectifs pour apprendre",
                exercicio: {
                    pergunta: "Qual alternativa utiliza corretamente o verbo voudrais (quero/gostaria) com o adjetivo grand?",
                    imagemExercicio: "https://images.unsplash.com/photo-1550989460-0adf9ea622e2?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je voudrais un grand café",
                    audioTraducaoFR: "Eu gostaria de um café grande",
                    opcoes: ['Je suis fatigué', 'Je voudrais un grand café', 'J\'habite une petite maison', 'Il fait froid'],
                    correta: 1
                }
            },
            {
                passo: "Diálogo Prático Final",
                ensinoTexto: "Hora de aplicar o saber em uma conversa real entre duas pessoas no cotidiano.",
                vocabulario: [
                    { palavra: "Dialogue", significado: "Prática conversacional guiada" }
                ],
                explicacaoLogica: "No diálogo, você une o verbo aprendido à resposta ideal para interagir com naturalidade em francês.",
                imagem: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=600&q=80",
                audioFrase: "Bonjour, je voudrais un grand café s'il vous plaît.",
                exercicio: {
                    pergunta: "O atendente pergunta o que você quer na cafeteria. Como você diz que gostaria de um café grande?",
                    imagemExercicio: "https://images.unsplash.com/photo-1550989460-0adf9ea622e2?auto=format&fit=crop&w=600&q=80",
                    audioFrances: "Je voudrais un grand café",
                    audioTraducaoFR: "Eu gostaria de um café grande",
                    opcoes: ['Je suis fatigué', 'Je voudrais un grand café', 'J\'habite ici', 'Il fait beau'],
                    correta: 1
                }
            }
        ];

        function renderizar() {
            const app = document.getElementById('app');
            
            if (estado.tela === 'menu') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="w-28 h-28 bg-gradient-to-tr from-amber-500 to-orange-500 rounded-3xl flex items-center justify-center shadow-2xl shadow-orange-500/20 mb-6 animate-pulse border border-orange-400/30">
                            <span class="text-5xl">📚</span>
                        </div>
                        <h1 class="text-3xl font-extrabold mb-1 text-zinc-100">LinguaDu Lógico</h1>
                        <p class="text-zinc-400 mb-6 text-sm">Oficina de Verbos e Adjetivos para Iniciantes (A1)</p>
                        
                        <div class="flex gap-3 mb-8 w-full justify-center">
                            <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <span class="text-yellow-400">⚡</span>
                                <div class="text-left"><div class="text-[10px] text-zinc-500 uppercase font-bold">XP</div><div class="text-sm font-bold text-zinc-200">${estado.xp}</div></div>
                            </div>
                            <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-2xl flex items-center gap-2">
                                <span class="text-blue-400">📈</span>
                                <div class="text-left"><div class="text-[10px] text-zinc-500 uppercase font-bold">Módulos</div><div class="text-sm font-bold text-zinc-200">${estado.nivelAtual}/${questoes.length}</div></div>
                            </div>
                        </div>

                        <button onclick="iniciarLicao()" class="w-full py-4 bg-orange-500 hover:bg-orange-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-orange-500/20 transition active:scale-95 text-base">
                            INICIAR APRENDIZAGEM
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'teoria') {
                const item = questoes[estado.questaoAtualIndex];
                const porcentagem = (estado.questaoAtualIndex / questoes.length) * 100;

                setTimeout(() => tocarAudio(item.audioFrase), 400);

                app.innerHTML = `
                    <div class="flex flex-col justify-between flex-grow">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <button onclick="voltarMenu()" class="text-zinc-500 hover:text-zinc-300 font-bold text-lg">✕</button>
                                <div class="w-2/3 bg-zinc-800 h-3 rounded-full overflow-hidden">
                                    <div class="bg-orange-500 h-full transition-all duration-300" style="width: ${porcentagem}%"></div>
                                </div>
                                <div class="flex items-center gap-1 text-red-500 font-bold">
                                    <span>❤️</span> <span class="text-sm">${estado.vidas}</span>
                                </div>
                            </div>

                            <div class="font-bold text-[11px] uppercase tracking-wider mb-2 text-center py-1.5 rounded-xl border bg-orange-500/10 text-orange-400 border-orange-500/20">📍 ${item.passo}</div>

                            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl mt-1">
                                <div class="relative h-32 w-full overflow-hidden">
                                    <img src="${item.imagem}" class="w-full h-full object-cover brightness-90 hover:scale-105 transition duration-500">
                                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                </div>
                                <div class="p-3.5">
                                    <div class="mb-2 bg-zinc-950/70 p-2.5 rounded-2xl border border-zinc-800">
                                        <div class="text-[11px] text-amber-300 font-medium leading-relaxed">${item.ensinoTexto}</div>
                                    </div>

                                    ${item.vocabulario && item.vocabulario.length > 1 ? `
                                        <div class="grid grid-cols-2 gap-1 mb-2.5 bg-zinc-950/60 p-2 rounded-xl border border-zinc-800">
                                            ${item.vocabulario.map(v => `
                                                <div class="text-center bg-zinc-900 p-1.5 rounded-lg border border-zinc-800">
                                                    <div class="text-orange-400 font-bold text-[11px]">${v.palavra}</div>
                                                    <div class="text-[9px] text-zinc-400">${v.significado}</div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    ` : ''}

                                    <div class="flex justify-between items-center mb-1">
                                        <h2 class="text-xs font-bold text-zinc-100">Lógica de Construção:</h2>
                                        <button onclick="tocarAudio('${item.audioFrase}')" class="w-6 h-6 bg-orange-500/20 text-orange-400 hover:bg-orange-500/30 rounded-full flex items-center justify-center transition shrink-0 text-xs" title="Ouvir áudio">
                                            🔊
                                        </button>
                                    </div>
                                    <p class="text-zinc-300 text-[11px] leading-relaxed">${item.explicacaoLogica}</p>
                                </div>
                            </div>
                        </div>

                        <button onclick="irParaExercicio()" class="w-full py-3.5 bg-orange-500 hover:bg-orange-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-orange-500/25 transition mt-3 active:scale-95 text-xs">
                            FAZER EXERCÍCIO
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'licao') {
                const item = questoes[estado.questaoAtualIndex];
                const q = item.exercicio;
                const porcentagem = ((estado.questaoAtualIndex + 0.5) / questoes.length) * 100;

                app.innerHTML = `
                    <div class="flex flex-col justify-between flex-grow">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <button onclick="voltarMenu()" class="text-zinc-500 hover:text-zinc-300 font-bold text-lg">✕</button>
                                <div class="w-2/3 bg-zinc-800 h-3 rounded-full overflow-hidden">
                                    <div class="bg-green-500 h-full transition-all duration-300" style="width: ${porcentagem}%"></div>
                                </div>
                                <div class="flex items-center gap-1 text-red-500 font-bold">
                                    <span>❤️</span> <span class="text-sm">${estado.vidas}</span>
                                </div>
                            </div>

                            <div class="text-[11px] font-bold text-emerald-400 uppercase tracking-wider mb-1">Aplicação Prática:</div>
                            <h2 class="text-zinc-300 font-semibold text-xs mb-3 leading-relaxed">${q.pergunta}</h2>
                            
                            <div class="bg-zinc-900 rounded-3xl border border-zinc-800 overflow-hidden mb-3 shadow-xl">
                                <div class="h-28 w-full overflow-hidden relative">
                                    <img src="${q.imagemExercicio}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900 via-transparent to-transparent"></div>
                                </div>
                                <div class="p-3 flex items-center justify-between bg-zinc-900">
                                    <div>
                                        <div class="text-[9px] text-zinc-500 uppercase font-semibold">Estrutura Correta</div>
                                        <div class="text-sm font-bold text-zinc-100">${q.audioFrances}</div>
                                    </div>
                                    <button onclick="tocarAudio('${q.audioFrances}')" class="w-10 h-10 bg-green-500 hover:bg-green-400 text-zinc-950 rounded-2xl flex items-center justify-center text-base shadow-lg transition active:scale-95 shrink-0" title="Ouvir áudio nativo">
                                        🔊
                                    </button>
                                </div>
                            </div>

                            <div class="flex flex-col gap-2" id="opcoes-container">
                                ${q.opcoes.map((opcao, index) => `
                                    <button onclick="verificarResposta(${index})" class="opcao-btn p-3 bg-zinc-900 border-2 border-zinc-800 hover:border-zinc-700 rounded-2xl text-left font-medium text-zinc-200 transition active:scale-[0.98] text-xs">
                                        ${opcao}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div></div>
                    </div>
                `;
            } else if (estado.tela === 'vitoria') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="text-6xl mb-4 animate-bounce">🏆</div>
                        <h1 class="text-3xl font-extrabold mb-2 text-green-400">Módulos Concluídos!</h1>
                        <p class="text-zinc-400 mb-8 text-sm">Você aprendeu os verbos, adjetivos e praticou exaustivamente para construir seu saber no nível A1. Ganhou <strong>+350 XP</strong>.</p>
                        <button onclick="reiniciarJornada()" class="w-full py-4 bg-green-500 hover:bg-green-400 text-zinc-950 font-extrabold rounded-2xl shadow-lg shadow-green-500/20 transition">
                            REINICIAR APRENDIZAGEM
                        </button>
                    </div>
                `;
            } else if (estado.tela === 'derrota') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center flex-grow text-center">
                        <div class="text-6xl mb-4 animate-bounce">💡</div>
                        <h1 class="text-3xl font-extrabold mb-2 text-red-500">Vidas esgotadas!</h1>
                        <p class="text-zinc-400 mb-8 text-sm">A prática com verbos e adjetivos consolida a memória. Tente novamente.</p>
                        <button onclick="iniciarLicao()" class="w-full py-4 bg-red-600 hover:bg-red-500 text-white font-extrabold rounded-2xl shadow-lg shadow-red-600/20 transition">
                            TENTAR NOVAMENTE
                        </button>
                    </div>
                `;
            }
        }

        function iniciarLicao() {
            estado.vidas = 3;
            estado.questaoAtualIndex = 0;
            estado.tela = 'teoria';
            renderizar();
        }

        function irParaExercicio() {
            estado.tela = 'licao';
            renderizar();
        }

        function reiniciarJornada() {
            estado.xp += 350;
            estado.nivelAtual = 1;
            estado.questaoAtualIndex = 0;
            estado.tela = 'menu';
            renderizar();
        }

        function verificarResposta(indexSelecionado) {
            const item = questoes[estado.questaoAtualIndex];
            const q = item.exercicio;
            const botoes = document.querySelectorAll('.opcao-btn');
            
            botoes.forEach(b => b.disabled = true);

            if (indexSelecionado === q.correta) {
                botoes[indexSelecionado].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[indexSelecionado].classList.add('bg-green-600/30', 'border-green-500', 'text-green-300');
                
                setTimeout(() => {
                    estado.questaoAtualIndex++;
                    estado.nivelAtual = estado.questaoAtualIndex + 1;
                    if (estado.questaoAtualIndex >= questoes.length) {
                        estado.tela = 'vitoria';
                    } else {
                        estado.tela = 'teoria';
                    }
                    renderizar();
                }, 900);
            } else {
                botoes[indexSelecionado].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[indexSelecionado].classList.add('bg-red-600/30', 'border-red-500', 'text-red-300');
                botoes[q.correta].classList.remove('bg-zinc-900', 'border-zinc-800');
                botoes[q.correta].classList.add('bg-green-600/30', 'border-green-500', 'text-green-300');

                estado.vidas--;

                setTimeout(() => {
                    if (estado.vidas <= 0) {
                        estado.tela = 'derrota';
                    } else {
                        renderizar();
                    }
                }, 1200);
            }
        }

        function voltarMenu() {
            estado.tela = 'menu';
            renderizar();
        }

        renderizar();
    </script>
</body>
</html>
