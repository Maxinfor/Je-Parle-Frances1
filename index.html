<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JE Parle Français - Méthode CEFR</title>
    <!-- Google Fonts para um visual mais premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #002395;      /* Azul Oficial da França */
            --primary-light: #eef2ff;
            --white: #ffffff;
            --red: #ED2939;          /* Vermelho Oficial da França */
            --background: #f8fafc;
            --success: #10b981;
            --success-light: #ecfdf5;
            --error: #ef4444;
            --error-light: #fef2f2;
            --dark: #0f172a;
            --gray: #64748b;
            --gray-light: #f1f5f9;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--background);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
            max-width: 640px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        header h1 span {
            color: var(--red);
        }

        .container {
            width: 100%;
            max-width: 640px;
            background: var(--white);
            padding: 32px 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        /* Status & Gamificação */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--gray-light);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .streak { color: #f97316; display: flex; align-items: center; gap: 4px; }
        .xp { color: #8b5cf6; display: flex; align-items: center; gap: 4px; }
        .level-badge { color: var(--primary); background: rgba(0, 35, 149, 0.1); padding: 4px 8px; border-radius: var(--radius-sm); }

        /* Navegação de Níveis */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: var(--gray-light);
            color: var(--gray);
            border: 1px solid transparent;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: var(--transition);
        }

        .tab-btn:hover {
            background: var(--border);
            color: var(--dark);
        }

        .tab-btn.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        /* Descrição Pedagógica */
        .level-desc {
            font-size: 0.875rem;
            color: #334155;
            background: var(--primary-light);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            border-left: 4px solid var(--primary);
            line-height: 1.5;
        }

        /* Barra de Progresso */
        .progress-container {
            background-color: var(--gray-light);
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--success), #34d399);
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Exercício Card */
        .exercise-card {
            display: flex;
            flex-direction: column;
        }

        .question {
            font-size: 1.25rem;
            margin-bottom: 20px;
            font-weight: 600;
            line-height: 1.5;
            color: var(--dark);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-btn {
            background: var(--white);
            border: 2px solid var(--border);
            padding: 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            font-weight: 500;
            color: var(--dark);
            transition: var(--transition);
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        /* Estados de Validação das Opções */
        .option-btn.selected {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .option-btn.correct-reveal {
            border-color: var(--success);
            background: var(--success-light);
            color: #065f46;
        }

        .option-btn.wrong-reveal {
            border-color: var(--error);
            background: var(--error-light);
            color: #991b1b;
        }

        /* Caixa de Áudio e Fala */
        .audio-practice-box {
            background: var(--gray-light);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border: 1px solid var(--border);
        }

        .target-phrase {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .phrase-translation {
            font-size: 0.9rem;
            color: var(--gray);
        }

        .listen-btn {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(0, 35, 149, 0.15);
            transition: var(--transition);
        }

        .listen-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0, 35, 149, 0.25);
        }

        /* Interface do Microfone */
        .mic-interface {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 24px 0;
            gap: 12px;
        }

        .mic-btn {
            background: var(--red);
            color: var(--white);
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(237, 41, 57, 0.3);
            transition: var(--transition);
        }

        .mic-btn:hover:not(.recording) {
            transform: scale(1.05);
        }

        .mic-btn.recording {
            background: #c01c28;
            animation: pulse 1.4s infinite ease-in-out;
            box-shadow: 0 0 0 20px rgba(237, 41, 57, 0.2);
        }

        .mic-status-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--gray);
        }

        /* Feedback Container Dinâmico */
        .feedback {
            padding: 16px;
            border-radius: var(--radius-md);
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .feedback.correct {
            display: block;
            background: var(--success-light);
            color: #065f46;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .feedback.wrong {
            display: block;
            background: var(--error-light);
            color: #991b1b;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Botão Global de Ação */
        .action-btn {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(0, 35, 149, 0.1);
        }

        .action-btn:hover:not(:disabled) {
            background: #001a70;
            transform: translateY(-1px);
        }

        .action-btn:disabled {
            background: var(--border);
            color: var(--gray);
            cursor: not-allowed;
            box-shadow: none;
        }

        .action-btn.success-mode {
            background: var(--success);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        }
        .action-btn.success-mode:hover {
            background: #059669;
        }

        /* Modal de Recompensa */
        .modal-reward {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .reward-content {
            background: var(--white);
            padding: 40px 32px;
            border-radius: var(--radius-lg);
            text-align: center;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        @keyframes popUp {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>JE Parle <span>Français</span></h1>
    </header>

    <div class="container">
        <!-- Barra de Status Gamificada -->
        <div class="status-bar">
            <span class="level-badge" id="current-level-display">Nível: A1</span>
            <span class="streak" id="streak-display">🔥 0 Dias</span>
            <span class="xp" id="xp-display">✨ 0 XP</span>
        </div>

        <!-- Abas de Nível (CEFR) -->
        <div class="tabs" id="level-tabs">
            <button class="tab-btn active" onclick="changeLevel('A1')">A1</button>
            <button class="tab-btn" onclick="changeLevel('A2')">A2</button>
            <button class="tab-btn" onclick="changeLevel('B1')">B1</button>
            <button class="tab-btn" onclick="changeLevel('B2')">B2</button>
            <button class="tab-btn" onclick="changeLevel('C1')">C1</button>
            <button class="tab-btn" onclick="changeLevel('C2')">C2</button>
        </div>

        <!-- Diretrizes Pedagógicas -->
        <div class="level-desc" id="level-description-text">Carregando diretrizes...</div>

        <!-- Barra de Progresso -->
        <div class="progress-container">
            <div class="progress-bar" id="lesson-progress"></div>
        </div>

        <!-- Bloco de Exercícios Dinâmicos -->
        <div id="exercise-container" class="exercise-card"></div>

        <!-- Feedback Operacional Global -->
        <div id="global-feedback" class="feedback"></div>
        
        <!-- Botão Unificado Principal -->
        <button id="action-btn" class="action-btn" onclick="handleMainAction()" disabled>Verificar Resposta</button>
    </div>

    <!-- Modal de Vitória -->
    <div class="modal-reward" id="reward-modal">
        <div class="reward-content">
            <div style="font-size: 4.5rem; margin-bottom: 20px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">🏆</div>
            <h2 style="font-size: 1.75rem; color: var(--dark); margin-bottom: 8px;">Félicitations!</h2>
            <p style="color: var(--gray); margin-bottom: 16px;">Você concluiu com maestria este conjunto de competências operacionais mundiais!</p>
            <p style="color: var(--success); font-weight: 700; font-size: 1.2rem; margin-bottom: 24px;">+50 XP Conquistados</p>
            <button class="action-btn success-mode" onclick="closeRewardModal()">Progredir para o Próximo Nível</button>
        </div>
    </div>

    <script>
        // Metadados pedagógicos dos níveis mundiais (CEFR)
        const levelMeta = {
            A1: "A1 (Iniciante): Situações cotidianas simples, apresentações básicas e necessidades concretas imediatas.",
            A2: "A2 (Elementar): Sobrevivência social, rotina familiar, compras, direções e tarefas habituais.",
            B1: "B1 (Intermediário): Independência prática. Lidar com viagens, expor planos, sonhos e defender opiniões básicas.",
            B2: "B2 (Pós-Intermediário): Fluência ativa, argumentação técnica, interações sociais complexas sem esforço mútuo.",
            C1: "C1 (Avançado): Uso acadêmico e corporativo autônomo. Expressão fluida, estruturada e compreensão de subtextos.",
            C2: "C2 (Domínio Pleno): Fluência idêntica à nativa, distinção precisa de sutilezas e produção de alta complexidade."
        };

        // Banco de Dados Expandido e Otimizado
        const database = {
            A1: [
                {
                    question: "[A1 - Interação Básica] Você chega à recepção de um hotel em Paris pela manhã. Como inicia o contato para solicitar o check-in?",
                    options: ["Au revoir, monsieur.", "Bonjour, s'il vous plaît.", "Enchanté, de rien.", "Bonsoir, ça va?"],
                    correct: 1,
                    phrase: "Bonjour, s'il vous plaît",
                    translation: "Bom dia, por favor."
                },
                {
                    question: "[A1 - Necessidade Concreta] Na feira, você precisa pagar as suas compras e quer saber o valor total. O que dizer?",
                    options: ["C'est gratuit?", "Ça fait combien, s'il vous plaît?", "Où habitez-vous?", "Je m'appelle Jean."],
                    correct: 1,
                    phrase: "Ça fait combien, s'il vous plaît",
                    translation: "Quanto fica tudo, por favor?"
                }
            ],
            A2: [
                {
                    question: "[A2 - Sobrevivência Urbana] Você está em uma estação e precisa descobrir onde pegar o trem para o aeroporto. Como formular a pergunta?",
                    options: ["Où est le train pour l'aéroport?", "Je voudrais un croissant.", "Le train est très beau.", "Je ne comprends pas."],
                    correct: 0,
                    phrase: "Où est le train pour l'aéroport",
                    translation: "Onde fica o trem para o aeroporto?"
                },
                {
                    question: "[A2 - Rotina] Você entra em um café parisiense e quer pedir a refeição matinal tradicional. O que diz ao atendente?",
                    options: ["Je n'aime pas le café.", "Je voudrais un café et un croissant, s'il vous plaît.", "Combien coûte votre voiture?", "Il fait froid aujourd'hui."],
                    correct: 1,
                    phrase: "Je voudrais un café et un croissant, s'il vous plaît",
                    translation: "Eu gostaria de um café e um croissant, por favor."
                }
            ],
            B1: [
                {
                    question: "[B1 - Gestão de Imprevistos] Durante uma viagem de trem, ocorreu um imprevisto na sua programação. Como você avisa o hotel que chegará mais tarde?",
                    options: ["Je ne viens plus.", "Désolé, j'ai manqué le train, je vais arriver en retard.", "Le train fonctionne bien.", "C'est une bonne idée."],
                    correct: 1,
                    phrase: "Désolé, j'ai manqué le train, je vais arriver en retard",
                    translation: "Desculpe, perdi o trem, vou chegar atrasado."
                },
                {
                    question: "[B1 - Opiniões] Um colega sugere um passeio e você concorda plenamente com os argumentos dele. Como responder?",
                    options: ["Je suis tout à fait d'accord avec toi.", "Je ne sais pas écrire.", "Où sont les clés?", "C'est inadmissible."],
                    correct: 0,
                    phrase: "Je suis tout à fait d'accord avec toi",
                    translation: "Eu estou totalmente de acordo com você."
                }
            ],
            B2: [
                {
                    question: "[B2 - Negociação] No trabalho ou em uma reunião social, você precisa discordar de uma proposta de forma polida, mas categórica e clara:",
                    options: ["Tu as tort, c'est bête.", "Je comprends votre point de vue, cependant je ne partage pas votre avis.", "Je m'en fiche complètement.", "C'est parfait, allons-y."],
                    correct: 1,
                    phrase: "Je comprends votre point de vue, cependant je ne partage pas votre avis",
                    translation: "Compreendo seu ponto de vista, contudo não compartilho da sua opinião."
                }
            ],
            C1: [
                {
                    question: "[C1 - Expressões Idiomáticas] Para expressar no ambiente de negócios que você, sem querer, tocou em um assunto delicado ou cometeu uma gafe pública, qual estrutura avançada utiliza?",
                    options: ["J'ai mis les pieds dans le plat.", "J'ai mangé de la soupe.", "Je suis tombé par terre.", "Il fait un temps de chien."],
                    correct: 0,
                    phrase: "J'ai mis les pieds dans le plat",
                    translation: "Eu cometi uma gafe / toquei em um assunto delicado."
                }
            ],
            C2: [
                {
                    question: "[C2 - Domínio Sintático] Qual das opções apresenta uma estrutura de alto nível e nuance absoluta aplicável para reafirmar o sucesso de um projeto complexo sob qualquer circunstância?",
                    options: ["On va gagner, c'est sûr.", "Quoi qu'il en soit, nous y parviendrons sans faille.", "C'est fini pour tout le monde.", "Après la pluie, le beau temps."],
                    correct: 1,
                    phrase: "Quoi qu'il en soit, nous y parviendrons sans faille",
                    translation: "Seja como for, nós conseguiremos sem falhas."
                }
            ]
        };

        // Estado do Aplicativo
        let userState = {
            currentLevel: 'A1',
            xp: 0,
            streak: 0,
            lastActiveDate: null
        };

        let currentExerciseIndex = 0;
        let lessonStep = "QUIZ"; // QUIZ, CHECKED, SPEAK, NEXT
        let selectedOptionIdx = null;
        let recognition = null;
        let isListening = false;

        window.onload = function() {
            loadUserData();
            loadLevelData();
            setupSpeechRecognition();
        };

        function loadUserData() {
            const savedState = localStorage.getItem('jeParleFrancais_CEFR_Data');
            if (savedState) {
                userState = JSON.parse(savedState);
                updateUI();
            }
        }

        function saveUserData() {
            localStorage.setItem('jeParleFrancais_CEFR_Data', JSON.stringify(userState));
            updateUI();
        }

        function updateUI() {
            document.getElementById('xp-display').innerHTML = `✨ ${userState.xp} XP`;
            document.getElementById('streak-display').innerHTML = `🔥 ${userState.streak} Dias`;
            document.getElementById('current-level-display').innerText = `Nível: ${userState.currentLevel}`;
            document.getElementById('level-description-text').innerText = levelMeta[userState.currentLevel];
        }

        function changeLevel(level) {
            userState.currentLevel = level;
            currentExerciseIndex = 0;
            lessonStep = "QUIZ";
            selectedOptionIdx = null;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === level);
            });

            loadLevelData();
            saveUserData();
        }

        function loadLevelData() {
            const exercises = database[userState.currentLevel];
            const currentEx = exercises[currentExerciseIndex];
            const container = document.getElementById('exercise-container');
            const feedback = document.getElementById('global-feedback');
            const actionBtn = document.getElementById('action-btn');

            feedback.className = 'feedback';
            feedback.style.display = 'none';
            actionBtn.disabled = true;
            actionBtn.className = 'action-btn';
            actionBtn.innerText = "Verificar Resposta";

            const progressPercent = (currentExerciseIndex / exercises.length) * 100;
            document.getElementById('lesson-progress').style.width = `${progressPercent}%`;

            if (lessonStep === "QUIZ") {
                let optionsHTML = currentEx.options.map((opt, idx) => `
                    <button class="option-btn" id="opt-${idx}" onclick="selectOption(${idx})">${opt}</button>
                `).join('');

                container.innerHTML = `
                    <div class="question">${currentEx.question}</div>
                    <div class="options-grid">${optionsHTML}</div>
                `;
            } else if (lessonStep === "SPEAK") {
                container.innerHTML = `
                    <div class="question">Excelente! Agora ouça a expressão e pratique sua pronúncia em voz alta:</div>
                    <div class="audio-practice-box">
                        <div>
                            <div class="target-phrase">${currentEx.phrase}</div>
                            <div class="phrase-translation">Tradução: ${currentEx.translation}</div>
                        </div>
                        <button class="listen-btn" onclick="speakFrench('${currentEx.phrase.replace(/'/g, "\\'")}')">🔊 Ouvir</button>
                    </div>
                    
                    <div class="mic-interface">
                        <button class="mic-btn" id="mic-button" onclick="toggleListening()">🎙️</button>
                        <div class="mic-status-text" id="mic-status">Toque no microfone para falar</div>
                    </div>
                `;
                actionBtn.innerText = "Pular e Continuar";
                actionBtn.disabled = false;
            }
        }

        function selectOption(index) {
            if (lessonStep !== "QUIZ") return;
            selectedOptionIdx = index;
            
            document.querySelectorAll('.options-grid .option-btn').forEach((btn, idx) => {
                btn.classList.toggle('selected', idx === index);
            });

            document.getElementById('action-btn').disabled = false;
        }

        function handleMainAction() {
            const exercises = database[userState.currentLevel];
            const currentEx = exercises[currentExerciseIndex];
            const feedback = document.getElementById('global-feedback');
            const actionBtn = document.getElementById('action-btn');

            if (lessonStep === "QUIZ") {
                // Trava as opções e revela o resultado imediatamente na interface
                document.querySelectorAll('.options-grid .option-btn').forEach((btn, idx) => {
                    btn.disabled = true;
                    if (idx === currentEx.correct) {
                        btn.className = "option-btn correct-reveal";
                    } else if (idx === selectedOptionIdx) {
                        btn.className = "option-btn wrong-reveal";
                    }
                });

                if (selectedOptionIdx === currentEx.correct) {
                    feedback.innerText = "Correct! Excelente compreensão do contexto.";
                    feedback.className = "feedback correct";
                    actionBtn.innerText = "Ir para Prática de Fala";
                    actionBtn.className = "action-btn success-mode";
                    lessonStep = "CHECKED";
                } else {
                    feedback.innerText = "Oups! Opção incorreta para os padrões deste nível. Tente novamente.";
                    feedback.className = "feedback wrong";
                    // Dá uma nova chance ao usuário destravando após 1.5s
                    setTimeout(() => {
                        lessonStep = "QUIZ";
                        loadLevelData();
                    }, 1800);
                }
            } else if (lessonStep === "CHECKED") {
                lessonStep = "SPEAK";
                loadLevelData();
            } else if (lessonStep === "SPEAK" || lessonStep === "NEXT") {
                stopListening();
                currentExerciseIndex++;
                if (currentExerciseIndex < exercises.length) {
                    lessonStep = "QUIZ";
                    selectedOptionIdx = null;
                    loadLevelData();
                } else {
                    document.getElementById('lesson-progress').style.width = `100%`;
                    completeLesson();
                }
            }
        }

        function speakFrench(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = ['A1', 'A2'].includes(userState.currentLevel) ? 0.80 : 0.95;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("A reprodução nativa de áudio não é suportada neste navegador.");
            }
        }

        function setupSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'fr-FR';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onresult = function(event) {
                    stopListening();
                    const speechToText = event.results[0][0].transcript.toLowerCase();
                    const currentEx = database[userState.currentLevel][currentExerciseIndex];
                    
                    // Limpeza de pontuações para validação precisa
                    const expectedText = currentEx.phrase.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
                    const sanitizedSpeech = speechToText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
                    
                    const feedback = document.getElementById('global-feedback');
                    const actionBtn = document.getElementById('action-btn');
                    
                    if(sanitizedSpeech.includes(expectedText) || expectedText.includes(sanitizedSpeech)) {
                        feedback.innerText = `Excellent! Ouvimos perfeitamente: "${speechToText}"`;
                        feedback.className = "feedback correct";
                        actionBtn.innerText = "Avançar Próxima Etapa";
                        actionBtn.className = "action-btn success-mode";
                        lessonStep = "NEXT";
                    } else {
                        feedback.innerText = `Próximo! Ouvimos: "${speechToText}". Tente aproximar a pronúncia do áudio base.`;
                        feedback.className = "feedback wrong";
                    }
                };

                recognition.onerror = function() { stopListening(); };
                recognition.onend = function() { stopListening(); };
            }
        }

        function toggleListening() {
            if(!recognition) {
                alert("O Reconhecimento de voz não está disponível ou foi bloqueado no seu navegador. Ative as permissões ou utilize navegadores modernos (Chrome/Edge).");
                return;
            }
            const micBtn = document.getElementById('mic-button');
            const micStatus = document.getElementById('mic-status');

            if (isListening) {
                stopListening();
            } else {
                isListening = true;
                micBtn.classList.add('recording');
                micStatus.innerText = "🛑 Capturando áudio... fale agora";
                document.getElementById('global-feedback').style.display = 'none';
                try { recognition.start(); } catch(e){}
            }
        }

        function stopListening() {
            isListening = false;
            const micBtn = document.getElementById('mic-button');
            const micStatus = document.getElementById('mic-status');
            if(micBtn) micBtn.classList.remove('recording');
            if(micStatus) micStatus.innerText = "Toque no microfone para falar";
            if(recognition) { try { recognition.stop(); } catch(e){} }
        }

        function completeLesson() {
            const today = new Date().toDateString();
            if (userState.lastActiveDate !== today) {
                userState.streak += 1;
                userState.lastActiveDate = today;
            }
            userState.xp += 50;
            saveUserData();
            document.getElementById('reward-modal').style.display = 'flex';
        }

        function closeRewardModal() {
            document.getElementById('reward-modal').style.display = 'none';
            const levels = Object.keys(database);
            let nextIdx = levels.indexOf(userState.currentLevel) + 1;
            if(nextIdx >= levels.length) nextIdx = 0; 
            changeLevel(levels[nextIdx]);
        }
    </script>
</body>
</html>
