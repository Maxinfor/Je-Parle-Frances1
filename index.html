<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jornada Francesa: Níveis 1 a 5</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-top: 0; }
        .teoria { background: #e3f2fd; padding: 15px; border-radius: 8px; border-left: 5px solid #2196f3; margin-bottom: 15px; }
        .exemplo { background: #fff3e0; padding: 15px; border-radius: 8px; border-left: 5px solid #ff9800; margin-bottom: 15px; font-style: italic; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; text-align: left; background: white; transition: 0.2s; }
        .btn:hover:not(:disabled) { background: #f0f0f0; }
        .correct { background: #c8e6c9 !important; border-color: #4caf50 !important; }
        .wrong { background: #ffcdd2 !important; border-color: #f44336 !important; }
        #next { display: none; margin-top: 20px; width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card" id="app">
    <div id="content">
        <h2 id="titulo">Carregando...</h2>
        <div id="corpo"></div>
    </div>
    <button id="next" onclick="proximo()">PRÓXIMA LIÇÃO ➔</button>
</div>

<script>
    const jornada = [
        {
            titulo: "Nível 1: A Saudação (O Protocolo)",
            teoria: "Gramática: O uso de <b>Bonjour</b>. Na França, o cumprimento é a senha social. Ele reconhece a dignidade do outro antes de qualquer interação.",
            exemplo: "Ao entrar em qualquer lugar, diga: 'Bonjour, Monsieur' ou 'Bonjour, Madame'.",
            perg: "Qual a forma correta de iniciar uma interação em uma loja?",
            opc: ["Ir direto ao pedido", "Dizer 'Bonjour' antes de qualquer coisa", "Acenar com a mão"],
            correta: 1
        },
        {
            titulo: "Nível 2: O Radar Noturno",
            teoria: "Gramática: Uso do <b>Bonsoir</b>. A lógica francesa divide o dia: 'Bonjour' (até o fim da tarde) e 'Bonsoir' (após as 18h).",
            exemplo: "Às 19h, você diz: 'Bonsoir, une table pour deux'.",
            perg: "Você entra em um café às 20h. O que você diz?",
            opc: ["Bonjour", "Bonsoir", "Salut"],
            correta: 1
        },
        {
            titulo: "Nível 3: Polidez com 'S'il vous plaît'",
            teoria: "Gramática: A expressão <b>s'il vous plaît</b> (se lhe agrada). É a chave gramatical para transformar uma exigência em um pedido educado.",
            exemplo: "Em vez de 'Um café', diga: 'Un café, s'il vous plaît'.",
            perg: "Como pedir água de forma gramaticalmente educada?",
            opc: ["Je veux de l'eau", "De l'eau, s'il vous plaît", "Donne-moi l'eau"],
            correta: 1
        },
        {
            titulo: "Nível 4: Pronome de Respeito 'Vous'",
            teoria: "Gramática: Uso do <b>Vous</b> (o senhor/a senhora). É a ferramenta de distância segura para estranhos e ambientes formais.",
            exemplo: "Perguntar onde fica algo: 'Excusez-moi, où est le métro ?'",
            perg: "Por que usamos o 'Vous' com um estranho?",
            opc: ["Para ser rápido", "Para demonstrar respeito e manter distância segura", "Porque não sei o nome dele"],
            correta: 1
        },
        {
            titulo: "Nível 5: O Verbo 'Pouvoir'",
            teoria: "Gramática: O verbo <b>Pouvoir</b> (poder) com <b>Vous</b>. Estrutura: <b>Pouvez-vous + [verbo]?</b> Isso torna sua solicitação um pedido de auxílio.",
            exemplo: "Para pedir um horário: 'Pouvez-vous me donner un rendez-vous ?'",
            perg: "Como pedir ajuda para verificar a agenda de forma polida?",
            opc: ["Tu as un temps ?", "Pouvez-vous vérifier votre agenda ?", "Donne-moi ton agenda"],
            correta: 1
        }
    ];

    let i = 0;

    function carregar() {
        const m = jornada[i];
        document.getElementById('titulo').innerText = m.titulo;
        document.getElementById('corpo').innerHTML = `
            <div class="teoria">${m.teoria}</div>
            <div class="exemplo"><strong>Exemplo:</strong> ${m.exemplo}</div>
            <p><strong>Questão:</strong> ${m.perg}</p>
            <div id="opcoes"></div>
        `;
        document.getElementById('next').style.display = 'none';

        m.opc.forEach((txt, idx) => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = txt;
            b.onclick = () => verificar(idx, b);
            document.getElementById('opcoes').appendChild(b);
        });
    }

    function verificar(idx, btn) {
        const btns = document.querySelectorAll('.btn');
        btns.forEach(b => b.disabled = true);
        if(idx === jornada[i].correta) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            btns[jornada[i].correta].classList.add('correct');
        }
        document.getElementById('next').style.display = 'block';
    }

    function proximo() {
        i++;
        if(i < jornada.length) {
            carregar();
        } else {
            document.getElementById('content').innerHTML = "<h2>🎉 Jornada Concluída!</h2><p>Você completou os 5 níveis de etiqueta e gramática francesa. Agora você possui a lógica para transitar com respeito e precisão.</p>";
            document.getElementById('next').style.display = 'none';
        }
    }

    document.addEventListener('DOMContentLoaded', carregar);
</script>
</body>
</html>
