<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Francês A1 - Nível 1 Completo</title>
    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --success: #27ae60;
            --error: #e74c3c;
            --warning: #f39c12;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; 
            box-sizing: border-box;
        }

        .app-container { 
            background: var(--card-bg); 
            width: 100%; 
            max-width: 480px; 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .hearts { font-size: 1.3em; letter-spacing: 2px; }

        /* Estante de Prêmios Famosos */
        .trophy-section {
            background: #f8fafc;
            padding: 15px;
            border-radius: 18px;
            border: 2px solid #e2e8f0;
            margin-bottom: 20px;
        }
        .trophy-title {
            font-size: 0.8em;
            font-weight: bold;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .trophy-container {
            display: flex;
            justify-content: center;
        }
        .trophy-slot {
            width: 75px;
            height: 75px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.3em;
            filter: grayscale(100%);
            opacity: 0.25;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            border: 2px dashed #b5c2d1;
        }
        .trophy-slot.unlocked {
            filter: grayscale(0%);
            opacity: 1;
            background: #fff;
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3);
            transform: scale(1.12) rotate(4deg);
            border: 2px solid var(--warning);
        }

        /* Alerta de Última Pergunta (Antecipação) */
        .boss-alert {
            display: none;
            background: linear-gradient(135deg, #e74c3c, #f39c12);
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.2);
            animation: pulse 1s infinite alternate;
        }

        .progress-container {
            background: #eee;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            background: var(--success);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }
        
        .character-zone { 
            display: flex; 
            align-items: center; 
            margin: 20px 0; 
            background: #f8fafc; 
            padding: 18px; 
            border-radius: 16px; 
            border-left: 6px solid var(--primary); 
            text-align: left; 
        }
        .char-avatar { 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            border: 3px solid #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin-right: 15px; 
            background-size: cover; 
            background-position: center; 
            flex-shrink: 0; 
        }
        .dialogue-box { flex-grow: 1; }
        .char-name { font-weight: bold; color: #2c3e50; font-size: 0.85em; margin-bottom: 3px; text-transform: uppercase; }
        .char-bubble { font-size: 1.05em; color: #34495e; margin: 0; line-height: 1.4; }
        .location-badge { display: inline-block; background: #e0f2fe; color: #0369a1; padding: 3px 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; margin-bottom: 6px; }
        
        .explanation-box {
            display: none;
            background: #fdf6e2;
            border: 1px solid #f39c12;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: left;
            font-size: 0.9em;
            color: #7e5109;
        }

        .choices { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        button { 
            padding: 15px; 
            border-radius: 14px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1em; 
            transition: all 0.2s;
        }
        button:hover { background: var(--primary-dark); }
        
        .choice-btn.correct { background: var(--success) !important; }
        .choice-btn.wrong { background: var(--error) !important; }
        
        #next-btn { background: var(--warning); width: 100%; margin-top: 15px; display: none; }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Tela Inicial -->
    <div id="start-screen">
        <h1>🇫🇷 Nível 1: Comunicação Inicial</h1>
        <p>Aprenda a cumprimentar, usar a polidez formal e se despedir de acordo com as normas mundiais de ensino <strong>(Padrão CECRL A1)</strong>.</p>
        <button style="background: var(--success); width:100%" onclick="iniciarApp()">Iniciar Módulo Completo 🚀</button>
    </div>

    <!-- Interface do Jogo -->
    <div id="game-ui" style="display:none;">
        <div class="status-bar">
            <span id="hearts-display" class="hearts">❤️❤️❤️</span>
            <span id="score-display" style="font-weight: bold; color: #7f8c8d;">Etapa 1/6</span>
        </div>

        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <!-- Estante de Prêmios -->
        <div class="trophy-section">
            <div class="trophy-title">Grande Prêmio do Nível 1:</div>
            <div class="trophy-container">
                <div id="trophy-0" class="trophy-slot">🏛️</div>
            </div>
        </div>

        <!-- Alerta Dinâmico de Prêmio -->
        <div id="boss-alert" class="boss-alert"></div>
        
        <h3 id="titulo-fase">Nível 1: Cumprimentos & Polidez</h3>
        
        <div class="character-zone">
            <div class="char-avatar" id="char-avatar"></div>
            <div class="dialogue-box">
                <span class="location-badge" id="location-badge">LOCAL</span>
                <div class="char-name" id="char-name">Nome</div>
                <p class="char-bubble" id="pergunta">Pergunta...</p>
            </div>
        </div>

        <div id="choices" class="choices"></div>
        <div id="explanation-box" class="explanation-box"></div>
        <button id="next-btn" onclick="avancarMissao()">Continuar ➔</button>
    </div>
</div>

<script>
    const avatar = {
        boulanger: "https://images.unsplash.com/photo-1579038773843-c5a5ae27546c?w=150", 
        prof: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=150",      
        passante: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150",  
        policial: "https://images.unsplash.com/photo-1600180758890-6b945f9a2ba6?w=150",  
        amigo: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=150",     
        garcom: "https://images.unsplash.com/photo-1581092918056-0c4c3dad3785?w=150"    
    };

    // Nível 1 Expandido com TODAS as vertentes do Padrão Mundial CECRL A1
    const nivel1 = {
        nome: "Nível 1: Cumprimentos & Polidez",
        premioNome: "🏛️ O Museu do Louvre",
        missoes: [
            { 
                local: "Boulangerie", npc: "Jean (Padeiro)", foto: avatar.boulanger, 
                pergunta: "Você entra na padaria às 08:00 para comprar um doce. Qual é a abordagem inicial polida recomendada?", 
                opcoes: [{t: "Salut !", c: false}, {t: "Bonjour !", c: true}], 
                exp: "<strong>Interação Social Inicial:</strong> No referencial A1, 'Bonjour' é obrigatório ao entrar em qualquer estabelecimento comercial na França. 'Salut' só se usa com amigos próximos." 
            },
            { 
                local: "Rua de Paris", npc: "Mme. Martin", foto: avatar.prof, 
                pergunta: "Você encontra sua professora de francês na calçada. Como falar de forma polida e formal respeitando a hierarquia?", 
                opcoes: [{t: "Bonjour, madame !", c: true}, {t: "Salut, prof !", c: false}], 
                exp: "<strong>Registros de Língua:</strong> O padrão CECRL exige a distinção entre falar com conhecidos e superiores. Adicionar 'Madame' ou 'Monsieur' após o Bonjour demonstra respeito cultural profundo." 
            },
            { 
                local: "Praça do Bairro", npc: "Lucas (Conhecido)", foto: avatar.amigo, 
                pergunta: "São 18:30 e você encontra um conhecido no parque. Como alternar para o cumprimento correto de fim de dia?", 
                opcoes: [{t: "Bonjour !", c: false}, {t: "Bonsoir !", c: true}], 
                exp: "<strong>Uso do Tempo:</strong> A partir do final da tarde (geralmente quando o sol começa a se pôr ou após as 18:00), o 'Bonjour' dá lugar obrigatoriamente ao 'Bonsoir' (Boa noite de chegada)." 
            },
            { 
                local: "Metrô", npc: "Desconhecido", foto: avatar.passante, 
                pergunta: "Você precisa pedir ajuda para achar a plataforma certa a um desconhecido. Qual expressão de polidez abre essa conversa?", 
                opcoes: [{t: "S'il te plaît...", c: false}, {t: "S'il vous plaît, excusez-moi...", c: true}], 
                exp: "<strong>O Pronome de Tratamento:</strong> Para qualquer estranho na rua, usamos a estrutura formal 'S'il vous plaît' (Por favor) ligada ao pronome 'Vous'. 'S'il te plaît' é estritamente informal (Tu)." 
            },
            { 
                local: "Boutique de Roupas", npc: "Chloé (Atendente)", foto: avatar.garcom, 
                pergunta: "Você terminou de pagar uma compra e está cruzando a porta de saída. O que deve falar ao funcionário?", 
                opcoes: [{t: "Merci, au revoir !", c: true}, {t: "Ciao, salut !", c: false}], 
                exp: "<strong>Estrutura de Despedida:</strong> O encerramento de um contato comercial exige um agradecimento seguido da fórmula padrão de despedida: 'Merci, au revoir' (Obrigado, adeus/até logo)." 
            },
            { 
                local: "Hotel de Ville", npc: "Agente Pierre", foto: avatar.policial, 
                pergunta: "Você quer se desculpar com um oficial antes de interrompê-lo para tirar uma dúvida rápida. Qual é o termo correto?", 
                opcoes: [{t: "Pardon, excusez-moi.", c: true}, {t: "Désolé, ça va.", c: false}], 
                exp: "<strong>Fórmulas de Polidez:</strong> 'Pardon' e 'Excusez-moi' são usados para chamar a atenção de alguém ou pedir licença de forma educada. 'Désolé' serve para quando você comete um erro de fato." 
            }
        ]
    };

    let indiceMissao = 0;
    let vidas = 3;
    let premioDesbloqueado = false;
    let respostaDada = false;
    let acertouRodada = false;

    function iniciarApp() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        renderizar();
    }

    function renderizar() {
        document.getElementById('hearts-display').innerText = "❤️".repeat(vidas) + "🖤".repeat(3 - vidas);
        
        if (premioDesbloqueado) {
            document.getElementById('trophy-0').classList.add('unlocked');
        }

        const totalMissoes = nivel1.missoes.length;

        // Fim das missões do Nível 1
        if (indiceMissao >= totalMissoes) {
            document.getElementById('titulo-fase').innerText = "🏆 PARABÉNS !";
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('boss-alert').style.display = 'none';
            document.getElementById('character-zone').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('choices').innerHTML = `
                <p style='color:var(--success); font-weight:bold; font-size:1.15em; line-height: 1.5;'>
                    Magnifique! Você completou todas as vertentes de Cumprimentos e Polidez do padrão internacional A1!<br><br>
                    🏛️ O Museu do Louvre está oficialmente aberto em seu armário de conquistas!
                </p>`;
            return;
        }

        const m = nivel1.missoes[indiceMissao];

        // Atualização de interface e progresso
        document.getElementById('titulo-fase').innerText = nivel1.nome;
        document.getElementById('score-display').innerText = `Módulo 1 — Etapa ${indiceMissao + 1}/${totalMissoes}`;
        document.getElementById('progress-bar').style.width = ((indiceMissao / totalMissoes) * 100) + "%";

        document.getElementById('location-badge').innerText = m.local.toUpperCase();
        document.getElementById('char-name').innerText = m.npc;
        document.getElementById('char-avatar').style.backgroundImage = `url('${m.foto}')`;
        document.getElementById('pergunta').innerText = m.pergunta;

        // Resetando elementos pós-mudança de etapa
        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        respostaDada = false;
        
        // MECÂNICA DE ANTECIPAÇÃO DA ÚLTIMA PERGUNTA
        const alertBox = document.getElementById('boss-alert');
        if (indiceMissao === totalMissoes - 1) {
            alertBox.innerHTML = `🔥 VALENDO PRÊMIO HISTÓRICO! Se você acertar esta última questão, desbloqueará: <strong>${nivel1.premioNome}</strong>!`;
            alertBox.style.display = 'block';
        } else {
            alertBox.style.display = 'none';
        }

        // Renderização dos botões
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';
        m.opcoes.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = opt.t;
            btn.onclick = (e) => verificar(opt.c, e.target, m.exp);
            choicesDiv.appendChild(btn);
        });
    }

    function verificar(correta, elemento, explicacao) {
        if (respostaDada) return; // Impede multiplos cliques
        respostaDada = true;
        acertouRodada = correta;

        // Desativa visualmente os botões da escolha
        const botoes = document.querySelectorAll('.choice-btn');
        botoes.forEach(b => b.disabled = true);

        const expBox = document.getElementById('explanation-box');
        expBox.innerHTML = explicacao;
        expBox.style.display = 'block';

        if (correta) {
            elemento.classList.add('correct');
            
            // Se for a última missão, destrava o prêmio
            if (indiceMissao === nivel1.missoes.length - 1) {
                premioDesbloqueado = true;
                document.getElementById('trophy-0').classList.add('unlocked');
                expBox.innerHTML += `<br><br><span style='color:var(--success); font-weight:bold;'>🎉 EXCELENTE! Você conquistou ${nivel1.premioNome}!</span>`;
            }
        } else {
            elemento.classList.add('wrong');
            vidas--;
            document.getElementById('hearts-display').innerText = "❤️".repeat(vidas) + "🖤".repeat(3 - vidas);
        }

        // O BOTÃO CONTINUAR SEMPRE APARECE AQUI (Independente de acerto ou erro!)
        document.getElementById('next-btn').style.display = 'block';
    }

    function avancarMissao() {
        if (vidas <= 0) {
            alert("Suas energias acabaram! Vamos recomeçar o treinamento do Nível 1 para fixação.");
            vidas = 3;
            indiceMissao = 0;
            premioDesbloqueado = false;
            document.getElementById('trophy-0').classList.remove('unlocked');
            renderizar();
            return;
        }

        indiceMissao++;
        renderizar();
    }
</script>
</body>
</html>
