<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-option { 
            background: #1e293b; border: 2px solid #334155; 
            transition: all 0.2s ease; cursor: pointer;
        }
        .btn-option:hover { border-color: #38bdf8; transform: translateY(-2px); }
        .correct { border-color: #22c55e !important; background: rgba(34, 197, 94, 0.2) !important; }
        .wrong { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.2) !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black tracking-tighter text-cyan-400 italic">FRANCÊS A1</h1>
            <div class="flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-full font-bold text-yellow-400">
                <span>💎</span> <span id="coin-balance">0</span>
            </div>
        </div>

        <div id="app-container" class="card p-6 rounded-3xl shadow-2xl">
            <div id="quiz-area">
                <h2 class="text-2xl font-bold mb-6">Escolha o seu treino:</h2>
                <div class="space-y-3">
                    <button class="btn-option w-full p-4 rounded-2xl font-semibold" onclick="startQuiz('verbs')">Verbos: Être & Avoir</button>
                    <button class="btn-option w-full p-4 rounded-2xl font-semibold" onclick="startQuiz('restaurant')">No Restaurante</button>
                    <button class="btn-option w-full p-4 rounded-2xl font-semibold" onclick="startQuiz('time')">Números e Horas</button>
                    <button class="btn-option w-full p-4 rounded-2xl font-semibold" onclick="startQuiz('family')">Família e Perfil</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('francaisCoins')) || 0;
        let currentQ = 0, score = 0, activeQuiz = [];

        const quizzes = {
            verbs: { questions: [{ q: "Je ___ étudiant.", a: "suis", options: ["suis", "ai", "sommes", "êtes"] }, { q: "J'___ 25 ans.", a: "ai", options: ["suis", "ai", "as", "ont"] }] },
            restaurant: { questions: [{ q: "Je voudrais ___ café.", a: "un", options: ["une", "un", "le", "la"] }] },
            time: { questions: [{ q: "Il est huit ___.", a: "heures", options: ["heures", "heurs", "hour", "hours"] }] },
            family: { questions: [{ q: "C'est mon ___ (pai).", a: "père", options: ["père", "mère", "frère", "sœur"] }] }
        };

        function startQuiz(key) {
            activeQuiz = quizzes[key].questions;
            currentQ = 0; score = 0;
            renderQuestion();
        }

        function renderQuestion() {
            if(currentQ >= activeQuiz.length) {
                balance += score * 10;
                localStorage.setItem('francaisCoins', balance);
                document.getElementById('coin-balance').innerText = balance;
                document.getElementById('app-container').innerHTML = `
                    <div class="text-center py-10">
                        <h2 class="text-4xl mb-4">🏆</h2>
                        <h3 class="text-2xl font-bold">Quiz Concluído!</h3>
                        <p class="mb-6">Você ganhou ${score * 10} diamantes.</p>
                        <button class="bg-cyan-500 w-full py-3 rounded-xl font-bold" onclick="location.reload()">Jogar Novamente</button>
                    </div>`;
                return;
            }
            const q = activeQuiz[currentQ];
            const optionsHtml = q.options.map(opt => `
                <button class="btn-option w-full p-4 rounded-2xl font-semibold mb-3" 
                        onclick="checkAnswer(this, '${opt}', '${q.a}')">${opt}</button>`).join('');
            
            document.getElementById('app-container').innerHTML = `
                <div class="text-sm text-slate-400 mb-2">Pergunta ${currentQ + 1} de ${activeQuiz.length}</div>
                <h3 class="text-xl font-bold mb-6">${q.q}</h3>
                ${optionsHtml}
            `;
        }

        function checkAnswer(btn, ans, correct) {
            const isCorrect = ans === correct;
            btn.classList.add(isCorrect ? 'correct' : 'wrong');
            
            if(isCorrect) score++;
            
            setTimeout(() => {
                currentQ++;
                renderQuestion();
            }, 600);
        }

        document.getElementById('coin-balance').innerText = balance;
    </script>
</body>
</html>
