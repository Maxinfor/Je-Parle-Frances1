<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada A1: 50 Níveis Acumulativos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6 flex flex-col items-center">
    <div id="app" class="w-full max-w-lg bg-zinc-900 p-8 rounded-3xl border border-zinc-800">
        <!-- O motor de jogo vai injetar tudo aqui -->
    </div>

    <script>
        // Banco de temas que serão incrementados
        const temas = ["Verbo Être", "Verbo Avoir", "Verbos -ER", "Contrações", "Passado", "Futuro", "Partitivos", "Negação", "Perguntas", "Plurais"];
        
        // Gerador de Níveis Acumulativos
        const jogo = Array.from({ length: 50 }, (_, i) => {
            const nivelAtual = i + 1;
            const qtdQuestoes = 20 + (i * 2); // 20 no Nível 1, 22 no Nível 2...
            const temasIncluidos = temas.slice(0, Math.ceil(nivelAtual / 5)); // Adiciona um tema novo a cada 5 níveis
            
            return {
                id: nivelAtual,
                total: qtdQuestoes,
                temas: temasIncluidos,
                premio: `https://picsum.photos/id/${i + 20}/300/300`
            };
        });

        let nIdx = 0, qIdx = 0;

        function render() {
            const nivel = jogo[nIdx];
            if (qIdx >= nivel.total) return mostrarPremio();

            document.getElementById('app').innerHTML = `
                <div class="text-blue-400 font-bold text-xs uppercase mb-2">Nível ${nivel.id} | Progresso: ${qIdx + 1}/${nivel.total}</div>
                <h1 class="text-2xl font-bold mb-4">Assuntos: ${nivel.temas.join(', ')}</h1>
                <p class="text-zinc-400 mb-8">Questão de nível ${nivel.id} (Escala Gradual)</p>
                <div class="flex flex-col gap-3">
                    <button onclick="proxima()" class="p-4 bg-zinc-800 rounded-xl hover:bg-zinc-700 transition">Opção A (Simulada)</button>
                    <button onclick="proxima()" class="p-4 bg-zinc-800 rounded-xl hover:bg-zinc-700 transition">Opção B (Simulada)</button>
                </div>
            `;
        }

        function proxima() {
            qIdx++;
            render();
        }

        function mostrarPremio() {
            document.getElementById('app').innerHTML = `
                <h1 class="text-3xl font-bold text-center mb-6">Nível ${jogo[nIdx].id} Concluído!</h1>
                <img src="${jogo[nIdx].premio}" class="w-full rounded-2xl mb-6 shadow-xl">
                <button onclick="nIdx++; qIdx=0; render()" class="w-full py-4 bg-yellow-600 rounded-xl font-bold">COLETAR E IR PARA NÍVEL ${nIdx + 2}</button>
            `;
        }

        render();
    </script>
</body>
</html>
