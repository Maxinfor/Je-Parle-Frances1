<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cyber-panel { background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(6, 182, 212, 0.3); }
        .glow-gold { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.8)); color: #FFD700; }
        .glow-silver { filter: drop-shadow(0 0 10px rgba(192, 192, 192, 0.8)); color: #C0C0C0; }
        .glow-bronze { filter: drop-shadow(0 0 10px rgba(205, 127, 50, 0.8)); color: #CD7F32; }
    </style>
</head>
<body class="bg-[#050505] text-white min-h-screen p-4 font-mono">

    <div class="max-w-2xl mx-auto">
        <h2 class="text-cyan-400 text-center mb-8 tracking-[0.3em] uppercase text-xl">Inventário A1 Elite</h2>
        <div id="vitrine" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3">
            <!-- Itens injetados via JS -->
        </div>
    </div>

    <script>
        const itens = [
            { nome: "Garfo de Bronze", icon: "🍴", style: "glow-bronze" },
            { nome: "Garfo de Prata", icon: "🍴", style: "glow-silver" },
            { nome: "Garfo de Ouro", icon: "🍴", style: "glow-gold" },
            { nome: "Louvre de Bronze", icon: "🏛️", style: "glow-bronze" },
            { nome: "Louvre de Prata", icon: "🏛️", style: "glow-silver" },
            { nome: "Louvre de Ouro", icon: "🏛️", style: "glow-gold" },
            { nome: "Sceau de Bronze", icon: "📜", style: "glow-bronze" },
            { nome: "Sceau de Prata", icon: "📜", style: "glow-silver" },
            { nome: "Sceau de Ouro", icon: "📜", style: "glow-gold" },
            { nome: "Bandeira França", icon: "🇫🇷", style: "glow-gold" },
            { nome: "Mont-Saint-Michel", icon: "🏰", style: "glow-gold" },
            { nome: "Versailles", icon: "👑", style: "glow-gold" },
            { nome: "Chambord", icon: "🏰", style: "glow-gold" },
            { nome: "Chenonceau", icon: "🏰", style: "glow-gold" },
            { nome: "Chaumont", icon: "🏰", style: "glow-gold" },
            { nome: "Notre-Dame Bronze", icon: "⛪", style: "glow-bronze" },
            { nome: "Notre-Dame Prata", icon: "⛪", style: "glow-silver" },
            { nome: "Notre-Dame Ouro", icon: "⛪", style: "glow-gold" },
            { nome: "Napoléon", icon: "🎖️", style: "glow-gold" },
            { nome: "Perfume Bronze", icon: "🧴", style: "glow-bronze" },
            { nome: "Perfume Prata", icon: "🧴", style: "glow-silver" },
            { nome: "Perfume Ouro", icon: "🧴", style: "glow-gold" }
        ];

        let nivelConcluidos = 5; // Defina quantos itens estão liberados

        function renderizarVitrine() {
            const container = document.getElementById('vitrine');
            container.innerHTML = itens.map((item, idx) => `
                <div class="cyber-panel p-3 rounded-lg flex flex-col items-center justify-center aspect-square transition-all duration-500 ${idx < nivelConcluidos ? 'opacity-100 scale-100' : 'opacity-20 grayscale scale-95'}">
                    <div class="text-2xl ${idx < nivelConcluidos ? item.style : 'text-gray-500'}">
                        ${item.icon}
                    </div>
                    <span class="text-[7px] mt-2 text-center uppercase truncate w-full px-1">
                        ${idx < nivelConcluidos ? item.nome : 'LOCKED'}
                    </span>
                </div>
            `).join('');
        }

        renderizarVitrine();
    </script>
</body>
</html>
