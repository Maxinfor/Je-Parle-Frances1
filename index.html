<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle at center, #0f172a, #020617); min-height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .grid-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; transition: 0.3s; cursor: pointer; }
        .grid-card:hover { background: rgba(56, 189, 248, 0.1); border-color: #38bdf8; }
        .progress-bar { height: 8px; border-radius: 4px; background: rgba(0,0,0,0.3); }
        .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #38bdf8, #818cf8); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-cyan-400 italic">FRANCÊS A1</h1>
                <h1 class="text-3xl font-black text-white">ACADEMY</h1>
            </div>
            <div class="glass-panel px-6 py-3 flex items-center gap-2 font-bold text-yellow-400 text-lg">
                <span>💰</span> <span id="coin-balance">750</span>
                <button class="bg-cyan-500 text-white px-4 py-1 rounded-full ml-4 text-sm font-bold">SHOP</button>
            </div>
        </div>

        <h2 class="text-xl font-semibold mb-6 text-white/80">ESCOLHA SEU TREINAMENTO:</h2>

        <!-- Grid de Treinos -->
        <div id="grid-container" class="grid grid-cols-2 gap-4">
            <div class="grid-card p-5" onclick="startQuiz('verbs')">
                <h3 class="font-bold text-lg mb-2">Verbos: Être & Avoir</h3>
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm opacity-60">45% CONCLUÍDO</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width: 45%"></div></div>
            </div>

            <div class="grid-card p-5" onclick="startQuiz('restaurant')">
                <h3 class="font-bold text-lg mb-2">No Restaurante</h3>
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm opacity-60">10% CONCLUÍDO</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width: 10%"></div></div>
            </div>

            <div class="grid-card p-5" onclick="startQuiz('time')">
                <h3 class="font-bold text-lg mb-2">Números e Horas</h3>
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm opacity-60">30% CONCLUÍDO</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width: 30%"></div></div>
            </div>

            <div class="grid-card p-5" onclick="startQuiz('family')">
                <h3 class="font-bold text-lg mb-2">Família e Perfil</h3>
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm opacity-60">80% CONCLUÍDO</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width: 80%"></div></div>
            </div>
        </div>
    </div>
</body>
</html>
